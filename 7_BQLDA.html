<script>
/* ================================================================
   FILE 7: 7_BQLDA.html
   ------------------------------------------------------------------
   PHẠM VI: Tab con "BQLDA" trong mục "Quản lý dự án" — danh bạ liên hệ
   nhân sự Ban QLDA (Trưởng ban, Đại diện CĐT, QS, QAQC, Giám sát hiện
   trường...). LẤY THẲNG từ biến toàn cục `users` (CÙNG nguồn dữ liệu
   với tab "Quản lý nhân sự" — DanhSachUser), KHÔNG phải sổ riêng.

   Sửa SĐT/Email/Ghi chú/Thứ tự hiển thị làm ngay tại modal "Thêm/Sửa
   Giám sát" đã có sẵn (openUserModal(), xem 6_NguoiDung.html) — nút
   Sửa ở đây mở thẳng ĐÚNG modal đó, không có modal riêng cho BQLDA.

   Ẩn nhân sự đã "Nghỉ việc" khỏi danh bạ này (giống các danh sách chọn
   khác trong app, VD giao việc/mời chat) — vẫn còn đủ ở "Quản lý nhân
   sự". Sắp xếp theo sttBQLDA (Admin tự chỉnh trong modal Sửa — xem
   field "Thứ tự hiển thị (BQLDA)") để giữ đúng thứ tự Trưởng ban →
   Đại diện CĐT → QS/QAQC → Giám sát hiện trường... theo ý Admin.

   DANH SÁCH HÀM CHÍNH:
   - renderBQLDA() : Điểm vào (gọi khi mở tab con BQLDA) — lọc + sắp xếp `users` rồi vẽ lại
   ================================================================ */

function renderBQLDA() {
    const body = document.getElementById('bqldaBody');
    if (!body) return;

    const list = users
        .filter(u => u.trangThai !== 'Nghỉ việc')
        .slice()
        .sort((a, b) => (a.sttBQLDA || 0) - (b.sttBQLDA || 0));

    if (list.length === 0) {
        body.innerHTML = '<tr><td colspan="7" class="text-center" style="color:gray; padding:15px;">Chưa có nhân sự nào.</td></tr>';
        return;
    }

    body.innerHTML = list.map((u, idx) => `<tr>
        <td class="text-center">${idx + 1}</td>
        <td>${escapeHtml(u.name)}</td>
        <td>${escapeHtml(u.chucDanh || '--')}</td>
        <td>${escapeHtml(u.sdt || '--')}</td>
        <td>${escapeHtml(u.email || '--')}</td>
        <td>${escapeHtml(u.ghiChu || '--')}</td>
        <td class="admin-only text-center">
            <button class="btn btn-sm" style="background:var(--primary);" onclick="openUserModal('${u.id}')" aria-label="Sửa nhân sự" title="Sửa (mở modal Quản lý nhân sự)"><i class="fa-solid fa-pen"></i></button>
        </td>
    </tr>`).join('');
}
</script>
