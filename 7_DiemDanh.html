<script>
/* ================================================================
   FILE 7: 7_DiemDanh.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Điểm danh & Phép" — điểm danh Thứ 7/Chủ nhật + sổ
   phép cộng dồn theo tháng. Ai cũng xem được (giống getData() không
   cần đăng nhập); chỉ Admin hoặc Chức danh "Thư ký BQLDA" tick điểm
   danh / sửa "Số ngày nghỉ" (backend capNhatDiemDanh/capNhatSoNgayNghi
   tự kiểm tra lại quyền, không chỉ dựa vào ẩn/hiện ở giao diện).

   Dữ liệu tải riêng theo tháng qua getDiemDanhPhep(thang) — không gộp
   vào hangMuc/goiThau/congViec/users toàn cục, giống cách 5_Dashboard
   gọi riêng getBaoCaoTongHop().

   DANH SÁCH HÀM CHÍNH:
   - renderDiemDanh()      : Điểm vào, đặt tháng mặc định rồi tải dữ liệu
   - loadDiemDanh(thang)   : Gọi getDiemDanhPhep, lưu kết quả rồi vẽ lại bảng
   - renderDiemDanhTable() : Dựng thead 2 tầng (Tuần / Thứ7-CN) + tbody
   - toggleDiemDanhCell()  : Bấm 1 ô Thứ7/CN, xoay vòng trống→1→0,5→trống
   - saveSoNgayNghi()      : Sửa "Số ngày nghỉ" của 1 người trong tháng đang xem
   ================================================================ */

let ddCurrentThang = '';
let ddData = null;

function chuanHoaChucDanhClient_(s) {
    return String(s || '').trim().toLowerCase();
}

function canEditDiemDanh() {
    return currentRole === 'ADMIN' || chuanHoaChucDanhClient_(myChucDanh) === 'thư ký bqlda';
}

function renderDiemDanh() {
    const picker = document.getElementById('ddThangPicker');
    if (!ddCurrentThang) {
        const now = new Date();
        ddCurrentThang = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    }
    picker.value = ddCurrentThang;
    picker.onchange = () => {
        ddCurrentThang = picker.value;
        loadDiemDanh(ddCurrentThang);
    };
    loadDiemDanh(ddCurrentThang);
}

function loadDiemDanh(thang) {
    document.getElementById('ddBody').innerHTML = '<tr><td colspan="20" class="text-center" style="padding:20px; color:gray;">Đang tải...</td></tr>';
    gsRun('getDiemDanhPhep', thang)
        .then(json => { ddData = JSON.parse(json); renderDiemDanhTable(); })
        .catch(handleBackendError);
}

function renderDiemDanhTable() {
    if (!ddData) return;
    const editable = canEditDiemDanh();
    const tuanList = ddData.tuanList || [];

    let row1 = '<tr><th rowspan="2">STT</th><th rowspan="2" style="text-align:left;">Họ và tên</th>' +
        '<th rowspan="2">Phép + bù</th><th rowspan="2">Số ngày nghỉ</th>' +
        '<th rowspan="2">Cộng phép tháng</th><th rowspan="2">TỔNG CỘNG</th>';
    let row2 = '<tr>';
    tuanList.forEach(t => {
        const cols = (t.ngayThu7 ? 1 : 0) + (t.ngayCN ? 1 : 0);
        row1 += `<th colspan="${cols}" class="dd-week-header">${t.nhan}</th>`;
        if (t.ngayThu7) row2 += '<th>Thứ 7</th>';
        if (t.ngayCN) row2 += '<th>C.nhật</th>';
    });
    row1 += '</tr>';
    row2 += '</tr>';
    document.getElementById('ddThead').innerHTML = row1 + row2;

    const rows = ddData.rows || [];
    if (rows.length === 0) {
        document.getElementById('ddBody').innerHTML = '<tr><td colspan="20" class="text-center" style="padding:20px; color:gray;">Chưa có nhân sự nào.</td></tr>';
        return;
    }

    document.getElementById('ddBody').innerHTML = rows.map((r, idx) => {
        let cells = `<td class="text-center">${idx + 1}</td>
            <td>${r.hoTen}</td>
            <td class="text-center">${currentRole === 'ADMIN'
                ? `<input type="number" class="dd-input-sm" step="0.5" value="${r.phepDauThang}" onchange="savePhepDauThang('${r.userId}', this)">`
                : r.phepDauThang}</td>
            <td class="text-center">${editable
                ? `<input type="number" class="dd-input-sm" step="0.5" min="0" value="${r.soNgayNghi}" onchange="saveSoNgayNghi('${r.userId}', this)">`
                : r.soNgayNghi}</td>
            <td class="text-center">${r.congPhepThang}</td>
            <td class="text-center dd-tong">${r.tongCong}</td>`;

        tuanList.forEach(t => {
            [t.ngayThu7, t.ngayCN].forEach(ngay => {
                if (!ngay) return;
                const buoi = r.diemDanh[ngay];
                const cls = buoi === 1 ? 'full' : (buoi === 0.5 ? 'half' : '');
                const label = buoi === 1 ? '<i class="fa-solid fa-check"></i>' : (buoi === 0.5 ? '½' : '');
                cells += editable
                    ? `<td><button type="button" class="dd-cell editable ${cls}" onclick="toggleDiemDanhCell('${r.userId}','${ngay}',this)">${label}</button></td>`
                    : `<td><span class="dd-cell ${cls}">${label}</span></td>`;
            });
        });

        return `<tr>${cells}</tr>`;
    }).join('');
}

function toggleDiemDanhCell(userId, ngay, btn) {
    const row = (ddData.rows || []).find(r => r.userId === userId);
    if (!row) return;
    const current = row.diemDanh[ngay];
    const next = current === 1 ? 0.5 : (current === 0.5 ? '' : 1);

    btn.disabled = true;
    gsRun('capNhatDiemDanh', myUserId, myPassword, userId, ngay, next)
        .then(() => loadDiemDanh(ddCurrentThang))
        .catch(err => { btn.disabled = false; handleBackendError(err); });
}

function saveSoNgayNghi(userId, inputEl) {
    const val = inputEl.value;
    inputEl.disabled = true;
    gsRun('capNhatSoNgayNghi', myUserId, myPassword, userId, ddCurrentThang, val)
        .then(() => loadDiemDanh(ddCurrentThang))
        .catch(err => { inputEl.disabled = false; handleBackendError(err); });
}

// Chỉ Admin thấy được ô này (xem điều kiện render ở renderDiemDanhTable) — dùng để nhập số dư phép
// sẵn có của dự án khi mới bắt đầu dùng tab này, backend adminCapNhatPhepDauThang cũng tự kiểm tra
// lại đúng vai trò ADMIN, không chỉ dựa vào ẩn/hiện ở giao diện.
function savePhepDauThang(userId, inputEl) {
    const val = inputEl.value;
    inputEl.disabled = true;
    gsRun('adminCapNhatPhepDauThang', myUserId, myPassword, userId, ddCurrentThang, val)
        .then(() => loadDiemDanh(ddCurrentThang))
        .catch(err => { inputEl.disabled = false; handleBackendError(err); });
}
</script>
