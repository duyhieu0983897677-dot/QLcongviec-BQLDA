<script>
/* ================================================================
   FILE 5: 5_Dashboard.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Tổng quan" — báo cáo tổng hợp tự sinh từ Nhật ký tiến
   độ, theo đơn vị CÔNG VIỆC. 2 phần:
   - Báo cáo tổng: biểu đồ tròn (tỷ lệ trạng thái) + biểu đồ thanh (số
     công việc theo Người phụ trách).
   - Báo cáo chi tiết: chọn 1 Gói thầu hoặc 1 Hạng mục, xem danh sách
     Công việc + % + trạng thái của đúng lựa chọn đó.

   Tab Tổng quan có 2 báo cáo tách riêng, chuyển qua lại bằng 2 nút pill (switchBcPanel()):
   - "Báo cáo Công việc" (mặc định) : biểu đồ tròn trạng thái + biểu đồ thanh theo người phụ trách
     + bảng chi tiết theo Gói thầu/Hạng mục — y hệt trước đây.
   - "Báo cáo Chi phí" : KPI (Giá trị HĐ/Đã thực hiện/Phát sinh/Đã thanh toán) + biểu đồ tròn sản
     lượng + biểu đồ thanh 6 tháng gần nhất + biểu đồ dòng tiền (S-Curve kế hoạch vs thực tế lũy
     kế) — tổng hợp từ module Hợp đồng (BOQ/Nghiệm thu/Thanh toán), có dropdown lọc theo 1 Hợp đồng
     hoặc "Tổng hợp toàn bộ", port công thức từ tab Tổng quan của app "Quản Lý Đa Hợp Đồng" cũ.

   DANH SÁCH HÀM CHÍNH:
   - renderDashboard()      : Dispatcher — vẽ lại đúng panel (Công việc/Chi phí) đang được chọn
   - switchBcPanel(name)    : Chuyển giữa 2 báo cáo
   - renderBcCongViecPanel(): Toàn bộ nội dung "Báo cáo Công việc" (KHÔNG round-trip riêng — đọc từ
                              congViec toàn cục đã tải sẵn, xem getData() ở Code.js)
   - renderBcChiPhi()       : Toàn bộ nội dung "Báo cáo Chi phí"
   - onBcDetailTypeChange() : Đổi giữa "Xem theo Gói thầu" / "Xem theo Hạng mục"
   - renderBcDetail()       : Vẽ bảng chi tiết theo Gói thầu/Hạng mục đang chọn
   ================================================================ */

let currentBcPanel = 'congviec';

function switchBcPanel(name) {
    currentBcPanel = name;
    document.querySelectorAll('.bc-pill').forEach(btn => btn.classList.toggle('active', btn.dataset.panel === name));
    document.getElementById('bcPanelCongViec').classList.toggle('active', name === 'congviec');
    document.getElementById('bcPanelChiPhi').classList.toggle('active', name === 'chiphi');
    renderDashboard();
}

let bcAllCongViec = [];
let bcPieChartInstance = null;
let bcBarChartInstance = null;
// pending giờ dùng màu hổ phách (trước là xám #94A3B8) — màu này thừa lại từ trạng thái "Trễ tiến
// độ nhưng hoàn thành" đã gộp vào "overdue" (Trễ tiến độ), không còn tách riêng nữa (xem getData()
// ở Code.js và TRANGTHAI_LABEL ở 0_TienIch.html).
const BC_STATUS_COLORS = { pending: '#E8A93D', inprogress: '#1B7A8C', done: '#4F8B62', overdue: '#C4432E' };

// Chart.js không có sẵn kiểu nhãn % kéo "râu" ra ngoài lát cắt (kiểu Excel/Google Sheets) — tự vẽ
// bằng 1 plugin nhỏ, không cần thêm thư viện ngoài. Bỏ qua lát cắt = 0 (không có gì để chỉ vào).
const PIE_OUTSIDE_LABELS_PLUGIN = {
    id: 'pieOutsideLabels',
    afterDraw(chart) {
        if (chart.config.type !== 'pie') return;
        const { ctx } = chart;
        const meta = chart.getDatasetMeta(0);
        const values = chart.data.datasets[0].data;
        const total = values.reduce((s, v) => s + (v || 0), 0);
        if (!total) return;

        ctx.save();
        meta.data.forEach((arc, i) => {
            const value = values[i];
            if (!value) return;
            const pct = Math.round((value / total) * 100);
            const angle = (arc.startAngle + arc.endAngle) / 2;
            const cx = arc.x, cy = arc.y;
            const outerR = arc.outerRadius;
            const cos = Math.cos(angle), sin = Math.sin(angle);

            const p1x = cx + cos * outerR, p1y = cy + sin * outerR;
            const p2x = cx + cos * (outerR + 14), p2y = cy + sin * (outerR + 14);
            const goRight = cos >= 0;
            const p3x = p2x + (goRight ? 14 : -14), p3y = p2y;

            ctx.strokeStyle = '#9A9184';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p1x, p1y);
            ctx.lineTo(p2x, p2y);
            ctx.lineTo(p3x, p3y);
            ctx.stroke();

            ctx.fillStyle = '#26313A';
            ctx.font = '600 12px Inter, sans-serif';
            ctx.textBaseline = 'middle';
            ctx.textAlign = goRight ? 'left' : 'right';
            ctx.fillText(pct + '%', p3x + (goRight ? 4 : -4), p3y);
        });
        ctx.restore();
    }
};

// Bấm "Làm mới" gọi reloadData() (tải lại toàn bộ congViec/hangMuc/goiThau/users rồi tự render lại
// tab đang mở) thay vì tự gọi riêng 1 lệnh backend khác ở đây — nhất quán với mọi tab khác.
function renderDashboard() {
    if (currentBcPanel === 'chiphi') renderBcChiPhi();
    else renderBcCongViecPanel();
    document.getElementById('bcUpdatedAt').textContent = new Date().toLocaleString('vi-VN');
}

function renderBcCongViecPanel() {
    bcAllCongViec = (congViec || []).filter(cv => cv.active !== false);
    document.getElementById('bc-kpi-total').textContent = bcAllCongViec.length;
    renderBcCharts();
    fillBcDetailSelect();
    fillBcDetailExtraFilters();
    renderBcColToggle();
    renderBcDetail();
}

// Đổ dropdown "Người phụ trách" / "Chức danh" cho Báo cáo chi tiết — chỉ đổ 1 lần (options.length<=1)
// giống fillBcDetailSelect ở tab Công việc cá nhân, để không mất lựa chọn hiện tại mỗi lần render lại.
function fillBcDetailExtraFilters() {
    const gsSelect = document.getElementById('bcDetailGS');
    if (gsSelect && gsSelect.options.length <= 1) {
        const ids = [...new Set(bcAllCongViec.map(cv => cv.nguoiTaoId).filter(Boolean))];
        ids.sort((a, b) => nameOfUser(a).localeCompare(nameOfUser(b), 'vi'));
        gsSelect.innerHTML = '<option value="">-- Tất cả người phụ trách --</option>' +
            ids.map(id => `<option value="${id}">${nameOfUser(id)}</option>`).join('');
    }
    const cdSelect = document.getElementById('bcDetailChucDanh');
    if (cdSelect && cdSelect.options.length <= 1) {
        const chucDanhs = [...new Set((users || []).map(u => u.chucDanh).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'vi'));
        cdSelect.innerHTML = '<option value="">-- Tất cả chức danh --</option>' +
            chucDanhs.map(cd => `<option value="${cd}">${cd}</option>`).join('');
    }
}

function renderBcCharts() {
    const counts = { pending: 0, inprogress: 0, done: 0, overdue: 0 };
    bcAllCongViec.forEach(cv => { if (counts[cv.trangThaiMau] !== undefined) counts[cv.trangThaiMau]++; });

    const pieCanvas = document.getElementById('bcPieChart');
    if (bcPieChartInstance) bcPieChartInstance.destroy();
    bcPieChartInstance = new Chart(pieCanvas.getContext('2d'), {
        type: 'pie',
        plugins: [PIE_OUTSIDE_LABELS_PLUGIN],
        data: {
            labels: ['Chờ thực hiện', 'Đang thực hiện', 'Hoàn thành', 'Trễ tiến độ'],
            datasets: [{
                data: [counts.pending, counts.inprogress, counts.done, counts.overdue],
                backgroundColor: [BC_STATUS_COLORS.pending, BC_STATUS_COLORS.inprogress, BC_STATUS_COLORS.done, BC_STATUS_COLORS.overdue]
            }]
        },
        options: {
            // Chừa khoảng trống quanh vòng tròn để "râu" + nhãn % không bị cắt ở mép canvas.
            layout: { padding: 44 },
            // Bỏ legend mặc định của Chart.js (canh giữa trong canvas) — dùng legend HTML riêng bên
            // dưới (giống báo cáo Chi phí) để 2 báo cáo đồng bộ giao diện: chấm màu + nhãn canh trái.
            plugins: { legend: { display: false } }
        }
    });

    const bcPieTotal = counts.pending + counts.inprogress + counts.done + counts.overdue;
    const bcLegendItems = [
        { key: 'pending', label: 'Chờ thực hiện' },
        { key: 'inprogress', label: 'Đang thực hiện' },
        { key: 'done', label: 'Hoàn thành' },
        { key: 'overdue', label: 'Trễ tiến độ' }
    ];
    // 1 hàng ngang gọn dưới biểu đồ, chỉ chấm màu + nhãn + % — bỏ số công việc đi kèm cho gọn.
    document.getElementById('bcPieLegend').innerHTML = bcLegendItems.map(it => {
        const count = counts[it.key];
        const pct = bcPieTotal > 0 ? Math.round((count / bcPieTotal) * 1000) / 10 : 0;
        return `
        <div style="display:flex; align-items:center; gap:6px;">
            <div style="width:10px; height:10px; border-radius:50%; background:${BC_STATUS_COLORS[it.key]}; flex-shrink:0;"></div>
            <div style="font-size:0.78rem; color:var(--text-main); white-space:nowrap;">${it.label} — ${pct}%</div>
        </div>`;
    }).join('');

    // Hiện đủ mọi nhân sự (Giám sát) trên biểu đồ, kể cả người chưa tạo công việc nào (đếm = 0).
    // Mỗi thanh xếp chồng theo trạng thái (chờ thực hiện/đang thực hiện/hoàn thành/trễ nhưng hoàn
    // thành/trễ không hoàn thành) — rà chuột vào thanh sẽ liệt kê từng trạng thái + dòng cuối là
    // tổng số công việc.
    const countsByUserStatus = {};
    users.filter(u => u.role !== 'ADMIN').forEach(u => { countsByUserStatus[u.id] = { pending: 0, inprogress: 0, done: 0, overdue: 0 }; });
    bcAllCongViec.forEach(cv => {
        if (!countsByUserStatus[cv.nguoiTaoId]) countsByUserStatus[cv.nguoiTaoId] = { pending: 0, inprogress: 0, done: 0, overdue: 0 };
        if (countsByUserStatus[cv.nguoiTaoId][cv.trangThaiMau] !== undefined) countsByUserStatus[cv.nguoiTaoId][cv.trangThaiMau]++;
    });
    const tongCuaUser = id => Object.values(countsByUserStatus[id]).reduce((s, v) => s + v, 0);
    const userIds = Object.keys(countsByUserStatus)
        .sort((a, b) => tongCuaUser(b) - tongCuaUser(a) || nameOfUser(a).localeCompare(nameOfUser(b), 'vi'));

    // Nhiều nhân sự (>30) thì mỗi thanh chỉ cần bề rộng tối thiểu, phần dư cho cuộn ngang
    // thay vì bóp hết các thanh vào 1 khung cố định.
    const barWrap = document.getElementById('bcBarChartWrap');
    const barInner = document.getElementById('bcBarChartInner');
    const MIN_PX_PER_BAR = 26;
    barInner.style.width = Math.max(userIds.length * MIN_PX_PER_BAR, barWrap.clientWidth || 0) + 'px';

    const statusOrder = [
        { key: 'pending', label: 'Chờ thực hiện' },
        { key: 'inprogress', label: 'Đang thực hiện' },
        { key: 'done', label: 'Hoàn thành' },
        { key: 'overdue', label: 'Trễ tiến độ' }
    ];

    const barCanvas = document.getElementById('bcBarChart');
    if (bcBarChartInstance) bcBarChartInstance.destroy();
    bcBarChartInstance = new Chart(barCanvas.getContext('2d'), {
        type: 'bar',
        data: {
            labels: userIds.map(id => nameOfUser(id)),
            datasets: statusOrder.map(s => ({
                label: s.label,
                data: userIds.map(id => countsByUserStatus[id][s.key]),
                backgroundColor: BC_STATUS_COLORS[s.key],
                stack: 'total',
                barPercentage: 0.6,
                categoryPercentage: 0.7
            }))
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: true, position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } },
                tooltip: {
                    filter: item => item.parsed.y > 0,
                    callbacks: {
                        footer: items => 'Tổng số công việc: ' + items.reduce((s, it) => s + (it.parsed.y || 0), 0)
                    }
                }
            },
            scales: {
                y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1, precision: 0 } },
                x: { stacked: true, ticks: { autoSkip: false, maxRotation: 60, minRotation: 45, font: { size: 10 } } }
            }
        }
    });
}

function fillBcDetailSelect() {
    const type = document.getElementById('bcDetailType').value;
    const sel = document.getElementById('bcDetailSelect');
    const currentVal = sel.value;
    let html = '';
    if (type === 'goithau') {
        html = goiThau.map(g => `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`).join('');
    } else {
        html = hangMuc.map(h => `<option value="${h.maHangMuc}">${h.maHangMuc} — ${h.tenHangMuc}</option>`).join('');
    }
    sel.innerHTML = html || '<option value="">-- Chưa có dữ liệu --</option>';
    if (currentVal && Array.from(sel.options).some(o => o.value === currentVal)) sel.value = currentVal;
}

function onBcDetailTypeChange() {
    document.getElementById('bcDetailSelect').value = '';
    fillBcDetailSelect();
    renderBcDetail();
}

const BC_DETAIL_COLSPAN = 10;
const BC_PHAN_ROMAN = { ho_so: 'I', thi_cong: 'II' };

// Ghi chú của lần báo cáo gần nhất CÓ ghi chú (không nhất thiết là log mới nhất).
function lastNoteOf(cv) {
    const withNote = (cv.recentLogs || []).find(l => l.ghiChu);
    return withNote ? { text: withNote.ghiChu, date: withNote.ngayBaoCao } : null;
}

function renderBcDetail() {
    const type = document.getElementById('bcDetailType').value;
    const val = document.getElementById('bcDetailSelect').value;
    const tbody = document.getElementById('bcDetailBody');

    if (!val) {
        tbody.innerHTML = `<tr><td colspan="${BC_DETAIL_COLSPAN}" class="text-center" style="color:gray; padding:15px;">Chưa có dữ liệu.</td></tr>`;
        return;
    }

    const fGS = document.getElementById('bcDetailGS').value;
    const fChucDanh = document.getElementById('bcDetailChucDanh').value;
    const fStatus = document.getElementById('bcDetailTrangThai').value;
    const fSearch = document.getElementById('bcDetailSearch').value.trim().toLowerCase();

    const rows = bcAllCongViec.filter(cv => {
        if (type === 'goithau' ? cv.maGoiThau !== val : !(cv.maHangMucList || []).includes(val)) return false;
        if (fGS && cv.nguoiTaoId !== fGS) return false;
        if (fChucDanh && chucDanhOfUser(cv.nguoiTaoId) !== fChucDanh) return false;
        if (fStatus && cv.trangThaiMau !== fStatus) return false;
        if (fSearch && !cv.tenCongViec.toLowerCase().includes(fSearch)) return false;
        return true;
    });
    if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${BC_DETAIL_COLSPAN}" class="text-center" style="color:gray; padding:15px;">Không có công việc nào khớp bộ lọc.</td></tr>`;
        return;
    }

    let html = '';
    ['ho_so', 'thi_cong'].forEach(phan => {
        const group = rows.filter(cv => cv.phanLoai === phan);
        if (group.length === 0) return;
        html += `<tr class="bc-group-row"><td colspan="${BC_DETAIL_COLSPAN}">${PHAN_LOAI_LABEL[phan] || phan}</td></tr>`;
        group.forEach((cv, idx) => {
            const note = lastNoteOf(cv);
            const showNote = note && cv.trangThaiMau === 'overdue';
            const pct = Math.min(cv.luyKe || 0, 100);
            const chucDanh = chucDanhOfUser(cv.nguoiTaoId);
            const mau = mauChucDanh(chucDanh);
            html += `
            <tr>
                <td class="text-center" data-col="stt">${BC_PHAN_ROMAN[phan]}.${idx + 1}</td>
                <td class="text-center" data-col="mahangmuc">${(cv.maHangMucList || []).join(', ') || '--'}</td>
                <td data-col="ten"><div class="t-name-row"><span class="t-name" title="${escapeHtml(cv.tenCongViec)}">${cv.tenCongViec}</span>${commentBadgeHtml(cv)}</div></td>
                <td class="text-center" data-col="nguoiphutrach">${nameOfUser(cv.nguoiTaoId)}</td>
                <td class="text-center" data-col="chucdanh">${chucDanh ? `<span class="bc-badge" style="background:${mau.bg}; color:${mau.fg};">${chucDanh}</span>` : '--'}</td>
                <td class="text-center" data-col="ngaybatdau">${formatVN(cv.ngayBatDauKH)}</td>
                <td class="text-center" data-col="ngayketthuc">${formatVN(cv.ngayKetThucKH)}</td>
                <td class="bc-bar-cell" data-col="tiendo">
                    <div class="bc-bar-flex">
                        <div class="bc-bar-track"><div class="bc-bar-fill status-${cv.trangThaiMau}" style="width:${pct}%;"></div></div>
                        <span class="bc-bar-pct">${cv.luyKe || 0}%</span>
                    </div>
                </td>
                <td class="text-center" data-col="tinhtrang"><span class="bc-badge ${cv.trangThaiMau}">${TRANGTHAI_LABEL[cv.trangThaiMau] || '--'}</span></td>
                <td class="bc-detail-note" data-col="ghichu">${showNote ? `<b>${formatVN(note.date)}:</b> ${note.text}` : '--'}</td>
            </tr>`;
        });
    });
    tbody.innerHTML = html;
    applyBcColVisibility();
}

// --- Chọn cột hiển thị cho bảng Báo cáo chi tiết (mọi cột đều tick sẵn mặc định) ---
const BC_COLS = [
    { key: 'stt', label: 'STT' },
    { key: 'mahangmuc', label: 'Mã hạng mục' },
    { key: 'ten', label: 'Tên công việc' },
    { key: 'nguoiphutrach', label: 'Người phụ trách' },
    { key: 'chucdanh', label: 'Chức danh' },
    { key: 'ngaybatdau', label: 'Ngày bắt đầu' },
    { key: 'ngayketthuc', label: 'Ngày hoàn thành' },
    { key: 'tiendo', label: 'Tiến độ' },
    { key: 'tinhtrang', label: 'Tình trạng' },
    { key: 'ghichu', label: 'Ghi chú' }
];
let bcVisibleCols = new Set(BC_COLS.map(c => c.key));

function renderBcColToggle() {
    const box = document.getElementById('bcColToggleList');
    if (!box) return;
    box.innerHTML = BC_COLS.map(c => `
        <label class="col-toggle-item">
            <input type="checkbox" value="${c.key}" ${bcVisibleCols.has(c.key) ? 'checked' : ''} onchange="toggleBcCol('${c.key}', this.checked)">
            ${c.label}
        </label>`).join('');
}

function toggleBcCol(key, checked) {
    if (checked) bcVisibleCols.add(key); else bcVisibleCols.delete(key);
    applyBcColVisibility();
}

function applyBcColVisibility() {
    BC_COLS.forEach(c => {
        const show = bcVisibleCols.has(c.key);
        document.querySelectorAll(`#bcDetailTable [data-col="${c.key}"]`).forEach(el => {
            el.style.display = show ? '' : 'none';
        });
    });
}

function toggleBcColPanel() {
    const panel = document.getElementById('bcColTogglePanel');
    if (panel) panel.classList.toggle('active');
}

document.addEventListener('click', e => {
    if (!e.target.closest('.col-toggle-wrap')) {
        const panel = document.getElementById('bcColTogglePanel');
        if (panel) panel.classList.remove('active');
    }
});

// =======================================================
// BÁO CÁO CHI PHÍ — port từ tab "Tổng quan" của app "Quản Lý Đa Hợp Đồng & Tiến Độ" cũ, tính lại
// trên mô hình BOQ/Nghiệm thu/Thanh toán quan hệ hiện tại (không còn lịch sử giá theo từng ngày ghi
// log như app cũ — dùng thống nhất donGiaHieuLuc hiện hành cho mọi lượt Nghiệm thu, giống cách
// tinhQuyetToanHopDong_() ở Code.js đã làm, để nhất quán trong toàn module).
// =======================================================
let cpPieChartInstance = null;
let cpMonthlyChartInstance = null;
let cpSCurveChartInstance = null;

function fillBcChiPhiHopDongSelect() {
    const sel = document.getElementById('bcChiPhiHopDongSelect');
    if (!sel) return;
    const currentVal = sel.value;
    sel.innerHTML = '<option value="all">-- Tổng hợp toàn bộ Hợp đồng --</option>' +
        (hopDong || []).map(h => `<option value="${h.maHopDong}">HĐ: ${h.tenHopDong}</option>`).join('');
    if (currentVal && Array.from(sel.options).some(o => o.value === currentVal)) sel.value = currentVal;
    else sel.value = 'all';
}

// Phân bổ đều 1 khoản giá trị theo từng ngày trong khoảng [startISO, endISO] vào các tháng tương
// ứng — dùng để dựng đường "Kế hoạch lũy kế" từ ngày bắt đầu/kết thúc kế hoạch của từng hạng mục BOQ.
function distributePlannedValue_(startISO, endISO, value, monthMap) {
    const start = new Date(startISO + 'T00:00:00');
    const end = new Date(endISO + 'T00:00:00');
    if (isNaN(start.getTime()) || isNaN(end.getTime()) || end < start || !value) return;

    const totalDays = Math.round((end - start) / 86400000) + 1;
    if (totalDays <= 0) return;
    const valuePerDay = value / totalDays;

    const cur = new Date(start);
    for (let i = 0; i < totalDays; i++) {
        const monthKey = cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0');
        monthMap[monthKey] = (monthMap[monthKey] || 0) + valuePerDay;
        cur.setDate(cur.getDate() + 1);
    }
}

function renderBcChiPhi() {
    fillBcChiPhiHopDongSelect();
    const filterId = document.getElementById('bcChiPhiHopDongSelect').value || 'all';
    const contracts = filterId === 'all' ? (hopDong || []) : (hopDong || []).filter(h => h.maHopDong === filterId);

    let tCont = 0, tExec = 0, tExtra = 0, tPayment = 0;
    const monthlyMap = {};     // 'yyyy-MM' -> giá trị Nghiệm thu thực tế tháng đó
    const planMonthlyMap = {}; // 'yyyy-MM' -> giá trị kế hoạch phân bổ theo ngày BĐ/KT của BOQ

    contracts.forEach(hd => {
        const vatFactor = 1 + (hd.thueVAT || 0) / 100;
        const items = (boq || []).filter(b => b.maHopDong === hd.maHopDong && !b.isHeader);

        let cTotal = 0;
        items.forEach(item => {
            const valContract = Math.round(item.khoiLuongHieuLuc * item.donGiaHieuLuc * vatFactor);
            cTotal += valContract;
            if (item.ngayBatDauKH && item.ngayKetThucKH) {
                distributePlannedValue_(item.ngayBatDauKH, item.ngayKetThucKH, valContract, planMonthlyMap);
            }

            const logs = (nghiemThu || []).filter(n => n.maBOQ === item.maBOQ);
            const extraQty = Math.max(0, item.khoiLuongDaNghiemThu - item.khoiLuongHieuLuc);
            const extraVal = Math.round(extraQty * item.donGiaHieuLuc * vatFactor);
            const rawExecutedValue = logs.reduce((s, l) => s + l.khoiLuong * item.donGiaHieuLuc * vatFactor, 0);
            tExec += Math.round(rawExecutedValue) - extraVal;
            tExtra += extraVal;

            logs.forEach(l => {
                const mk = (l.ngayNghiemThu || '').slice(0, 7);
                if (mk) monthlyMap[mk] = (monthlyMap[mk] || 0) + l.khoiLuong * item.donGiaHieuLuc * vatFactor;
            });
        });

        const discountValue = Math.round((hd.giamGia || 0) * vatFactor);
        tCont += Math.max(0, cTotal - discountValue);

        (dotThanhToan || []).filter(d => d.maHopDong === hd.maHopDong)
            .forEach(r => { tPayment += getPaymentRoundBreakdown(r).finalValue; });
    });
    tPayment = Math.round(tPayment);
    const tRem = Math.max(0, tCont - tExec);

    document.getElementById('cpKpiTong').textContent = tienHienThi_(tCont);
    document.getElementById('cpKpiThucHien').textContent = tienHienThi_(tExec);
    document.getElementById('cpKpiPhatSinh').textContent = tienHienThi_(tExtra);
    document.getElementById('cpKpiThanhToan').textContent = tienHienThi_(tPayment);

    // Biểu đồ chi phí toàn bộ đều dựa trên số tiền — không đủ quyền (không phải ADMIN/QS) thì chỉ
    // hiện thông báo khóa thay vì vẽ biểu đồ với số liệu đã ẩn (vô nghĩa với dạng hình ảnh).
    const coQuyen = canXemGiaTriHopDong();
    document.getElementById('cpChartsCard').style.display = coQuyen ? '' : 'none';
    document.getElementById('cpSCurveCard').style.display = coQuyen ? '' : 'none';
    document.getElementById('cpLockedNote').style.display = coQuyen ? 'none' : '';
    if (coQuyen) {
        renderCpPieChart_(tExec, tRem);
        renderCpMonthlyChart_(monthlyMap);
        renderCpSCurveChart_(planMonthlyMap, monthlyMap);
    }
}

function renderCpPieChart_(tExec, tRem) {
    const canvas = document.getElementById('cpPieChart');
    if (cpPieChartInstance) cpPieChartInstance.destroy();
    cpPieChartInstance = new Chart(canvas.getContext('2d'), {
        type: 'pie',
        plugins: [PIE_OUTSIDE_LABELS_PLUGIN],
        data: {
            labels: ['Sản lượng đã thực hiện', 'Giá trị còn lại'],
            datasets: [{ data: [tExec, tRem], backgroundColor: [BC_STATUS_COLORS.done, BC_STATUS_COLORS.pending], borderWidth: 0 }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            // Đồng bộ với biểu đồ "Báo cáo Công việc": chừa khoảng trống quanh vòng tròn cho "râu" + %.
            layout: { padding: 44 },
            plugins: { legend: { display: false } }
        }
    });

    const total = tExec + tRem;
    const pctExec = total > 0 ? Math.round((tExec / total) * 1000) / 10 : 0;
    const pctRem = total > 0 ? Math.round((tRem / total) * 1000) / 10 : 0;
    // 1 hàng ngang gọn dưới biểu đồ, chỉ chấm màu + nhãn + % — bỏ số tiền đi kèm cho gọn.
    document.getElementById('cpPieLegend').innerHTML = `
        <div style="display:flex; align-items:center; gap:6px;">
            <div style="width:10px; height:10px; border-radius:50%; background:${BC_STATUS_COLORS.done}; flex-shrink:0;"></div>
            <div style="font-size:0.78rem; color:var(--text-main); white-space:nowrap;">Sản lượng đã thực hiện — ${pctExec}%</div>
        </div>
        <div style="display:flex; align-items:center; gap:6px;">
            <div style="width:10px; height:10px; border-radius:50%; background:${BC_STATUS_COLORS.pending}; flex-shrink:0;"></div>
            <div style="font-size:0.78rem; color:var(--text-main); white-space:nowrap;">Giá trị còn lại — ${pctRem}%</div>
        </div>`;
}

function renderCpMonthlyChart_(monthlyMap) {
    let sortedMonths = Object.keys(monthlyMap).sort();
    if (sortedMonths.length > 6) sortedMonths = sortedMonths.slice(-6);
    if (sortedMonths.length === 0) {
        const d = new Date();
        const m = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        sortedMonths = [m]; monthlyMap[m] = 0;
    }
    const labels = sortedMonths.map(m => { const p = m.split('-'); return p[1] + '/' + p[0]; });
    const values = sortedMonths.map(m => Math.round(monthlyMap[m] || 0));

    const canvas = document.getElementById('cpMonthlyChart');
    if (cpMonthlyChartInstance) cpMonthlyChartInstance.destroy();
    cpMonthlyChartInstance = new Chart(canvas.getContext('2d'), {
        data: {
            labels,
            datasets: [
                { type: 'bar', label: 'Sản lượng thực hiện', data: values, backgroundColor: BC_STATUS_COLORS.inprogress, borderRadius: 4, maxBarThickness: 50, barPercentage: 0.6 },
                { type: 'line', label: 'Xu hướng', data: values, borderColor: BC_STATUS_COLORS.done, borderWidth: 2, fill: false, tension: 0.3, pointBackgroundColor: BC_STATUS_COLORS.done }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.raw.toLocaleString('vi-VN') + ' đ' } }
            },
            scales: {
                y: { beginAtZero: true, ticks: { font: { size: 10 }, callback: v => formatTienGon_(v) } },
                x: { grid: { display: false }, ticks: { font: { size: 10 } } }
            }
        }
    });
}

function renderCpSCurveChart_(planMonthlyMap, monthlyMap) {
    const allMonths = Array.from(new Set([...Object.keys(planMonthlyMap), ...Object.keys(monthlyMap)])).sort();
    document.getElementById('cpSCurveEmptyNote').style.display = Object.keys(planMonthlyMap).length === 0 ? 'block' : 'none';

    let months = allMonths;
    if (months.length === 0) {
        const d = new Date();
        months = [d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0')];
    }

    let cumPlan = 0, cumActual = 0;
    const labels = months.map(m => { const p = m.split('-'); return p[1] + '/' + p[0]; });
    const planData = months.map(m => { cumPlan += (planMonthlyMap[m] || 0); return Math.round(cumPlan); });
    const actualData = months.map(m => { cumActual += (monthlyMap[m] || 0); return Math.round(cumActual); });

    const canvas = document.getElementById('cpSCurveChart');
    if (cpSCurveChartInstance) cpSCurveChartInstance.destroy();
    cpSCurveChartInstance = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: 'Kế hoạch lũy kế', data: planData, borderColor: '#E8A93D', borderDash: [6, 4], borderWidth: 2, fill: false, tension: 0.25, pointRadius: 3, pointBackgroundColor: '#E8A93D' },
                { label: 'Thực tế lũy kế', data: actualData, borderColor: BC_STATUS_COLORS.done, backgroundColor: 'rgba(79,139,98,0.12)', borderWidth: 2, fill: true, tension: 0.25, pointRadius: 3, pointBackgroundColor: BC_STATUS_COLORS.done }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.raw.toLocaleString('vi-VN') + ' đ' } }
            },
            scales: {
                y: { beginAtZero: true, ticks: { font: { size: 10 }, callback: v => formatTienGon_(v) } },
                x: { grid: { display: false }, ticks: { font: { size: 10 } } }
            }
        }
    });
}

// Rút gọn số tiền lớn cho trục biểu đồ (Tỷ/Tr) — chỉ dùng để hiển thị trục, không dùng để tính toán.
function formatTienGon_(value) {
    if (value >= 1000000000) return (value / 1000000000).toFixed(1) + ' Tỷ';
    if (value >= 1000000) return (value / 1000000).toFixed(0) + ' Tr';
    return value;
}
</script>
