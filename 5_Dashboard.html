<script>
/* ================================================================
   FILE 5: 5_Dashboard.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Tổng quan" — báo cáo tổng hợp tự sinh từ Nhật ký tiến
   độ, theo đơn vị CÔNG VIỆC. 2 phần:
   - Báo cáo tổng: biểu đồ tròn (tỷ lệ trạng thái) + biểu đồ thanh (số
     công việc theo Người phụ trách).
   - Báo cáo chi tiết: chọn 1 Gói thầu hoặc 1 Hạng mục, xem danh sách
     Công việc + % + trạng thái của đúng lựa chọn đó.

   DANH SÁCH HÀM CHÍNH:
   - renderDashboard()      : Gọi getBaoCaoTongHop() rồi vẽ lại 2 biểu đồ + đổ danh sách chọn
   - renderBcCharts()       : Vẽ biểu đồ tròn trạng thái + biểu đồ thanh theo người phụ trách
   - onBcDetailTypeChange() : Đổi giữa "Xem theo Gói thầu" / "Xem theo Hạng mục"
   - renderBcDetail()       : Vẽ bảng chi tiết theo Gói thầu/Hạng mục đang chọn
   ================================================================ */

let bcAllCongViec = [];
let bcPieChartInstance = null;
let bcBarChartInstance = null;
const BC_STATUS_COLORS = { ok: '#2E7D4F', late: '#B8860B', bad: '#C23B3B', done: '#94a3b8' };

function renderDashboard() {
    gsRun('getBaoCaoTongHop').then(json => {
        const parsed = JSON.parse(json);
        bcAllCongViec = parsed.congViec || [];
        document.getElementById('bc-kpi-total').textContent = bcAllCongViec.length;
        renderBcCharts();
        fillBcDetailSelect();
        renderBcDetail();
        document.getElementById('bcUpdatedAt').textContent = new Date().toLocaleString('vi-VN');
    }).catch(handleBackendError);
}

function renderBcCharts() {
    const counts = { ok: 0, late: 0, bad: 0, done: 0 };
    bcAllCongViec.forEach(cv => { if (counts[cv.trangThaiMau] !== undefined) counts[cv.trangThaiMau]++; });

    const pieCanvas = document.getElementById('bcPieChart');
    if (bcPieChartInstance) bcPieChartInstance.destroy();
    bcPieChartInstance = new Chart(pieCanvas.getContext('2d'), {
        type: 'pie',
        data: {
            labels: ['Đúng/vượt tiến độ', 'Trễ nhẹ', 'Trễ nghiêm trọng', 'Hoàn thành'],
            datasets: [{ data: [counts.ok, counts.late, counts.bad, counts.done], backgroundColor: [BC_STATUS_COLORS.ok, BC_STATUS_COLORS.late, BC_STATUS_COLORS.bad, BC_STATUS_COLORS.done] }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } } }
    });

    const countsByUser = {};
    bcAllCongViec.forEach(cv => { countsByUser[cv.nguoiTaoId] = (countsByUser[cv.nguoiTaoId] || 0) + 1; });
    const entries = Object.entries(countsByUser).sort((a, b) => b[1] - a[1]);

    const barCanvas = document.getElementById('bcBarChart');
    if (bcBarChartInstance) bcBarChartInstance.destroy();
    bcBarChartInstance = new Chart(barCanvas.getContext('2d'), {
        type: 'bar',
        data: {
            labels: entries.map(([id]) => nameOfUser(id)),
            datasets: [{ label: 'Số công việc', data: entries.map(([, c]) => c), backgroundColor: '#E85D2C' }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 } } }
        }
    });
}

function fillBcDetailSelect() {
    const type = document.getElementById('bcDetailType').value;
    const sel = document.getElementById('bcDetailSelect');
    const currentVal = sel.value;
    let html = '';
    if (type === 'goithau') {
        html = goiThau.map(g => `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`).join('');
    } else {
        html = hangMuc.map(h => `<option value="${h.maHangMuc}">${h.maHangMuc} — ${h.tenHangMuc}</option>`).join('');
    }
    sel.innerHTML = html || '<option value="">-- Chưa có dữ liệu --</option>';
    if (currentVal && Array.from(sel.options).some(o => o.value === currentVal)) sel.value = currentVal;
}

function onBcDetailTypeChange() {
    document.getElementById('bcDetailSelect').value = '';
    fillBcDetailSelect();
    renderBcDetail();
}

function renderBcDetail() {
    const type = document.getElementById('bcDetailType').value;
    const val = document.getElementById('bcDetailSelect').value;
    const tbody = document.getElementById('bcDetailBody');

    if (!val) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center" style="color:gray; padding:15px;">Chưa có dữ liệu.</td></tr>';
        return;
    }

    const rows = bcAllCongViec.filter(cv => type === 'goithau' ? cv.maGoiThau === val : cv.maHangMuc === val);
    if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center" style="color:gray; padding:15px;">Chưa có công việc nào.</td></tr>';
        return;
    }

    tbody.innerHTML = rows.map(cv => `
        <tr>
            <td>${cv.tenCongViec}</td>
            <td class="text-center">${nameOfUser(cv.nguoiTaoId)}</td>
            <td class="text-center">${cv.luyKe || 0}%</td>
            <td class="text-center"><span class="bc-badge ${cv.trangThaiMau}">${TRANGTHAI_LABEL[cv.trangThaiMau] || '--'}</span></td>
        </tr>`).join('');
}
</script>
