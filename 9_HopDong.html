<script>
/* ================================================================
   FILE 9: 9_HopDong.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Hợp đồng" trong nhóm "Quản lý hợp đồng" — danh sách
   Hợp đồng + chọn "Hợp đồng đang xem" (biến currentHopDongId) dùng
   chung cho BOQ/Nghiệm thu/Thanh toán/Quyết toán, giống cách app cũ
   dùng currentContractId. Ai cũng xem được, chỉ ADMIN thêm/sửa/xóa.

   Cũng chứa vài hàm dùng chung cho toàn module Hợp đồng (định dạng
   tiền, tra tên Hợp đồng, tính giá trị hiện hành) vì file này nạp
   trước các file 10-14 (xem thứ tự include ở Index.html).

   DANH SÁCH HÀM CHÍNH:
   - renderHopDongList()    : Vẽ bảng Hợp đồng + dải "đang chọn"
   - chonHopDong(id, tab?)  : Đặt currentHopDongId, có thể nhảy luôn sang tab khác
   - openHopDongModal(id)   : Mở modal thêm/sửa Hợp đồng
   - saveHopDongModal()     : Lưu Hợp đồng qua adminSaveHopDong
   - giaTriHienHanhHopDong(maHopDong) : Tổng giá trị HĐ hiện hành (dùng chung nhiều nơi)
   ================================================================ */

let currentHopDongId = '';

// Đơn giá/Thành tiền/Giá trị (tiền tệ) — làm tròn về số nguyên (đồng).
function formatTien(n) {
    return Math.round(n || 0).toLocaleString('vi-VN');
}

// Khối lượng — làm tròn 3 chữ số thập phân, không hiện số 0 thừa (VD: 12 thay vì 12.000).
function khoiLuongHienThi_(n) {
    const num = Math.round((n || 0) * 1000) / 1000;
    return num.toLocaleString('vi-VN', { maximumFractionDigits: 3 });
}

function tenHopDong(maHopDong) {
    const hd = hopDong.find(h => h.maHopDong === maHopDong);
    return hd ? hd.tenHopDong : (maHopDong || '--');
}

// Tổng giá trị Hợp đồng hiện hành (Tổng KL hiệu lực x Đơn giá hiệu lực, trừ Giảm giá) — chưa gồm
// thuế GTGT, dùng làm mẫu số tính tỷ lệ Thu hồi tạm ứng và hiển thị nhanh trên danh sách.
function giaTriHienHanhHopDong(maHopDong) {
    const items = boq.filter(b => b.maHopDong === maHopDong && !b.isHeader);
    const hd = hopDong.find(h => h.maHopDong === maHopDong);
    const total = items.reduce((s, b) => s + (b.khoiLuongHieuLuc || 0) * (b.donGiaHieuLuc || 0), 0);
    return Math.max(0, Math.round(total) - ((hd && hd.giamGia) || 0));
}

// Chỉ Quản trị hoặc Giám sát có Chức danh "QS" mới được xem SỐ TIỀN (đơn giá/giá trị/thanh toán...)
// và sửa dữ liệu Hợp đồng — người khác vẫn xem được khối lượng bình thường, số tiền ẩn qua
// tienHienThi_() (xem kiemTraQuyenHopDong_() ở Code.js, phải khớp đúng luật này ở backend).
function canXemGiaTriHopDong() {
    return currentRole === 'ADMIN' || String(myChucDanh || '').trim().toUpperCase() === 'QS';
}

function canEditHopDong() {
    return canXemGiaTriHopDong();
}

// Định dạng tiền có kiểm tra quyền — không đủ quyền thì trả về "*********" thay vì số thật.
function tienHienThi_(n) {
    return canXemGiaTriHopDong() ? formatTien(n) : '*********';
}

// Đặt "Hợp đồng đang xem" — dùng ở dải chọn nhanh trong danh sách và ở các tab BOQ/Nghiệm thu/
// Thanh toán/Quyết toán khi chưa có gì được chọn. Nếu truyền kèm tabId thì nhảy luôn sang tab đó.
function chonHopDong(maHopDong, tabId) {
    currentHopDongId = maHopDong;
    if (tabId) switchTab(tabId);
    else renderHopDongList();
}

// Đổ danh sách Hợp đồng vào 1 select "Hợp đồng đang xem" — dùng chung cho BOQ/Nghiệm thu/Thanh
// toán/Quyết toán, mỗi tab có select riêng (độc lập, không cần quay lại tab "Hợp đồng" trước) nhưng
// luôn đồng bộ theo currentHopDongId hiện tại.
function fillHopDongSelect_(selectId) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    sel.innerHTML = '<option value="">-- Chọn Hợp đồng --</option>' +
        (hopDong || []).map(h => `<option value="${h.maHopDong}">${h.tenHopDong}</option>`).join('');
    sel.value = currentHopDongId || '';
}

// Dòng "Hợp đồng số: ..." đặt ngay dưới tiêu đề bảng ở BOQ/Nghiệm thu/Thanh toán/Quyết toán — dùng
// chung để khỏi lặp lại ở info riêng của từng tab (giá trị hiện hành/trạng thái Quyết toán...).
function renderHopDongSoLine_(elId, hd) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.textContent = hd ? `Hợp đồng số: ${hd.tenHopDong} - ${hd.nhaThau || '--'}` : '';
}

function renderHopDongList() {
    const tbody = document.getElementById('hopDongBody');
    if (!tbody) return;
    const btnThem = document.getElementById('btnThemHopDong');
    if (btnThem) btnThem.style.display = canEditHopDong() ? '' : 'none';
    if (hopDong.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center" style="color:gray; padding:15px;">Chưa có Hợp đồng nào.</td></tr>`;
    } else {
        tbody.innerHTML = hopDong.map(hd => {
            const g = goiThau.find(x => x.maGoiThau === hd.maGoiThau);
            const dangChon = hd.maHopDong === currentHopDongId;
            return `<tr class="${dangChon ? 'hd-row-active' : ''}">
                <td><span class="mono">${hd.tenHopDong}</span>${dangChon ? ' <span class="bc-badge inprogress">Đang xem</span>' : ''}</td>
                <td>${hd.nhaThau || '--'}</td>
                <td>${g ? g.tenGoiThau : '--'}</td>
                <td class="text-center">${formatVN(hd.ngayKy)}</td>
                <td class="text-right">${tienHienThi_(giaTriHienHanhHopDong(hd.maHopDong))}</td>
                <td class="text-center">
                    <div class="action-cell">
                        <button class="btn btn-sm" style="background:var(--primary);" onclick="chonHopDong('${hd.maHopDong}', 'boq')" aria-label="Xem BOQ" title="Xem BOQ"><i class="fa-solid fa-list-check"></i></button>
                        <button class="btn btn-sm" style="background:var(--info);" onclick="chonHopDong('${hd.maHopDong}', 'thanhtoan')" aria-label="Xem Thanh toán" title="Xem Thanh toán"><i class="fa-solid fa-money-check-dollar"></i></button>
                        ${canEditHopDong() ? `
                        <button class="btn btn-sm" style="background:var(--accent);" onclick="openHopDongModal('${hd.maHopDong}')" aria-label="Sửa Hợp đồng" title="Sửa Hợp đồng"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteHopDong('${hd.maHopDong}')" aria-label="Xóa Hợp đồng" title="Xóa Hợp đồng"><i class="fa-solid fa-trash"></i></button>` : ''}
                    </div>
                </td>
            </tr>`;
        }).join('');
    }
}

function openHopDongModal(maHopDong) {
    const hd = maHopDong ? hopDong.find(h => h.maHopDong === maHopDong) : null;
    document.getElementById('hopDongModalTitle').textContent = hd ? 'Sửa Hợp đồng' : 'Thêm Hợp đồng';
    document.getElementById('hdEditId').value = hd ? hd.maHopDong : '';
    document.getElementById('hdTen').value = hd ? hd.tenHopDong : '';
    document.getElementById('hdNhaThau').value = hd ? hd.nhaThau : '';
    document.getElementById('hdNgayKy').value = hd ? formatVN(hd.ngayKy) : '';
    document.getElementById('hdTamUngHopDong').value = hd ? hd.tamUngHopDong : '';
    document.getElementById('hdTamUngThiCong').value = hd ? hd.tamUngThiCong : '';
    document.getElementById('hdThueVAT').value = hd ? hd.thueVAT : 10;
    document.getElementById('hdGiamGia').value = hd ? hd.giamGia : '';

    const gtSelect = document.getElementById('hdGoiThau');
    gtSelect.innerHTML = '<option value="">-- Chưa gắn Gói thầu --</option>' +
        goiThau.map(g => `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`).join('');
    gtSelect.value = hd ? (hd.maGoiThau || '') : '';

    document.getElementById('hopDongModal').classList.add('active');
    setTimeout(() => {
        try {
            if (typeof flatpickr !== 'undefined') {
                const el = document.getElementById('hdNgayKy');
                if (!el._flatpickr) flatpickr(el, { dateFormat: 'd/m/Y', locale: (flatpickr.l10ns && flatpickr.l10ns.vi) ? 'vi' : undefined, allowInput: true });
            }
        } catch (e) { console.warn(e); }
    }, 100);
}

function closeHopDongModal() {
    document.getElementById('hopDongModal').classList.remove('active');
}

function saveHopDongModal() {
    const payload = {
        maHopDong: document.getElementById('hdEditId').value,
        tenHopDong: document.getElementById('hdTen').value.trim(),
        maGoiThau: document.getElementById('hdGoiThau').value,
        nhaThau: document.getElementById('hdNhaThau').value.trim(),
        ngayKy: convertDMYtoISO(document.getElementById('hdNgayKy').value.trim()) || '',
        tamUngHopDong: parseNumberSafely(document.getElementById('hdTamUngHopDong').value) || 0,
        tamUngThiCong: parseNumberSafely(document.getElementById('hdTamUngThiCong').value) || 0,
        thueVAT: parseNumberSafely(document.getElementById('hdThueVAT').value) || 0,
        giamGia: parseNumberSafely(document.getElementById('hdGiamGia').value) || 0
    };
    if (!payload.tenHopDong) { showCustomAlert('Vui lòng nhập Tên hợp đồng!', 'error'); return; }

    gsRun('adminSaveHopDong', myUserId, myPassword, payload)
        .then(() => {
            showCustomAlert('Đã lưu Hợp đồng.', 'success');
            closeHopDongModal();
            reloadHopDongData();
        })
        .catch(handleBackendError);
}

function deleteHopDong(maHopDong) {
    const hd = hopDong.find(h => h.maHopDong === maHopDong);
    if (!hd) return;
    if (!confirm(`Xác nhận XÓA Hợp đồng "${hd.tenHopDong}"? (BOQ/Nghiệm thu/Thanh toán liên quan vẫn được giữ lại)`)) return;
    gsRun('adminXoaHopDong', myUserId, myPassword, maHopDong)
        .then(() => { showCustomAlert('Đã xóa Hợp đồng.', 'success'); reloadHopDongData(); })
        .catch(handleBackendError);
}

// --- Nhập Excel dùng chung cho BOQ/Nghiệm thu/Thanh toán (thư viện SheetJS, xem Index.html) ---

// Đoán cấp từ chuỗi STT — số La Mã (I,II..)=0, 1 chữ cái (A,B..)=1, số nguyên (1,2..)=2, số có dấu
// chấm (1.1, 1.1.2..)=3, không nhận diện được thì -1. Port nguyên mẫu app cũ (getLevelFromSTT).
function layCapTuSTT_(stt) {
    if (!stt) return -1;
    const s = String(stt).trim().toUpperCase().replace(/\.$/, '');
    if (/^\d+(\.\d+)+$/.test(s)) return 3;
    if (/^\d+$/.test(s)) return 2;
    const roman = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII', 'XIII', 'XIV', 'XV'];
    if (roman.includes(s)) return 0;
    if (/^[A-Z]$/.test(s)) return 1;
    return -1;
}

// Đọc file Excel (.xlsx/.xls/.csv) thành mảng dòng (mỗi dòng là mảng ô, dòng 0 = tiêu đề).
function docFileExcel_(file) {
    return new Promise((resolve, reject) => {
        if (typeof XLSX === 'undefined') { reject(new Error('Chưa tải xong thư viện đọc Excel, vui lòng thử lại sau vài giây.')); return; }
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: '' });
                resolve(rows);
            } catch (err) { reject(err); }
        };
        reader.onerror = () => reject(new Error('Không đọc được file.'));
        reader.readAsArrayBuffer(file);
    });
}

// Ngày Excel có thể là Date object, số serial, hoặc chuỗi dd/mm/yyyy — chuyển hết về yyyy-MM-dd.
function ngayExcelToISO_(value) {
    if (value instanceof Date && !isNaN(value.getTime())) {
        return value.getFullYear() + '-' + String(value.getMonth() + 1).padStart(2, '0') + '-' + String(value.getDate()).padStart(2, '0');
    }
    if (typeof value === 'number' && value > 0) {
        const d = new Date(Math.round((value - 25569) * 86400 * 1000));
        if (!isNaN(d.getTime())) return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    if (typeof value === 'string' && value.trim()) {
        const iso = convertDMYtoISO(value.trim());
        if (iso) return iso;
        if (/^\d{4}-\d{2}-\d{2}$/.test(value.trim())) return value.trim();
    }
    return '';
}

// Khớp 1 dòng Excel (STT+Tên) với đúng 1 hạng mục BOQ của Hợp đồng đang chọn — so sánh không phân
// biệt hoa/thường, bỏ khoảng trắng thừa, giống hệt cách app cũ khớp (importProgressExcel).
function khopBOQTheoSttTen_(stt, ten) {
    const cleanStt = String(stt || '').toLowerCase().replace(/\.$/, '').trim();
    const cleanTen = String(ten || '').toLowerCase().replace(/\s+/g, ' ').trim();
    return (boq || []).find(b => b.maHopDong === currentHopDongId
        && String(b.stt || '').toLowerCase().replace(/\.$/, '').trim() === cleanStt
        && String(b.tenHangMuc || '').toLowerCase().replace(/\s+/g, ' ').trim() === cleanTen);
}
</script>
