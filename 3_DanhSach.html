<script>
/* ================================================================
   FILE 3: 3_DanhSach.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Gói thầu/Hạng mục" (chỉ Admin) — quản lý 2 khối dữ
   liệu tham chiếu dùng chung cho cả Công việc lẫn Hợp đồng: cây Hạng
   mục (mã/tên/cấp/cha-con) và danh sách Gói thầu (gộp nhiều Hạng mục).

   KHÔNG còn nút Sửa/Xóa (cây bút/thùng rác) trên từng dòng — thay
   bằng 2 nút "Chỉnh sửa" / "Xóa" chung ở đầu mỗi bảng, mở modal kèm
   1 dropdown để CHỌN đúng dòng cần thao tác (xem fillHmPicker_()/
   fillGtPicker_() và modal ở Index.html).

   DANH SÁCH HÀM CHÍNH:
   - renderDanhSach()       : Vẽ lại cả 2 bảng (gọi khi tab active)
   - renderHangMucRefList() : Vẽ bảng Hạng mục (không còn cột Hành động)
   - renderGoiThauList()    : Vẽ bảng Gói thầu (không còn cột Hành động)
   - openHangMucModal(mode) : mode='manage' mở kèm picker Sửa/Xóa, không truyền = Thêm mới
   - openGoiThauModal(mode) : tương tự, cho Gói thầu
   ================================================================ */

function renderDanhSach() {
    renderHangMucRefList();
    renderGoiThauList();
}

function renderHangMucRefList() {
    const body = document.getElementById('hangMucRefBody');
    if (!body) return;
    if (currentRole !== 'ADMIN') { body.innerHTML = ''; return; }
    if (hangMuc.length === 0) {
        body.innerHTML = '<tr><td colspan="3" class="text-center" style="color:gray; padding:15px;">Chưa có Hạng mục nào.</td></tr>';
        return;
    }

    const byStt = (a, b) => (a.stt || 0) - (b.stt || 0);
    const childrenByParent = {};
    hangMuc.forEach(h => { const key = h.parentId || ''; (childrenByParent[key] = childrenByParent[key] || []).push(h); });
    Object.values(childrenByParent).forEach(list => list.sort(byStt));

    function renderNode(node, depth) {
        let rows = `<tr>
            <td class="text-center mono">${node.stt || '--'}</td>
            <td class="mono">${node.maHangMuc}</td>
            <td style="padding-left:${depth * 18}px;">${node.tenHangMuc}</td>
        </tr>`;
        (childrenByParent[node.maHangMuc] || []).forEach(child => { rows += renderNode(child, depth + 1); });
        return rows;
    }

    let html = '';
    (childrenByParent[''] || []).forEach(root => { html += renderNode(root, 0); });
    body.innerHTML = html;
}

function renderGoiThauList() {
    const body = document.getElementById('goiThauBody');
    if (!body) return;
    if (currentRole !== 'ADMIN') { body.innerHTML = ''; return; }
    if (goiThau.length === 0) {
        body.innerHTML = '<tr><td colspan="3" class="text-center" style="color:gray; padding:15px;">Chưa có Gói thầu nào.</td></tr>';
        return;
    }
    const sorted = goiThau.slice().sort((a, b) => (a.stt || 0) - (b.stt || 0));
    body.innerHTML = sorted.map(g => {
        const names = g.maHangMucList.map(id => { const h = findHangMuc(id); return h ? h.maHangMuc : id; }).join(', ');
        return `<tr><td class="text-center mono">${g.stt || '--'}</td><td>${g.tenGoiThau}</td><td>${names || '--'}</td></tr>`;
    }).join('');
}

// --- HẠNG MỤC: modal dùng chung cho Thêm (mode bỏ trống) và Sửa/Xóa (mode='manage', có picker) ---

function fillHmPicker_(selectedId) {
    const sel = document.getElementById('hmPicker');
    sel.innerHTML = '<option value="">-- Chọn Hạng mục --</option>' +
        hangMuc.map(h => `<option value="${h.maHangMuc}">${h.maHangMuc} — ${h.tenHangMuc}</option>`).join('');
    if (selectedId) sel.value = selectedId;
}

// STT gợi ý cho Hạng mục mới = lớn nhất hiện có + 1 — vẫn sửa tay được trước khi lưu.
function nextHangMucStt_() {
    return hangMuc.reduce((max, h) => Math.max(max, h.stt || 0), 0) + 1;
}

function loadHangMucIntoForm_(maHangMuc) {
    document.getElementById('hmEditId').value = maHangMuc || '';
    const node = maHangMuc ? findHangMuc(maHangMuc) : null;
    document.getElementById('hmStt').value = node ? node.stt : nextHangMucStt_();
    document.getElementById('hmMaHangMuc').value = node ? node.maHangMuc : '';
    document.getElementById('hmTen').value = node ? node.tenHangMuc : '';
    document.getElementById('hmCapDo').value = node ? String(node.capDo) : '1';
    fillParentSelect(document.getElementById('hmParentId'), node ? node.parentId : '', maHangMuc || null);
    document.getElementById('hmDeleteBtn').style.display = node ? '' : 'none';
}

function onHmPickerChange(maHangMuc) {
    loadHangMucIntoForm_(maHangMuc);
}

function openHangMucModal(mode) {
    if (currentRole !== 'ADMIN') { showCustomAlert('Chỉ Quản trị mới có quyền quản lý Hạng mục!', 'error'); return; }
    const isManage = mode === 'manage';
    document.getElementById('hmPickerGroup').style.display = isManage ? '' : 'none';
    document.getElementById('hangMucModalTitle').innerText = isManage ? 'Sửa / Xóa Hạng mục' : 'Thêm Hạng mục';
    if (isManage) fillHmPicker_('');
    loadHangMucIntoForm_('');
    document.getElementById('hangMucModal').classList.add('active');
}

function closeHangMucModal() {
    document.getElementById('hangMucModal').classList.remove('active');
}

// Cho phép đổi Mã hạng mục — backend (adminSaveHangMuc) tự cập nhật dây chuyền mọi Gói thầu/
// Công việc/Hạng mục con đang tham chiếu mã cũ, tránh mồ côi tham chiếu.
function saveHangMucModal() {
    const maHangMuc = document.getElementById('hmMaHangMuc').value.trim();
    const tenHangMuc = document.getElementById('hmTen').value.trim();
    const oldMaHangMuc = document.getElementById('hmEditId').value;
    if (!maHangMuc) { showCustomAlert('Vui lòng nhập Mã Hạng mục!', 'error'); return; }
    if (!tenHangMuc) { showCustomAlert('Vui lòng nhập Tên Hạng mục!', 'error'); return; }
    if (maHangMuc !== oldMaHangMuc && findHangMuc(maHangMuc)) { showCustomAlert('Mã Hạng mục này đã tồn tại!', 'error'); return; }

    const node = {
        maHangMuc,
        oldMaHangMuc,
        tenHangMuc,
        stt: parseInt(document.getElementById('hmStt').value, 10) || 0,
        capDo: parseInt(document.getElementById('hmCapDo').value, 10),
        parentId: document.getElementById('hmParentId').value
    };

    gsRun('adminSaveHangMuc', myUserId, myPassword, node)
        .then(() => {
            closeHangMucModal();
            showCustomAlert('Đã lưu Hạng mục.', 'success');
            reloadCongViecData();
        })
        .catch(handleBackendError);
}

function deleteHangMuc(maHangMuc) {
    if (currentRole !== 'ADMIN') { showCustomAlert('Chỉ Quản trị mới có quyền quản lý Hạng mục!', 'error'); return; }
    const node = findHangMuc(maHangMuc);
    if (!node) return;
    if (!confirm(`Xác nhận XÓA "${node.tenHangMuc}"?`)) return;

    gsRun('adminDeleteHangMuc', myUserId, myPassword, maHangMuc)
        .then(() => {
            showCustomAlert('Đã xoá Hạng mục.', 'success');
            reloadCongViecData();
        })
        .catch(handleBackendError);
}

function deleteHangMucFromModal() {
    const id = document.getElementById('hmEditId').value;
    if (!id) { showCustomAlert('Vui lòng chọn 1 Hạng mục để xóa!', 'error'); return; }
    closeHangMucModal();
    deleteHangMuc(id);
}

// --- GÓI THẦU: modal dùng chung cho Thêm (mode bỏ trống) và Sửa/Xóa (mode='manage', có picker) ---

function fillGoiThauGroupCheckboxes(selectedIds) {
    const container = document.getElementById('gtHangMucIds');
    const sel = new Set(selectedIds || []);
    if (hangMuc.length === 0) {
        container.innerHTML = '<span style="color:gray;">Chưa có Hạng mục nào, vui lòng tạo Hạng mục trước.</span>';
        return;
    }
    container.innerHTML = hangMuc.map(h => `
        <label style="display:flex; align-items:center; gap:6px; margin-bottom:4px; font-weight:400;">
            <input type="checkbox" class="gt-hm-cb" value="${h.maHangMuc}" ${sel.has(h.maHangMuc) ? 'checked' : ''}> ${h.maHangMuc} — ${h.tenHangMuc}
        </label>`).join('');
}

function fillGtPicker_(selectedId) {
    const sel = document.getElementById('gtPicker');
    sel.innerHTML = '<option value="">-- Chọn Gói thầu --</option>' +
        goiThau.map(g => `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`).join('');
    if (selectedId) sel.value = selectedId;
}

// STT gợi ý cho Gói thầu mới = lớn nhất hiện có + 1 — vẫn sửa tay được trước khi lưu.
function nextGoiThauStt_() {
    return goiThau.reduce((max, g) => Math.max(max, g.stt || 0), 0) + 1;
}

function loadGoiThauIntoForm_(maGoiThau) {
    document.getElementById('gtEditId').value = maGoiThau || '';
    const g = maGoiThau ? goiThau.find(x => x.maGoiThau === maGoiThau) : null;
    document.getElementById('gtStt').value = g ? g.stt : nextGoiThauStt_();
    document.getElementById('gtTen').value = g ? g.tenGoiThau : '';
    fillGoiThauGroupCheckboxes(g ? g.maHangMucList : []);
    document.getElementById('gtDeleteBtn').style.display = g ? '' : 'none';
}

function onGtPickerChange(maGoiThau) {
    loadGoiThauIntoForm_(maGoiThau);
}

function openGoiThauModal(mode) {
    if (currentRole !== 'ADMIN') { showCustomAlert('Chỉ Quản trị mới có quyền quản lý Gói thầu!', 'error'); return; }
    const isManage = mode === 'manage';
    document.getElementById('gtPickerGroup').style.display = isManage ? '' : 'none';
    document.getElementById('goiThauModalTitle').innerText = isManage ? 'Sửa / Xóa Gói thầu' : 'Thêm Gói thầu';
    if (isManage) fillGtPicker_('');
    loadGoiThauIntoForm_('');
    document.getElementById('goiThauModal').classList.add('active');
}

function closeGoiThauModal() {
    document.getElementById('goiThauModal').classList.remove('active');
}

function saveGoiThauModal() {
    const maGoiThau = document.getElementById('gtEditId').value;
    const tenGoiThau = document.getElementById('gtTen').value.trim();
    if (!tenGoiThau) { showCustomAlert('Vui lòng nhập Tên gói thầu!', 'error'); return; }
    const maHangMucList = Array.from(document.querySelectorAll('.gt-hm-cb:checked')).map(cb => cb.value);
    const stt = parseInt(document.getElementById('gtStt').value, 10) || 0;

    gsRun('adminSaveGoiThau', myUserId, myPassword, { maGoiThau, tenGoiThau, maHangMucList, stt })
        .then(() => {
            closeGoiThauModal();
            showCustomAlert('Đã lưu Gói thầu.', 'success');
            reloadCongViecData();
        })
        .catch(handleBackendError);
}

function deleteGoiThau(maGoiThau) {
    if (currentRole !== 'ADMIN') { showCustomAlert('Chỉ Quản trị mới có quyền quản lý Gói thầu!', 'error'); return; }
    if (!confirm('Xác nhận XÓA Gói thầu này?')) return;

    gsRun('adminDeleteGoiThau', myUserId, myPassword, maGoiThau)
        .then(() => {
            showCustomAlert('Đã xoá Gói thầu.', 'success');
            reloadCongViecData();
        })
        .catch(handleBackendError);
}

function deleteGoiThauFromModal() {
    const id = document.getElementById('gtEditId').value;
    if (!id) { showCustomAlert('Vui lòng chọn 1 Gói thầu để xóa!', 'error'); return; }
    closeGoiThauModal();
    deleteGoiThau(id);
}

function fillParentSelect(selectEl, selectedId, excludeId) {
    let html = '<option value="">-- Không có (là gốc) --</option>';
    hangMuc.filter(h => h.maHangMuc !== excludeId).forEach(h => {
        html += `<option value="${h.maHangMuc}">${h.maHangMuc} — ${h.tenHangMuc}</option>`;
    });
    selectEl.innerHTML = html;
    if (selectedId) selectEl.value = selectedId;
}
</script>
