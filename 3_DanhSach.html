<script>
/* ================================================================
   FILE 3: 3_DanhSach.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Danh sách" — liệt kê CÔNG VIỆC (đơn vị nhận Nhật ký
   tiến độ), nhóm theo Gói thầu → (I. Phần hồ sơ / II. Phần triển khai
   thi công) → dòng Công việc kèm lũy kế/trạng thái. Lọc theo Gói
   thầu/Phần/người phụ trách/trạng thái/tìm kiếm.

   Bên dưới còn 2 khối admin-only để quản lý dữ liệu tham chiếu:
   cây Hạng mục (mã/tên) và danh sách Gói thầu.

   DANH SÁCH HÀM CHÍNH:
   - renderDanhSach()      : Vẽ bảng Công việc theo bộ lọc hiện tại
   - renderHangMucRefList(): Vẽ bảng quản lý Hạng mục (admin-only)
   - renderGoiThauList()   : Vẽ bảng quản lý Gói thầu (admin-only)
   ================================================================ */

function toggleTaskGroup(key) {
    if (collapsedGroups.has(key)) collapsedGroups.delete(key);
    else collapsedGroups.add(key);
    renderDanhSach();
}

function canEditCongViec(cv) {
    return currentRole === 'ADMIN' || cv.nguoiTaoId === mySupervisorId;
}

function renderCongViecRow(cv) {
    const status = cv.trangThaiMau;
    const meta = (cv.maHangMucList || []).map(id => {
        const hm = findHangMuc(id);
        return hm ? `${hm.maHangMuc} — ${hm.tenHangMuc}` : id;
    }).join('; ');
    const editable = canEditCongViec(cv);
    const chucDanh = chucDanhOfUser(cv.nguoiTaoId);
    const mau = mauChucDanh(chucDanh);
    return `<tr class="task-row">
        <td class="task-name-cell" style="padding-left:48px;">
            <span class="t-name">${cv.tenCongViec}</span>
            <span class="t-target">${meta}</span>
        </td>
        <td class="text-center">${nameOfUser(cv.nguoiTaoId)}</td>
        <td class="text-center">${chucDanh ? `<span class="bc-badge" style="background:${mau.bg}; color:${mau.fg};">${chucDanh}</span>` : '--'}</td>
        <td>
            <div class="gantt-bar-wrap">
                <div class="gantt-track"><div class="gantt-fill status-${status}" style="width:${Math.min(100, cv.luyKe || 0)}%;"></div></div>
                <span class="gantt-pct">${cv.luyKe || 0}%</span>
            </div>
        </td>
        <td class="text-center"><span class="bc-badge ${status}">${TRANGTHAI_LABEL[status] || '--'}</span></td>
        <td class="text-center">
            ${editable ? `<div class="action-cell">
                <button class="btn btn-sm" style="background:var(--primary);" onclick="openCongViecModal('${cv.maCongViec}')"><i class="fa-solid fa-pen"></i></button>
                <button class="btn btn-sm btn-danger" onclick="deleteCongViec('${cv.maCongViec}')"><i class="fa-solid fa-trash"></i></button>
            </div>` : ''}
        </td>
    </tr>`;
}

function renderDanhSach() {
    const gtSelect = document.getElementById('filterGoiThau');
    if (gtSelect.options.length <= 1) {
        let html = '<option value="">-- Tất cả Gói thầu --</option>';
        goiThau.forEach(g => html += `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`);
        gtSelect.innerHTML = html;
    }
    const gsSelect = document.getElementById('filterGS');
    if (gsSelect.options.length <= 1) {
        let html = '<option value="">-- Tất cả người phụ trách --</option>';
        const ids = [...new Set(congViec.map(c => c.nguoiTaoId).filter(Boolean))];
        ids.sort((a, b) => nameOfUser(a).localeCompare(nameOfUser(b)));
        ids.forEach(id => html += `<option value="${id}">${nameOfUser(id)}</option>`);
        gsSelect.innerHTML = html;
    }

    const fGT = gtSelect.value;
    const fPhan = document.getElementById('filterPhanLoai').value;
    const fGS = gsSelect.value;
    const fStatus = document.getElementById('filterTrangThaiMau').value;
    const fSearch = document.getElementById('filterSearch').value.trim().toLowerCase();

    function matches(cv) {
        if (fGT && cv.maGoiThau !== fGT) return false;
        if (fPhan && cv.phanLoai !== fPhan) return false;
        if (fGS && cv.nguoiTaoId !== fGS) return false;
        if (fStatus && cv.trangThaiMau !== fStatus) return false;
        if (fSearch) {
            const hmNames = (cv.maHangMucList || []).map(id => { const hm = findHangMuc(id); return hm ? hm.tenHangMuc : ''; }).join(' ');
            const hay = `${cv.tenCongViec} ${(cv.maHangMucList || []).join(' ')} ${hmNames}`.toLowerCase();
            if (!hay.includes(fSearch)) return false;
        }
        return true;
    }

    const filtered = congViec.filter(matches);

    let html = '';
    goiThau.forEach(g => {
        const items = filtered.filter(c => c.maGoiThau === g.maGoiThau);
        if (items.length === 0) return;

        const gtKey = 'gt:' + g.maGoiThau;
        const gtOpen = !collapsedGroups.has(gtKey);
        html += `<tr class="task-group-row" onclick="toggleTaskGroup('${gtKey}')">
            <td colspan="6"><i class="fa-solid ${gtOpen ? 'fa-chevron-down' : 'fa-chevron-right'}" style="margin-right:8px; color:var(--accent);"></i>${g.tenGoiThau}</td>
        </tr>`;
        if (!gtOpen) return;

        ['ho_so', 'thi_cong'].forEach(phan => {
            const subItems = items.filter(c => c.phanLoai === phan);
            if (subItems.length === 0) return;
            const subKey = gtKey + ':' + phan;
            const subOpen = !collapsedGroups.has(subKey);
            html += `<tr class="task-group-row" onclick="toggleTaskGroup('${subKey}')" style="background:#F2F0E9;">
                <td colspan="6" style="padding-left:28px;"><i class="fa-solid ${subOpen ? 'fa-chevron-down' : 'fa-chevron-right'}" style="margin-right:8px; color:var(--accent);"></i>${PHAN_LOAI_LABEL[phan]}</td>
            </tr>`;
            if (!subOpen) return;
            subItems.forEach(cv => { html += renderCongViecRow(cv); });
        });
    });

    document.getElementById('danhSachBody').innerHTML = html || '<tr><td colspan="6" class="text-center" style="color:gray; padding:20px;">Không có công việc nào khớp bộ lọc.</td></tr>';

    renderHangMucRefList();
    renderGoiThauList();
}

function renderHangMucRefList() {
    const body = document.getElementById('hangMucRefBody');
    if (!body) return;
    if (currentRole !== 'ADMIN') { body.innerHTML = ''; return; }
    if (hangMuc.length === 0) {
        body.innerHTML = '<tr><td colspan="4" class="text-center" style="color:gray; padding:15px;">Chưa có Hạng mục nào.</td></tr>';
        return;
    }

    const childrenByParent = {};
    hangMuc.forEach(h => { const key = h.parentId || ''; (childrenByParent[key] = childrenByParent[key] || []).push(h); });

    let stt = 0;
    function renderNode(node, depth) {
        stt++;
        let rows = `<tr>
            <td class="text-center">${stt}</td>
            <td>${node.maHangMuc}</td>
            <td style="padding-left:${depth * 18}px;">${node.tenHangMuc}</td>
            <td class="text-center">
                <div class="action-cell">
                    <button class="btn btn-sm" style="background:var(--primary);" onclick="openHangMucModal('${node.maHangMuc}')"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteHangMuc('${node.maHangMuc}')"><i class="fa-solid fa-trash"></i></button>
                </div>
            </td>
        </tr>`;
        (childrenByParent[node.maHangMuc] || []).forEach(child => { rows += renderNode(child, depth + 1); });
        return rows;
    }

    let html = '';
    (childrenByParent[''] || []).forEach(root => { html += renderNode(root, 0); });
    body.innerHTML = html;
}

function renderGoiThauList() {
    const body = document.getElementById('goiThauBody');
    if (!body) return;
    if (currentRole !== 'ADMIN') { body.innerHTML = ''; return; }
    if (goiThau.length === 0) {
        body.innerHTML = '<tr><td colspan="3" class="text-center" style="color:gray; padding:15px;">Chưa có Gói thầu nào.</td></tr>';
        return;
    }
    body.innerHTML = goiThau.map(g => {
        const names = g.maHangMucList.map(id => { const h = findHangMuc(id); return h ? h.maHangMuc : id; }).join(', ');
        return `<tr>
            <td>${g.tenGoiThau}</td>
            <td>${names || '--'}</td>
            <td class="text-center">
                <div class="action-cell">
                    <button class="btn btn-sm" style="background:var(--primary);" onclick="openGoiThauModal('${g.maGoiThau}')"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteGoiThau('${g.maGoiThau}')"><i class="fa-solid fa-trash"></i></button>
                </div>
            </td>
        </tr>`;
    }).join('');
}
</script>
