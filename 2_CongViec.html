<script>
/* ================================================================
   FILE 2: 2_CongViec.html
   ------------------------------------------------------------------
   PHẠM VI: Modal SỬA 1 Công việc đã có (đơn vị thật nhận Nhật ký tiến
   độ) — bấm nút Sửa trên 1 dòng trong tab "Công việc cá nhân"
   (4_ViecCuaToi.html). Việc TẠO MỚI (1 hoặc nhiều Công việc cùng lúc)
   nằm ở modal riêng "themCongViecHangLoatModal" (cũng ở
   4_ViecCuaToi.html), KHÔNG dùng modal này nữa.

   Modal Hạng mục/Gói thầu (quản lý dữ liệu tham chiếu, chỉ Admin) đã
   chuyển sang 3_DanhSach.html cùng tab "Gói thầu/Hạng mục".

   DANH SÁCH HÀM CHÍNH:
   - openCongViecModal / saveCongViecModal / deleteCongViec
   ================================================================ */

// ---------- CÔNG VIỆC (Admin hoặc Giám sát tự tạo cho mình) ----------

// Danh sách {id, name} đang được @tag trong ô bình luận đang gõ dở — reset mỗi khi mở modal hoặc
// gửi xong 1 bình luận. cvMentionStart_ = vị trí ký tự "@" của lượt gõ đang gợi ý (để biết vùng cần
// thay thế khi chọn 1 người trong dropdown).
let cvCommentTagged_ = [];
let cvMentionStart_ = -1;

function cvMentionCandidates_(query) {
    const q = String(query || '').toLowerCase();
    return users.filter(u => u.id !== mySupervisorId && u.trangThai !== 'Nghỉ việc' && u.name.toLowerCase().includes(q)).slice(0, 8);
}

function renderCvMentionDropdown_(list) {
    const dd = document.getElementById('cvMentionDropdown');
    if (!list.length) { dd.style.display = 'none'; dd.innerHTML = ''; return; }
    dd.innerHTML = list.map((u, i) => `<div class="cv-mention-item${i === 0 ? ' active' : ''}" data-id="${u.id}" data-name="${u.name}" onclick="selectCvMention_('${u.id}')">${u.name}</div>`).join('');
    dd.style.display = 'block';
}

function onCvCommentInput_(el) {
    const pos = el.selectionStart;
    const before = el.value.slice(0, pos);
    const match = before.match(/@([^\s@]*)$/);
    if (!match) { cvMentionStart_ = -1; document.getElementById('cvMentionDropdown').style.display = 'none'; return; }
    cvMentionStart_ = pos - match[0].length;
    renderCvMentionDropdown_(cvMentionCandidates_(match[1]));
}

function onCvCommentKeydown_(event) {
    const dd = document.getElementById('cvMentionDropdown');
    if (dd.style.display === 'none') return;
    const items = Array.from(dd.querySelectorAll('.cv-mention-item'));
    if (!items.length) return;
    let idx = items.findIndex(it => it.classList.contains('active'));
    if (event.key === 'ArrowDown') {
        event.preventDefault();
        items[idx] && items[idx].classList.remove('active');
        idx = (idx + 1) % items.length;
        items[idx].classList.add('active');
    } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        items[idx] && items[idx].classList.remove('active');
        idx = (idx - 1 + items.length) % items.length;
        items[idx].classList.add('active');
    } else if (event.key === 'Enter' || event.key === 'Tab') {
        if (idx >= 0) { event.preventDefault(); selectCvMention_(items[idx].getAttribute('data-id')); }
    } else if (event.key === 'Escape') {
        dd.style.display = 'none';
    }
}

function selectCvMention_(userId) {
    const u = users.find(x => x.id === userId);
    if (!u || cvMentionStart_ < 0) return;
    const input = document.getElementById('cvCommentInput');
    const pos = input.selectionStart;
    const insert = '@' + u.name + ' ';
    input.value = input.value.slice(0, cvMentionStart_) + insert + input.value.slice(pos);
    const newPos = cvMentionStart_ + insert.length;
    input.setSelectionRange(newPos, newPos);
    input.focus();
    if (!cvCommentTagged_.some(t => t.id === u.id)) cvCommentTagged_.push({ id: u.id, name: u.name });
    cvMentionStart_ = -1;
    document.getElementById('cvMentionDropdown').style.display = 'none';
}

document.addEventListener('click', e => {
    if (!e.target.closest('.cv-comment-input-row')) {
        const dd = document.getElementById('cvMentionDropdown');
        if (dd) dd.style.display = 'none';
    }
});

function fillCvGoiThauSelect(selectedId) {
    const sel = document.getElementById('cvGoiThau');
    let html = '<option value="">-- Chọn Gói thầu --</option>';
    goiThau.forEach(g => html += `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`);
    sel.innerHTML = html;
    if (selectedId) sel.value = selectedId;
}

// Hạng mục chọn được giới hạn theo đúng danh sách đã gộp trong Gói thầu đang chọn — chọn được
// 1 hoặc nhiều (checkbox), chỉ hiện Mã hạng mục cho gọn (đủ để lọc/báo cáo sau này).
function fillCvHangMucCheckboxes(maGoiThau, selectedIds) {
    const container = document.getElementById('cvHangMucIds');
    const sel = new Set(selectedIds || []);
    if (!maGoiThau) {
        container.innerHTML = '<span style="color:gray;">-- Chọn Gói thầu trước --</span>';
        return;
    }
    const g = goiThau.find(x => x.maGoiThau === maGoiThau);
    const list = g ? hangMuc.filter(h => g.maHangMucList.includes(h.maHangMuc)) : [];
    if (list.length === 0) {
        container.innerHTML = '<span style="color:gray;">-- Gói thầu này chưa gộp Hạng mục nào --</span>';
        return;
    }
    container.innerHTML = list.map(h => `
        <label style="display:flex; align-items:center; gap:6px; margin-bottom:4px; font-weight:400;">
            <input type="checkbox" class="cv-hm-cb" value="${h.maHangMuc}" ${sel.has(h.maHangMuc) ? 'checked' : ''}> ${h.maHangMuc}
        </label>`).join('');
}

function onCvGoiThauChange() {
    fillCvHangMucCheckboxes(document.getElementById('cvGoiThau').value, []);
}

// Tô đậm "@Tên" trong nội dung bình luận cho những người thực sự đã được @tag (dựa vào
// c.nguoiDuocTag, không suy đoán từ text để tránh tô nhầm khi trùng ký tự "@").
function cvHighlightMentions_(noiDung, nguoiDuocTag) {
    if (!nguoiDuocTag || !nguoiDuocTag.length) return noiDung;
    let html = noiDung;
    nguoiDuocTag.forEach(id => {
        const u = users.find(x => x.id === id);
        if (!u) return;
        const escaped = u.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        html = html.replace(new RegExp('@' + escaped + '(?!\\w)', 'g'), `<span class="cv-mention">@${u.name}</span>`);
    });
    return html;
}

function renderCvComments(list) {
    const box = document.getElementById('cvCommentList');
    if (!box) return;
    box.innerHTML = (!list || list.length === 0)
        ? '<div class="cv-comment-empty">Chưa có bình luận nào.</div>'
        : list.map(c => `
            <div class="cv-comment-item">
                <div class="cv-comment-meta"><b>${c.nguoiBinhLuanTen}</b> <span>${c.thoiGian}</span></div>
                <div class="cv-comment-noidung">${cvHighlightMentions_(c.noiDung, c.nguoiDuocTag)}</div>
            </div>`).join('');
    box.scrollTop = box.scrollHeight;
}

// Phản hồi ngay tại chỗ (thêm bình luận vào danh sách) — không đóng modal, để bình luận liên tiếp
// được, giống mẫu "phản hồi ngay, tải lại nền" dùng khắp app.
function guiBinhLuanCongViec() {
    const maCongViec = document.getElementById('cvEditId').value;
    const input = document.getElementById('cvCommentInput');
    const noiDung = input.value.trim();
    if (!maCongViec || !noiDung) return;

    // Chỉ gửi kèm những người @tag mà "@Tên" của họ vẫn còn trong nội dung lúc gửi (phòng trường
    // hợp người dùng chọn @tag rồi xoá tay đoạn đó trước khi bấm gửi).
    const taggedIds = cvCommentTagged_.filter(t => noiDung.includes('@' + t.name)).map(t => t.id);

    gsRun('themBinhLuanCongViec', myUserId, myPassword, maCongViec, noiDung, taggedIds)
        .then(() => {
            input.value = '';
            cvCommentTagged_ = [];
            return gsRun('getBinhLuanCongViec', maCongViec);
        })
        .then(json => renderCvComments(JSON.parse(json)))
        .catch(handleBackendError);
}

// Chỉ dùng để SỬA 1 Công việc đã có — maCongViec luôn bắt buộc (tạo mới nằm ở modal bulk riêng).
function openCongViecModal(maCongViec) {
    if (currentRole === 'VIEW') { showCustomAlert('Vui lòng đăng nhập để thao tác!', 'error'); return; }
    const cv = congViec.find(x => x.maCongViec === maCongViec);
    if (!cv) return;

    document.getElementById('cvEditId').value = maCongViec;
    document.getElementById('congViecModalTitle').innerText = 'Sửa công việc';
    // Modal này chỉ dùng để SỬA (maCongViec luôn có), nên khối Bình luận luôn cần hiện — style mặc
    // định "display:none" trên thẻ chỉ để tránh nháy khi trang vừa tải xong, chưa kịp chạy JS.
    document.getElementById('cvCommentSection').style.display = '';
    fillCvGoiThauSelect(cv.maGoiThau);
    fillCvHangMucCheckboxes(cv.maGoiThau, cv.maHangMucList);
    document.getElementById('cvTen').value = cv.tenCongViec;
    document.getElementById('cvBatDau').value = formatVN(cv.ngayBatDauKH);
    document.getElementById('cvKetThuc').value = formatVN(cv.ngayKetThucKH);

    const giaoBoiInfo = document.getElementById('cvGiaoBoiInfo');
    if (cv.nguoiGiaoId) {
        giaoBoiInfo.style.display = '';
        giaoBoiInfo.innerHTML = `<span style="font-size:0.85rem; color:var(--text-muted);">Được <b>${cv.nguoiGiaoTen}</b> giao cho <b>${cv.nguoiTaoTen}</b></span>`;
    } else {
        giaoBoiInfo.style.display = 'none';
    }

    // Xem việc của người khác (không phải Admin, không phải người phụ trách) — vào được để xem +
    // bình luận (vd bấm từ thông báo @tag) nhưng KHÔNG cho Sửa, ẩn hẳn nút Lưu cho khỏi nhầm.
    const isOwner = currentRole === 'ADMIN' || cv.nguoiTaoId === mySupervisorId;
    document.getElementById('cvBtnLuu').style.display = isOwner ? '' : 'none';
    document.getElementById('cvReadOnlyBadge').style.display = isOwner ? 'none' : '';
    ['cvGoiThau', 'cvTen', 'cvBatDau', 'cvKetThuc'].forEach(id => { document.getElementById(id).disabled = !isOwner; });
    document.querySelectorAll('.cv-hm-cb').forEach(cb => { cb.disabled = !isOwner; });

    cvCommentTagged_ = [];
    document.getElementById('cvMentionDropdown').style.display = 'none';
    document.getElementById('cvCommentInput').value = '';
    renderCvComments([]);
    gsRun('getBinhLuanCongViec', maCongViec)
        .then(json => renderCvComments(JSON.parse(json)))
        .catch(() => renderCvComments([]));

    document.getElementById('congViecModal').classList.add('active');

    setTimeout(() => {
        try {
            if (typeof flatpickr !== 'undefined') {
                ['cvBatDau', 'cvKetThuc'].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el._flatpickr) flatpickr(el, { dateFormat: 'd/m/Y', locale: (flatpickr.l10ns && flatpickr.l10ns.vi) ? 'vi' : undefined, allowInput: true });
                });
            }
        } catch (e) { console.warn(e); }
    }, 100);
}

function closeCongViecModal() {
    document.getElementById('congViecModal').classList.remove('active');
}

function saveCongViecModal() {
    const btnLuu = document.getElementById('cvBtnLuu');
    if (btnLuu.disabled) return; // chặn bấm lặp trong lúc đang chờ phản hồi server
    const maCongViec = document.getElementById('cvEditId').value;
    const maGoiThau = document.getElementById('cvGoiThau').value;
    const maHangMucList = Array.from(document.querySelectorAll('.cv-hm-cb:checked')).map(cb => cb.value);
    const tenCongViec = document.getElementById('cvTen').value.trim();
    if (!maGoiThau) { showCustomAlert('Vui lòng chọn Gói thầu!', 'error'); return; }
    if (maHangMucList.length === 0) { showCustomAlert('Vui lòng chọn ít nhất 1 Hạng mục!', 'error'); return; }
    if (!tenCongViec) { showCustomAlert('Vui lòng nhập Tên công việc!', 'error'); return; }

    const payload = {
        maCongViec, tenCongViec, maGoiThau, maHangMucList,
        ngayBatDauKH: convertDMYtoISO(document.getElementById('cvBatDau').value.trim()) || '',
        ngayKetThucKH: convertDMYtoISO(document.getElementById('cvKetThuc').value.trim()) || ''
    };

    btnLuu.disabled = true;
    gsRun('adminSaveCongViec', myUserId, myPassword, payload)
        .then(() => {
            closeCongViecModal();
            showCustomAlert('Đã lưu công việc.', 'success');
            reloadCongViecData();
        })
        .catch(handleBackendError)
        .finally(() => { btnLuu.disabled = false; });
}

function deleteCongViec(maCongViec) {
    if (currentRole === 'VIEW') { showCustomAlert('Vui lòng đăng nhập để thao tác!', 'error'); return; }
    const cv = congViec.find(x => x.maCongViec === maCongViec);
    if (!cv) return;
    if (!confirm(`Xác nhận XÓA "${cv.tenCongViec}"? (Nhật ký đã nhập vẫn được giữ lại)`)) return;

    gsRun('adminDeleteCongViec', myUserId, myPassword, maCongViec)
        .then(() => {
            showCustomAlert('Đã xoá công việc.', 'success');
            reloadCongViecData();
        })
        .catch(handleBackendError);
}
</script>
