<script>
/* ================================================================
   FILE 2: 2_CongViec.html
   ------------------------------------------------------------------
   PHẠM VI: 3 modal quản lý dữ liệu:
   - Hạng mục (mã/tên tham chiếu, cây cha-con capDo 1/2/3) — CHỈ Admin.
   - Gói thầu (nhãn gộp nhiều Hạng mục ở BẤT KỲ cấp nào) — CHỈ Admin.
   - Công việc (đơn vị thật nhận Nhật ký tiến độ) — Admin hoặc Giám sát
     tự tạo cho chính mình: chọn Gói thầu → Hạng mục (lọc theo Gói thầu
     đã chọn) → Tên công việc → Ngày bắt đầu/kết thúc. Phần (I. Phần hồ
     sơ / II. Phần triển khai thi công) KHÔNG chọn tay — backend tự suy
     ra từ `phanMacDinh` của người tạo (xem adminSaveCongViec ở Code.js).

   DANH SÁCH HÀM CHÍNH:
   - openHangMucModal / saveHangMucModal / deleteHangMuc
   - openGoiThauModal / saveGoiThauModal / deleteGoiThau
   - openCongViecModal / saveCongViecModal / deleteCongViec
   ================================================================ */

// ---------- HẠNG MỤC (chỉ Admin) ----------

function fillParentSelect(selectEl, selectedId, excludeId) {
    let html = '<option value="">-- Không có (là gốc) --</option>';
    hangMuc.filter(h => h.maHangMuc !== excludeId).forEach(h => {
        html += `<option value="${h.maHangMuc}">${h.maHangMuc} — ${h.tenHangMuc}</option>`;
    });
    selectEl.innerHTML = html;
    if (selectedId) selectEl.value = selectedId;
}

function openHangMucModal(maHangMuc) {
    if (currentRole !== 'ADMIN') { showCustomAlert('Chỉ Quản trị mới có quyền quản lý Hạng mục!', 'error'); return; }

    document.getElementById('hmEditId').value = maHangMuc || '';
    const node = maHangMuc ? findHangMuc(maHangMuc) : null;

    document.getElementById('hangMucModalTitle').innerText = node ? 'Sửa Hạng mục' : 'Thêm Hạng mục';
    document.getElementById('hmMaHangMuc').value = node ? node.maHangMuc : '';
    document.getElementById('hmTen').value = node ? node.tenHangMuc : '';
    document.getElementById('hmCapDo').value = node ? String(node.capDo) : '1';
    fillParentSelect(document.getElementById('hmParentId'), node ? node.parentId : '', maHangMuc || null);

    document.getElementById('hangMucModal').classList.add('active');
}

function closeHangMucModal() {
    document.getElementById('hangMucModal').classList.remove('active');
}

// Cho phép đổi Mã hạng mục — backend (adminSaveHangMuc) tự cập nhật dây chuyền mọi Gói thầu/
// Công việc/Hạng mục con đang tham chiếu mã cũ, tránh mồ côi tham chiếu.
function saveHangMucModal() {
    const maHangMuc = document.getElementById('hmMaHangMuc').value.trim();
    const tenHangMuc = document.getElementById('hmTen').value.trim();
    const oldMaHangMuc = document.getElementById('hmEditId').value;
    if (!maHangMuc) { showCustomAlert('Vui lòng nhập Mã Hạng mục!', 'error'); return; }
    if (!tenHangMuc) { showCustomAlert('Vui lòng nhập Tên Hạng mục!', 'error'); return; }
    if (maHangMuc !== oldMaHangMuc && findHangMuc(maHangMuc)) { showCustomAlert('Mã Hạng mục này đã tồn tại!', 'error'); return; }

    const node = {
        maHangMuc,
        oldMaHangMuc,
        tenHangMuc,
        capDo: parseInt(document.getElementById('hmCapDo').value, 10),
        parentId: document.getElementById('hmParentId').value
    };

    gsRun('adminSaveHangMuc', myUserId, myPassword, node)
        .then(() => {
            closeHangMucModal();
            showCustomAlert('Đã lưu Hạng mục.', 'success');
            reloadData(); // chạy nền, không chờ mới báo thành công
        })
        .catch(handleBackendError);
}

function deleteHangMuc(maHangMuc) {
    if (currentRole !== 'ADMIN') { showCustomAlert('Chỉ Quản trị mới có quyền quản lý Hạng mục!', 'error'); return; }
    const node = findHangMuc(maHangMuc);
    if (!node) return;
    if (!confirm(`Xác nhận XÓA "${node.tenHangMuc}"?`)) return;

    gsRun('adminDeleteHangMuc', myUserId, myPassword, maHangMuc)
        .then(() => {
            showCustomAlert('Đã xoá Hạng mục.', 'success');
            reloadData();
        })
        .catch(handleBackendError);
}

// ---------- GÓI THẦU (chỉ Admin) ----------

function fillGoiThauGroupCheckboxes(selectedIds) {
    const container = document.getElementById('gtHangMucIds');
    const sel = new Set(selectedIds || []);
    if (hangMuc.length === 0) {
        container.innerHTML = '<span style="color:gray;">Chưa có Hạng mục nào, vui lòng tạo Hạng mục trước.</span>';
        return;
    }
    container.innerHTML = hangMuc.map(h => `
        <label style="display:flex; align-items:center; gap:6px; margin-bottom:4px; font-weight:400;">
            <input type="checkbox" class="gt-hm-cb" value="${h.maHangMuc}" ${sel.has(h.maHangMuc) ? 'checked' : ''}> ${h.maHangMuc} — ${h.tenHangMuc}
        </label>`).join('');
}

function openGoiThauModal(maGoiThau) {
    if (currentRole !== 'ADMIN') { showCustomAlert('Chỉ Quản trị mới có quyền quản lý Gói thầu!', 'error'); return; }
    const g = maGoiThau ? goiThau.find(x => x.maGoiThau === maGoiThau) : null;

    document.getElementById('gtEditId').value = maGoiThau || '';
    document.getElementById('goiThauModalTitle').innerText = g ? 'Sửa Gói thầu' : 'Thêm Gói thầu';
    document.getElementById('gtTen').value = g ? g.tenGoiThau : '';
    fillGoiThauGroupCheckboxes(g ? g.maHangMucList : []);

    document.getElementById('goiThauModal').classList.add('active');
}

function closeGoiThauModal() {
    document.getElementById('goiThauModal').classList.remove('active');
}

function saveGoiThauModal() {
    const maGoiThau = document.getElementById('gtEditId').value;
    const tenGoiThau = document.getElementById('gtTen').value.trim();
    if (!tenGoiThau) { showCustomAlert('Vui lòng nhập Tên gói thầu!', 'error'); return; }
    const maHangMucList = Array.from(document.querySelectorAll('.gt-hm-cb:checked')).map(cb => cb.value);

    gsRun('adminSaveGoiThau', myUserId, myPassword, { maGoiThau, tenGoiThau, maHangMucList })
        .then(() => {
            closeGoiThauModal();
            showCustomAlert('Đã lưu Gói thầu.', 'success');
            reloadData();
        })
        .catch(handleBackendError);
}

function deleteGoiThau(maGoiThau) {
    if (currentRole !== 'ADMIN') { showCustomAlert('Chỉ Quản trị mới có quyền quản lý Gói thầu!', 'error'); return; }
    if (!confirm('Xác nhận XÓA Gói thầu này?')) return;

    gsRun('adminDeleteGoiThau', myUserId, myPassword, maGoiThau)
        .then(() => {
            showCustomAlert('Đã xoá Gói thầu.', 'success');
            reloadData();
        })
        .catch(handleBackendError);
}

// ---------- CÔNG VIỆC (Admin hoặc Giám sát tự tạo cho mình) ----------

function fillCvGoiThauSelect(selectedId) {
    const sel = document.getElementById('cvGoiThau');
    let html = '<option value="">-- Chọn Gói thầu --</option>';
    goiThau.forEach(g => html += `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`);
    sel.innerHTML = html;
    if (selectedId) sel.value = selectedId;
}

// Hạng mục chọn được giới hạn theo đúng danh sách đã gộp trong Gói thầu đang chọn — chọn được
// 1 hoặc nhiều (checkbox), chỉ hiện Mã hạng mục cho gọn (đủ để lọc/báo cáo sau này).
function fillCvHangMucCheckboxes(maGoiThau, selectedIds) {
    const container = document.getElementById('cvHangMucIds');
    const sel = new Set(selectedIds || []);
    if (!maGoiThau) {
        container.innerHTML = '<span style="color:gray;">-- Chọn Gói thầu trước --</span>';
        return;
    }
    const g = goiThau.find(x => x.maGoiThau === maGoiThau);
    const list = g ? hangMuc.filter(h => g.maHangMucList.includes(h.maHangMuc)) : [];
    if (list.length === 0) {
        container.innerHTML = '<span style="color:gray;">-- Gói thầu này chưa gộp Hạng mục nào --</span>';
        return;
    }
    container.innerHTML = list.map(h => `
        <label style="display:flex; align-items:center; gap:6px; margin-bottom:4px; font-weight:400;">
            <input type="checkbox" class="cv-hm-cb" value="${h.maHangMuc}" ${sel.has(h.maHangMuc) ? 'checked' : ''}> ${h.maHangMuc}
        </label>`).join('');
}

function onCvGoiThauChange() {
    fillCvHangMucCheckboxes(document.getElementById('cvGoiThau').value, []);
}

function openCongViecModal(maCongViec) {
    if (currentRole === 'VIEW') { showCustomAlert('Vui lòng đăng nhập để thao tác!', 'error'); return; }
    const cv = maCongViec ? congViec.find(x => x.maCongViec === maCongViec) : null;

    document.getElementById('cvEditId').value = maCongViec || '';
    document.getElementById('congViecModalTitle').innerText = cv ? 'Sửa công việc' : 'Thêm công việc';
    fillCvGoiThauSelect(cv ? cv.maGoiThau : '');
    fillCvHangMucCheckboxes(cv ? cv.maGoiThau : '', cv ? cv.maHangMucList : []);
    document.getElementById('cvTen').value = cv ? cv.tenCongViec : '';
    document.getElementById('cvBatDau').value = cv ? formatVN(cv.ngayBatDauKH) : '';
    document.getElementById('cvKetThuc').value = cv ? formatVN(cv.ngayKetThucKH) : '';

    document.getElementById('congViecModal').classList.add('active');

    setTimeout(() => {
        try {
            if (typeof flatpickr !== 'undefined') {
                ['cvBatDau', 'cvKetThuc'].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el._flatpickr) flatpickr(el, { dateFormat: 'd/m/Y', locale: (flatpickr.l10ns && flatpickr.l10ns.vi) ? 'vi' : undefined, allowInput: true });
                });
            }
        } catch (e) { console.warn(e); }
    }, 100);
}

function closeCongViecModal() {
    document.getElementById('congViecModal').classList.remove('active');
}

function saveCongViecModal() {
    const maCongViec = document.getElementById('cvEditId').value;
    const maGoiThau = document.getElementById('cvGoiThau').value;
    const maHangMucList = Array.from(document.querySelectorAll('.cv-hm-cb:checked')).map(cb => cb.value);
    const tenCongViec = document.getElementById('cvTen').value.trim();
    if (!maGoiThau) { showCustomAlert('Vui lòng chọn Gói thầu!', 'error'); return; }
    if (maHangMucList.length === 0) { showCustomAlert('Vui lòng chọn ít nhất 1 Hạng mục!', 'error'); return; }
    if (!tenCongViec) { showCustomAlert('Vui lòng nhập Tên công việc!', 'error'); return; }

    const payload = {
        maCongViec,
        tenCongViec,
        maGoiThau,
        maHangMucList,
        ngayBatDauKH: convertDMYtoISO(document.getElementById('cvBatDau').value.trim()) || '',
        ngayKetThucKH: convertDMYtoISO(document.getElementById('cvKetThuc').value.trim()) || ''
    };

    gsRun('adminSaveCongViec', myUserId, myPassword, payload)
        .then(() => {
            closeCongViecModal();
            showCustomAlert('Đã lưu công việc.', 'success');
            reloadData();
        })
        .catch(handleBackendError);
}

function deleteCongViec(maCongViec) {
    if (currentRole === 'VIEW') { showCustomAlert('Vui lòng đăng nhập để thao tác!', 'error'); return; }
    const cv = congViec.find(x => x.maCongViec === maCongViec);
    if (!cv) return;
    if (!confirm(`Xác nhận XÓA "${cv.tenCongViec}"? (Nhật ký đã nhập vẫn được giữ lại)`)) return;

    gsRun('adminDeleteCongViec', myUserId, myPassword, maCongViec)
        .then(() => {
            showCustomAlert('Đã xoá công việc.', 'success');
            reloadData();
        })
        .catch(handleBackendError);
}
</script>
