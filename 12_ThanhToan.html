<script>
/* ================================================================
   FILE 12: 12_ThanhToan.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Thanh toán" — các Đợt thanh toán của Hợp đồng đang
   chọn (currentHopDongId): chọn khối lượng từng hạng mục cho kỳ này,
   tự tính Giá trị thực hiện + VAT, trừ Thu hồi tạm ứng (có gợi ý tự
   động theo tỷ lệ tạm ứng/giá trị HĐ) + Khấu trừ khác.

   DANH SÁCH HÀM CHÍNH:
   - renderThanhToan()             : Vẽ dải tóm tắt + danh sách Đợt thanh toán
   - getPaymentRoundBreakdown()    : Diễn giải số liệu 1 Đợt (thực hiện/VAT/thu hồi/giá trị cuối)
   - openPaymentModal()            : Mở modal tạo Đợt mới (chọn khối lượng từng hạng mục)
   - importThanhToanFromExcel()    : Đọc file Excel (STT|Tên|ĐVT|Khối lượng), khớp BOQ rồi điền
                                     sẵn khối lượng vào đúng ô trong modal đang mở (chưa lưu ngay)
   - goiYThuHoi_(loai)             : Gọi goiYThuHoiTamUng() điền sẵn số đề xuất
   - openDieuChinhModal(id)        : Sửa lại phần thu hồi/khấu trừ sau khi đã tạo Đợt
   ================================================================ */

// Bảng "Tổng hợp lũy kế khối lượng đã thanh toán" — toàn hợp đồng, theo cây BOQ (khoiLuongDaThanhToan
// tính sẵn ở getHopDongData() trong Code.js). Dùng chung renderBOQLuyKeTable_() ở 9_HopDong.html,
// giống hệt bảng lũy kế Nghiệm thu ở 11_NghiemThu.html, chỉ khác field nguồn. Số "Đã thanh toán"
// theo TỪNG hạng mục ở đây là giá trị GỐC (khối lượng × đơn giá, trước thuế/tạm ứng/khấu trừ) — số
// "Đã thanh toán" thực nhận sau thuế/khấu trừ vẫn chỉ có ở cấp đợt/hợp đồng (danh sách Đợt bên dưới),
// vì VAT/tạm ứng/khấu trừ áp dụng theo đợt, không tách được theo từng hạng mục.
let ttLuyKeExpanded_ = new Set();
function toggleTtLuyKeHeader_(maBOQ) {
    if (ttLuyKeExpanded_.has(maBOQ)) ttLuyKeExpanded_.delete(maBOQ); else ttLuyKeExpanded_.add(maBOQ);
    renderTtLuyKeTable_();
}
function renderTtLuyKeTable_() {
    renderBOQLuyKeTable_('ttLuyKeBody', 'khoiLuongDaThanhToan', ttLuyKeExpanded_, 'toggleTtLuyKeHeader_');
}

function renderThanhToan() {
    fillHopDongSelect_('ttHopDongSelect');
    const emptyBox = document.getElementById('ttNoHopDong');
    const content = document.getElementById('ttContent');
    const hd = hopDong.find(h => h.maHopDong === currentHopDongId);
    renderHopDongSoLine_('ttHopDongLine', hd);
    if (!hd) {
        if (emptyBox) emptyBox.style.display = '';
        if (content) content.style.display = 'none';
        return;
    }
    if (emptyBox) emptyBox.style.display = 'none';
    if (content) content.style.display = '';
    const btnThem = document.getElementById('btnThemDotTT');
    if (btnThem) btnThem.style.display = canEditHopDong() ? '' : 'none';
    renderTtLuyKeTable_();

    const rounds = dotThanhToan.filter(d => d.maHopDong === currentHopDongId);
    const giaTriHD = giaTriHienHanhHopDong(currentHopDongId);
    const tongDaTT = Math.round(rounds.reduce((s, r) => s + getPaymentRoundBreakdown(r).finalValue, 0));
    const daThuHoiHD = rounds.reduce((s, r) => s + (r.thuHoiTamUngHopDong || 0), 0);
    const daThuHoiTC = rounds.reduce((s, r) => s + (r.thuHoiTamUngThiCong || 0), 0);

    document.getElementById('ttHopDongTitle').textContent = hd.tenHopDong;
    document.getElementById('ttHopDongSub').textContent =
        `Giá trị HĐ hiện hành (trước thuế): ${tienHienThi_(giaTriHD)}đ · VAT ${hd.thueVAT || 0}%`;
    document.getElementById('ttAdvHDRemaining').textContent = tienHienThi_(Math.max(0, hd.tamUngHopDong - daThuHoiHD)) + 'đ';
    document.getElementById('ttAdvHDCaption').textContent =
        `Đã cấp ${tienHienThi_(hd.tamUngHopDong)}đ · Đã thu hồi ${tienHienThi_(daThuHoiHD)}đ`;
    document.getElementById('ttAdvTCRemaining').textContent = tienHienThi_(Math.max(0, hd.tamUngThiCong - daThuHoiTC)) + 'đ';
    document.getElementById('ttAdvTCCaption').textContent =
        `Đã cấp ${tienHienThi_(hd.tamUngThiCong)}đ · Đã thu hồi ${tienHienThi_(daThuHoiTC)}đ`;
    document.getElementById('ttKpiThanhToan').textContent = tienHienThi_(tongDaTT) + 'đ';

    const box = document.getElementById('ttList');
    if (rounds.length === 0) {
        box.innerHTML = `<div class="thongbao-empty">Chưa có Đợt thanh toán nào.</div>`;
        return;
    }
    const editable = canEditHopDong();
    box.innerHTML = rounds.map(r => {
        const bd = getPaymentRoundBreakdown(r);
        return `<div class="pl-item">
            <div class="pl-item-head">
                <b>${r.tenDot}</b> <span class="pl-item-date">${formatVN(r.ngayThanhToan)} · ${r.phanTramThanhToan}%</span>
                ${editable ? `<span class="action-cell" style="float:right;">
                    <button class="btn btn-sm" style="background:var(--primary);" onclick="openDieuChinhModal('${r.maDotThanhToan}')" aria-label="Sửa điều chỉnh" title="Sửa điều chỉnh"><i class="fa-solid fa-sliders"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteDotThanhToan('${r.maDotThanhToan}')" aria-label="Xóa Đợt thanh toán" title="Xóa Đợt thanh toán"><i class="fa-solid fa-trash"></i></button>
                </span>` : ''}
            </div>
            <div class="pl-item-note">
                Thực hiện: ${tienHienThi_(bd.thucHien)} · Tạm tính: ${tienHienThi_(bd.tamTinh)} · VAT (${bd.vatRate}%): ${tienHienThi_(bd.thueGTGT)}<br>
                Thu hồi tạm ứng HĐ: ${tienHienThi_(r.thuHoiTamUngHopDong)} · TC: ${tienHienThi_(r.thuHoiTamUngThiCong)} · Khấu trừ khác: ${tienHienThi_(r.khauTruKhac)} · Giảm giá: ${tienHienThi_(r.giamGiaDot || 0)}
            </div>
            <div class="pl-item-note"><b>Giá trị thanh toán kỳ này: <span class="val-thanhtoan">${tienHienThi_(bd.finalValue)}</span></b></div>
        </div>`;
    }).join('');
}

// Thuế GTGT tính trên Giá trị tạm tính (trước thuế), CỘNG vào rồi mới trừ tạm ứng/khấu trừ khác —
// đúng thứ tự Bảng xác định giá trị khối lượng hoàn thành (Mẫu 03.a/TT), port từ app cũ.
function getPaymentRoundBreakdown(round) {
    const chiTiet = dotThanhToanChiTiet.filter(c => c.maDotThanhToan === round.maDotThanhToan);
    let thucHien = 0;
    chiTiet.forEach(ct => {
        const b = boq.find(x => x.maBOQ === ct.maBOQ);
        if (b) thucHien += ct.khoiLuong * b.donGiaHieuLuc;
    });
    thucHien = Math.round(thucHien);
    const tamTinh = Math.round(thucHien * (round.phanTramThanhToan || 100) / 100);
    const hd = hopDong.find(h => h.maHopDong === round.maHopDong);
    const vatRate = (hd && hd.thueVAT) || 0;
    const thueGTGT = Math.round(tamTinh * vatRate / 100);
    const tamTinhSauThue = tamTinh + thueGTGT;
    const finalValue = tamTinhSauThue - round.thuHoiTamUngHopDong - round.thuHoiTamUngThiCong - round.khauTruKhac - (round.giamGiaDot || 0);
    return { thucHien, tamTinh, vatRate, thueGTGT, tamTinhSauThue, finalValue };
}

function openPaymentModal() {
    if (!currentHopDongId) return;
    document.getElementById('ttCode').value = '';
    document.getElementById('ttDate').value = formatVN(getTodayDate());
    document.getElementById('ttPercent').value = 100;
    document.getElementById('ttNote').value = '';
    document.getElementById('ttAdvHD').value = 0;
    document.getElementById('ttAdvTC').value = 0;
    document.getElementById('ttOther').value = 0;
    document.getElementById('ttGiamGia').value = 0;
    document.getElementById('ttOtherNote').value = '';

    const items = boq.filter(b => b.maHopDong === currentHopDongId && !b.isHeader);
    document.getElementById('ttItemsBox').innerHTML = items.length === 0
        ? '<div class="thongbao-empty">Hợp đồng chưa có hạng mục BOQ.</div>'
        : items.map(b => `
            <div class="tt-item-row">
                <span>${b.stt ? b.stt + ' - ' : ''}${b.tenHangMuc} <small>(${b.donVi || ''})</small></span>
                <input type="number" step="any" min="0" class="js-tt-qty" data-boq="${b.maBOQ}" placeholder="0">
            </div>`).join('');

    document.getElementById('paymentModal').classList.add('active');
    setTimeout(() => {
        try {
            if (typeof flatpickr !== 'undefined') {
                const el = document.getElementById('ttDate');
                if (!el._flatpickr) flatpickr(el, { dateFormat: 'd/m/Y', locale: (flatpickr.l10ns && flatpickr.l10ns.vi) ? 'vi' : undefined, allowInput: true });
            }
        } catch (e) { console.warn(e); }
    }, 100);
}
function closePaymentModal() { document.getElementById('paymentModal').classList.remove('active'); }

function timDsChiTietTamThoi_() {
    return Array.from(document.querySelectorAll('.js-tt-qty'))
        .map(el => ({ maBOQ: el.getAttribute('data-boq'), khoiLuong: parseNumberSafely(el.value) }))
        .filter(x => !isNaN(x.khoiLuong) && x.khoiLuong > 0);
}

// Đọc file Excel (STT | Tên | ĐVT | Khối lượng), khớp từng dòng với đúng hạng mục BOQ theo STT+Tên
// rồi ĐIỀN vào ô khối lượng tương ứng trong modal "Thêm Đợt thanh toán" đang mở — CHƯA lưu ngay,
// người dùng vẫn xem/chỉnh lại % và các khoản thu hồi trước khi bấm Lưu.
function importThanhToanFromExcel() {
    const fileInput = document.getElementById('ttExcelFile');
    const file = fileInput.files[0];
    if (!file) { showCustomAlert('Vui lòng chọn file Excel!', 'error'); return; }

    docFileExcel_(file).then(rows => {
        let ok = 0;
        const khongKhop = [];
        rows.forEach((row, idx) => {
            if (idx === 0) return;
            const stt = sttTuExcel_(row[0]), ten = row[1];
            const qty = parseNumberSafely(row[3]);
            if (!ten || isNaN(qty) || qty <= 0) return;
            const item = khopBOQTheoSttTen_(stt, ten);
            if (!item) { khongKhop.push(`[${stt}] ${ten}`); return; }
            const input = document.querySelector(`.js-tt-qty[data-boq="${item.maBOQ}"]`);
            if (input) { input.value = qty; ok++; }
        });
        let msg = `Đã điền khối lượng cho ${ok} hạng mục vào danh sách bên dưới.`;
        if (khongKhop.length) msg += `\nKhông khớp BOQ (${khongKhop.length} dòng): ` + khongKhop.slice(0, 5).join(', ') + (khongKhop.length > 5 ? '…' : '');
        showCustomAlert(msg, ok > 0 ? 'success' : 'error');
        fileInput.value = '';
    }).catch(err => showCustomAlert('Lỗi đọc file Excel: ' + err.message, 'error'));
}

function goiYThuHoi_(loai) {
    const chiTiet = timDsChiTietTamThoi_();
    if (chiTiet.length === 0) { showCustomAlert('Nhập khối lượng dự kiến trước khi gợi ý!', 'error'); return; }
    gsRun('goiYThuHoiTamUng', currentHopDongId, chiTiet, loai)
        .then(val => { setTienValue_(document.getElementById(loai === 'thiCong' ? 'ttAdvTC' : 'ttAdvHD'), val); })
        .catch(handleBackendError);
}

function createPaymentRound() {
    const tenDot = document.getElementById('ttCode').value.trim();
    if (!tenDot) { showCustomAlert('Vui lòng nhập Tên/Số hiệu Đợt thanh toán!', 'error'); return; }
    const chiTiet = timDsChiTietTamThoi_();
    if (chiTiet.length === 0) { showCustomAlert('Vui lòng nhập khối lượng cho ít nhất 1 hạng mục!', 'error'); return; }

    const payload = {
        maHopDong: currentHopDongId, tenDot,
        ngayThanhToan: convertDMYtoISO(document.getElementById('ttDate').value.trim()) || '',
        phanTramThanhToan: parseNumberSafely(document.getElementById('ttPercent').value),
        ghiChu: document.getElementById('ttNote').value.trim(),
        thuHoiTamUngHopDong: parseTienInput_(document.getElementById('ttAdvHD').value) || 0,
        thuHoiTamUngThiCong: parseTienInput_(document.getElementById('ttAdvTC').value) || 0,
        khauTruKhac: parseTienInput_(document.getElementById('ttOther').value) || 0,
        giamGiaDot: parseTienInput_(document.getElementById('ttGiamGia').value) || 0,
        ghiChuKhauTru: document.getElementById('ttOtherNote').value.trim(),
        chiTiet
    };
    gsRun('adminTaoDotThanhToan', myUserId, myPassword, payload)
        .then(() => { showCustomAlert('Đã tạo Đợt thanh toán.', 'success'); closePaymentModal(); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError);
}

function deleteDotThanhToan(maDotThanhToan) {
    if (!confirm('Xác nhận XÓA Đợt thanh toán này?')) return;
    gsRun('adminXoaDotThanhToan', myUserId, myPassword, maDotThanhToan)
        .then(() => { showCustomAlert('Đã xóa Đợt thanh toán.', 'success'); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError);
}

let dieuChinhId_ = '';
function openDieuChinhModal(maDotThanhToan) {
    const r = dotThanhToan.find(d => d.maDotThanhToan === maDotThanhToan);
    if (!r) return;
    dieuChinhId_ = maDotThanhToan;
    setTienValue_(document.getElementById('dcAdvHD'), r.thuHoiTamUngHopDong);
    setTienValue_(document.getElementById('dcAdvTC'), r.thuHoiTamUngThiCong);
    setTienValue_(document.getElementById('dcOther'), r.khauTruKhac);
    setTienValue_(document.getElementById('dcGiamGia'), r.giamGiaDot || 0);
    document.getElementById('dcOtherNote').value = r.ghiChuKhauTru;
    document.getElementById('dieuChinhModal').classList.add('active');
}
function closeDieuChinhModal() { document.getElementById('dieuChinhModal').classList.remove('active'); }

function saveDieuChinh() {
    const payload = {
        thuHoiTamUngHopDong: parseTienInput_(document.getElementById('dcAdvHD').value) || 0,
        thuHoiTamUngThiCong: parseTienInput_(document.getElementById('dcAdvTC').value) || 0,
        khauTruKhac: parseTienInput_(document.getElementById('dcOther').value) || 0,
        giamGiaDot: parseTienInput_(document.getElementById('dcGiamGia').value) || 0,
        ghiChuKhauTru: document.getElementById('dcOtherNote').value.trim()
    };
    gsRun('adminSuaDieuChinhThanhToan', myUserId, myPassword, dieuChinhId_, payload)
        .then(() => { showCustomAlert('Đã lưu điều chỉnh.', 'success'); closeDieuChinhModal(); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError);
}
</script>
