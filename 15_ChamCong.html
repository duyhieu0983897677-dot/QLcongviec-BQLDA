<script>
/* ================================================================
   FILE 15: 15_ChamCong.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Chấm công & Tăng ca" — chấm công CẢ THÁNG (thay hẳn tab
   "Điểm danh & Phép" cũ, vốn chỉ chấm được Thứ 7/CN và trùng với tab
   này) + tăng ca theo giờ bắt đầu/kết thúc (tự tách hệ số theo mốc
   22h). Ai cũng xem được (giống getData() không cần đăng nhập); chỉ
   Admin hoặc Chức danh "Thư ký BQLDA" chấm công / sửa tăng ca được
   (canEditChamCong()) — riêng "Phép/Bù đầu tháng" (trong popup Chi
   tiết công) chỉ Admin sửa được.

   Bảng chính CHỈ hiện 4 cột nhân sự thực sự cần xem hàng ngày: Số công
   tính lương, Phép còn lại, Giờ TC dư (bù tháng sau), Công bù sang tháng
   (dự kiến) — mọi chi tiết còn lại (Phép/Bù đầu-cuối tháng, breakdown
   cuối tuần/tăng ca...) chuyển hết vào popup "Chi tiết công"
   (openChiTietCongModal) để bảng đỡ rối. Ô giải thích cách tính
   (#ccFormulaBox) chỉ Admin thấy — nhân sự thường không cần biết công
   thức, chỉ cần xem 4 số trên.

   Dữ liệu tải riêng theo tháng qua getChamCongThang(thang) — server đã
   tính sẵn mọi cột tổng hợp (Công Thứ 7/Định mức, Cộng-Trừ phép, Phép
   cuối tháng, Số công thực làm, Giờ/Ngày công tăng ca quy đổi), client
   chỉ vẽ lại, không tự tính lại nghiệp vụ (xem Code.js: getChamCongThang).

   Bấm 1 ô CHỈ sửa cục bộ trên trình duyệt (không gọi server, không load lại) — mọi thay đổi gom vào
   ccPendingCC/ccPendingTC, đến khi bấm nút "Lưu thay đổi" (luuThayDoiChamCong) mới gộp thành ĐÚNG 1
   lượt gọi capNhatChamCongHangLoat rồi mới load lại bảng 1 lần. Tránh tình trạng bấm xong 1 ô là bị
   giật/load lại ngay, rất khó chấm công liên tiếp nhiều ô/nhiều người. Sửa Phép/Bù đầu tháng (Admin,
   trong popup) cũng theo tinh thần này — chỉ cập nhật CỤC BỘ (ccCapNhatPhepDauThangLocal_/
   ccCapNhatBuDauThangLocal_) sau khi lưu server thành công, KHÔNG loadChamCong(forceReload=true) nữa
   (trước đây làm vậy khiến vẽ lại TOÀN BỘ bảng, cảm giác như trang tự load lại rất khó chịu).

   DANH SÁCH HÀM CHÍNH:
   - renderChamCong()        : Điểm vào, đặt tháng mặc định rồi tải dữ liệu
   - loadChamCong(thang, forceReload) : Vẽ lại từ ccCache_ nếu tháng đã tải trước đó (tức thời, không
                               gọi server); chỉ gọi getChamCongThang khi tháng chưa có trong cache hoặc
                               forceReload=true (sau khi Lưu, hoặc bấm "Làm mới") — xem chú thích ở
                               ccCache_ phía trên vì sao cache theo tháng quan trọng cho tốc độ.
   - ccLamMoi_()             : Nút "Làm mới" — bỏ qua cache, luôn tải lại từ server
   - renderChamCongTable()   : Dựng thead (3 cột tổng hợp + từng ngày) + tbody
   - toggleChamCongCell()    : Bấm ô chấm công 1 ngày, xoay vòng trống→1→0,5→P→trống — CHỈ sửa cục bộ
   - openTangCaModal()       : Mở popup nhập giờ tăng ca cho 1 ngày, có breakdown 22h trực tiếp
   - saveTangCaModal()/deleteTangCaModal() : Ghi nhận tăng ca của popup đang mở — CHỈ sửa cục bộ
   - luuThayDoiChamCong()    : Gộp toàn bộ pending thành 1 lượt gọi server rồi mới load lại
   - openChiTietCongModal()  : Mở popup xem đầy đủ thông tin công của 1 nhân sự (ai cũng xem được);
                               Admin thấy thêm ô sửa Phép/Bù đầu tháng ngay trong popup này
   - saveDetPhepDauThang_()/saveDetBuDauThang_() : Chỉ Admin — bấm nút "Lưu" cạnh ô Phép/Bù đầu tháng
                               (trong popup) mới lưu, KHÔNG tự lưu khi rời focus khỏi ô (onchange) nữa.
   - openNgayLeModal()/themNgayLe_()/xoaNgayLe_() : Chỉ Admin — quản lý danh sách ngày nghỉ lễ, chỉ
                               dùng để tính "Số ngày công chuẩn dự kiến" tham khảo ở dòng tiêu đề bảng
                               (không ảnh hưởng công thức tính công của từng nhân sự).
   ================================================================ */

let ccCurrentThang = '';
let ccData = null;
let ccModalCtx = null; // { userId, ngay } của popup Tăng ca đang mở
let ccPendingCC = {};  // key "userId|ngay" -> { targetUserId, ngay, buoi } — chấm công CHƯA lưu
let ccPendingTC = {};  // key "userId|ngay" -> { targetUserId, ngay, gioBatDau, gioKetThuc } — tăng ca CHƯA lưu
// Cache dữ liệu đã tải theo tháng (key 'yyyy-MM' -> object đã parse) — mỗi lượt getChamCongThang tốn
// ~3-4 giây (đọc 3 sheet trên Apps Script, mỗi lượt đọc ~0,4-1 giây CỐ ĐỊNH bất kể sheet to hay nhỏ),
// trong khi trước đây bấm ra/vào tab này nhiều lần trong 1 phiên làm việc là gọi lại server MỖI LẦN
// dù dữ liệu chưa hề đổi — đây mới là nguyên nhân chính khiến "bấm vào tab lại chậm" (không phải chỉ
// chậm ở lần mở đầu tiên). Có cache rồi thì bấm lại tab/đổi qua lại giữa các tháng đã xem chỉ còn vẽ
// lại từ bộ nhớ (tức thời) — CHỈ gọi server khi: xem tháng chưa từng tải, vừa Lưu xong (dữ liệu đổi),
// hoặc người dùng chủ động bấm nút "Làm mới" (đề phòng người khác vừa sửa trên máy khác).
let ccCache_ = {};

function chuanHoaChucDanhClient_(s) {
  return String(s || '').trim().toLowerCase();
}
function canEditChamCong() {
  return currentRole === 'ADMIN' || chuanHoaChucDanhClient_(myChucDanh) === 'thư ký bqlda';
}

function ccKey_(userId, ngay) { return userId + '|' + ngay; }
function ccIsDirty_() { return Object.keys(ccPendingCC).length > 0 || Object.keys(ccPendingTC).length > 0; }
function ccSoLuongPending_() {
  const keys = new Set([...Object.keys(ccPendingCC), ...Object.keys(ccPendingTC)]);
  return keys.size;
}

function ccCapNhatNutLuu_() {
  const btn = document.getElementById('ccBtnLuu');
  if (!btn) return;
  const soLuong = ccSoLuongPending_();
  btn.disabled = soLuong === 0;
  btn.innerHTML = soLuong > 0
    ? `<i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi (${soLuong})`
    : `<i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi`;
}

function ccFmt1_(n) { return (Math.round((Number(n) || 0) * 10) / 10).toString().replace('.', ','); }
function ccFmt2_(n) { return (Math.round((Number(n) || 0) * 100) / 100).toString().replace('.', ','); }
function ccFmtDelta_(n) {
  const r = Math.round((Number(n) || 0) * 10) / 10;
  const cls = r > 0 ? 'cc-delta-pos' : (r < 0 ? 'cc-delta-neg' : 'cc-delta-zero');
  return `<span class="${cls}">${r > 0 ? '+' : ''}${ccFmt1_(r)}</span>`;
}

// Mirror đúng logic tinhGioTangCa_() ở Code.js — chỉ để hiện breakdown ngay trong popup trước khi
// lưu; số liệu THẬT vẫn do server tính lại khi loadChamCong() sau khi lưu.
function ccTinhGioTangCa_(gioBatDau, gioKetThuc) {
  if (!gioBatDau || !gioKetThuc) return { gioThuong: 0, gioDem: 0, quyDoi: 0, quaNgay: false };
  const toMin = s => { const p = s.split(':'); return (parseInt(p[0], 10) || 0) * 60 + (parseInt(p[1], 10) || 0); };
  let s = toMin(gioBatDau), e = toMin(gioKetThuc);
  const quaNgay = e <= s;
  if (quaNgay) e += 1440;
  const boundary = 22 * 60;
  let gioThuong, gioDem;
  if (e <= boundary) { gioThuong = e - s; gioDem = 0; }
  else if (s >= boundary) { gioThuong = 0; gioDem = e - s; }
  else { gioThuong = boundary - s; gioDem = e - boundary; }
  gioThuong /= 60; gioDem /= 60;
  return { gioThuong, gioDem, quyDoi: gioThuong + gioDem * 2, quaNgay };
}

function renderChamCong() {
  const picker = document.getElementById('ccThangPicker');
  if (!ccCurrentThang) {
    const now = new Date();
    ccCurrentThang = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  }
  picker.value = ccCurrentThang;
  picker.onchange = () => {
    if (ccIsDirty_() && !confirm('Bạn có thay đổi chấm công/tăng ca chưa lưu. Chuyển tháng sẽ MẤT các thay đổi này, tiếp tục?')) {
      picker.value = ccCurrentThang;
      return;
    }
    ccCurrentThang = picker.value;
    loadChamCong(ccCurrentThang);
  };
  loadChamCong(ccCurrentThang);
}

// forceReload=true bỏ qua cache, luôn gọi lại server (dùng sau khi Lưu, hoặc bấm nút "Làm mới").
function loadChamCong(thang, forceReload) {
  ccPendingCC = {}; ccPendingTC = {};

  if (!forceReload && ccCache_[thang]) {
    ccData = ccCache_[thang];
    renderChamCongTable();
    ccCapNhatNutLuu_();
    return;
  }

  document.getElementById('ccBody').innerHTML = '<tr><td colspan="16" class="text-center" style="padding:20px; color:gray;">Đang tải…</td></tr>';
  gsRun('getChamCongThang', thang)
    .then(json => {
      ccData = JSON.parse(json);
      ccCache_[thang] = ccData;
      renderChamCongTable();
      ccCapNhatNutLuu_();
    })
    .catch(handleBackendError);
}

// Nút "Làm mới" — chủ động bỏ cache, tải lại đúng tháng đang xem từ server (đề phòng người khác vừa
// chấm công/tăng ca trên máy khác mà cache ở đây chưa biết).
function ccLamMoi_() {
  if (ccIsDirty_() && !confirm('Bạn có thay đổi chấm công/tăng ca chưa lưu. Làm mới sẽ MẤT các thay đổi này, tiếp tục?')) return;
  loadChamCong(ccCurrentThang, true);
}

function ccDowLabel_(ngayISO) {
  const d = new Date(ngayISO + 'T00:00:00');
  return ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'][d.getDay()];
}
function ccIsWeekend_(ngayISO) {
  const dow = new Date(ngayISO + 'T00:00:00').getDay();
  return dow === 0 || dow === 6;
}

function renderChamCongTable() {
  if (!ccData) return;
  const editable = canEditChamCong();
  document.getElementById('ccBtnLuu').style.display = editable ? '' : 'none';
  const formulaBox = document.getElementById('ccFormulaBox');
  if (formulaBox) formulaBox.style.display = currentRole === 'ADMIN' ? '' : 'none';
  const btnNgayLe = document.getElementById('ccBtnNgayLe');
  if (btnNgayLe) btnNgayLe.style.display = currentRole === 'ADMIN' ? '' : 'none';
  const thang = ccData.thang;
  const soNgay = ccData.soNgay;
  const captionEl = document.getElementById('ccCaptionThang');
  if (captionEl) {
    const tenLeList = (ccData.ngayLeThang || []).map(nl => nl.tenLe).filter(Boolean);
    const ghiChuLe = tenLeList.length ? ` <small style="font-weight:400; color:var(--text-muted);">(đã trừ ${tenLeList.length} ngày lễ: ${tenLeList.join(', ')})</small>` : '';
    captionEl.innerHTML = `Số công tính lương tháng ${thang.split('-').reverse().join('/')}: ${ccFmt1_(ccData.soNgayCongChuan)} ngày${ghiChuLe}`;
  }

  let row1 = '<tr><th class="cc-stt" rowspan="2">STT</th><th class="cc-name" rowspan="2" style="text-align:left;">Họ và tên</th>' +
    '<th class="cc-sumcol cc-highlight" rowspan="2">Số công<br><small>tính lương</small></th>' +
    '<th class="cc-sumcol cc-highlight" rowspan="2">Phép<br><small>còn lại</small></th>' +
    '<th class="cc-sumcol cc-highlight" rowspan="2">Giờ TC dư<br><small>(bù tháng sau)</small></th>' +
    '<th class="cc-sumcol cc-highlight" rowspan="2">Công bù<br><small>sang tháng (dự kiến)</small></th>';
  let row2 = '<tr>';
  for (let d = 1; d <= soNgay; d++) {
    const iso = thang + '-' + String(d).padStart(2, '0');
    const weekend = ccIsWeekend_(iso);
    row1 += '';
    row2 += `<th class="${weekend ? 'cc-weekend' : ''}"><span class="cc-d-num">${d}</span><span class="cc-d-dow">${ccDowLabel_(iso)}</span></th>`;
  }
  row1 += '</tr>';
  row2 += '</tr>';
  document.getElementById('ccThead').innerHTML = row1 + row2;

  const rows = ccData.rows || [];
  if (rows.length === 0) {
    document.getElementById('ccBody').innerHTML = '<tr><td colspan="16" class="text-center" style="padding:20px; color:gray;">Chưa có nhân sự nào.</td></tr>';
    return;
  }

  document.getElementById('ccBody').innerHTML = rows.map((r, idx) => {
    const laToi = r.userId === myUserId;
    let cells = `<td class="cc-stt">${idx + 1}</td>
      <td class="cc-name">
        <div class="cc-name-inner">
          <span class="cc-name-text" onclick="openChiTietCongModal('${r.userId}')" title="Bấm để xem chi tiết công">${escapeHtml(r.hoTen)}</span>
          ${laToi ? '<span class="cc-name-badge">Bạn</span>' : ''}
        </div>
      </td>
      <td class="cc-sumcol cc-highlight">${ccFmt1_(r.congTinhLuong)}</td>
      <td class="cc-sumcol cc-highlight">${ccFmt1_(r.phepCuoiThang)}</td>
      <td class="cc-sumcol cc-highlight">${ccFmt1_(r.gioTCConLaiDuKien)}h</td>
      <td class="cc-sumcol cc-highlight">${ccFmt1_(r.buCuoiThang)}</td>`;

    for (let d = 1; d <= soNgay; d++) {
      const iso = thang + '-' + String(d).padStart(2, '0');
      const weekend = ccIsWeekend_(iso);
      const buoi = r.cc[iso];
      const attCls = buoi === 1 ? 'cc-full' : (buoi === 0.5 ? 'cc-half' : (buoi === 'P' ? 'cc-phep' : ''));
      const attLabel = buoi === 1 ? '<i class="fa-solid fa-check"></i>' : (buoi === 0.5 ? '½' : (buoi === 'P' ? 'P' : ''));
      const entry = r.tc[iso];
      let otCls = '', otLabel = '·';
      if (entry) {
        const bd = ccTinhGioTangCa_(entry.start, entry.end);
        otCls = 'cc-filled';
        otLabel = ccFmt1_(bd.quyDoi) + 'h';
      }
      cells += `<td class="cc-daycell ${weekend ? 'cc-weekend' : ''}">
        <div class="cc-daycell-stack">
          ${editable
            ? `<button type="button" class="cc-att-btn ${attCls}" onclick="toggleChamCongCell('${r.userId}','${iso}',this)" aria-label="Chấm công">${attLabel}</button>`
            : `<span class="cc-att-btn ${attCls}">${attLabel}</span>`}
          ${editable
            ? `<button type="button" class="cc-ot-btn ${otCls}" onclick="openTangCaModal('${r.userId}','${iso}')" aria-label="Tăng ca">${otLabel}</button>`
            : `<span class="cc-ot-btn ${otCls}">${otLabel}</span>`}
        </div>
      </td>`;
    }
    return `<tr class="${laToi ? 'cc-my-row' : ''}">${cells}</tr>`;
  }).join('');
}

// Chỉ sửa cục bộ trên trình duyệt (ccData + ccPendingCC) — KHÔNG gọi server, KHÔNG load lại bảng.
// Số liệu tổng hợp bên trái (Phép, Số công...) chỉ được server tính lại đúng sau khi bấm "Lưu thay đổi".
function toggleChamCongCell(userId, ngay, btnEl) {
  const row = (ccData.rows || []).find(r => r.userId === userId);
  if (!row) return;
  const cur = row.cc[ngay];
  const nextBuoi = cur === 1 ? '0.5' : (cur === 0.5 ? 'P' : (cur === 'P' ? '' : '1'));

  if (nextBuoi === '') delete row.cc[ngay];
  else row.cc[ngay] = nextBuoi === 'P' ? 'P' : Number(nextBuoi);
  ccPendingCC[ccKey_(userId, ngay)] = { targetUserId: userId, ngay, buoi: nextBuoi };

  renderChamCongTable();
  ccCapNhatNutLuu_();
}

function openTangCaModal(userId, ngay) {
  const row = (ccData.rows || []).find(r => r.userId === userId);
  if (!row) return;
  const entry = row.tc[ngay];
  ccModalCtx = { userId, ngay };

  document.getElementById('tcModalTitle').textContent = `Tăng ca — ${row.hoTen}`;
  document.getElementById('tcModalSub').textContent = 'Ngày ' + ngay.split('-').reverse().join('/');
  document.getElementById('tcModalStart').value = entry ? entry.start : '18:00';
  document.getElementById('tcModalEnd').value = entry ? entry.end : '22:00';
  document.getElementById('tcModalXoaBtn').style.display = entry ? '' : 'none';
  recalcTangCaModal();
  document.getElementById('tangCaModal').classList.add('active');
}

function closeTangCaModal() {
  document.getElementById('tangCaModal').classList.remove('active');
  ccModalCtx = null;
}

function recalcTangCaModal() {
  const start = document.getElementById('tcModalStart').value;
  const end = document.getElementById('tcModalEnd').value;
  if (!start || !end) return;
  const bd = ccTinhGioTangCa_(start, end);
  document.getElementById('tcBdThuong').textContent = ccFmt1_(bd.gioThuong) + 'h';
  document.getElementById('tcBdDem').textContent = ccFmt1_(bd.gioDem) + 'h (→ ' + ccFmt1_(bd.gioDem * 2) + 'h)';
  document.getElementById('tcBdTong').textContent = ccFmt1_(bd.quyDoi) + 'h';
  document.getElementById('tcQuaNgayNote').textContent = bd.quaNgay ? `→ kết thúc lúc ${end} ngày hôm sau` : '';
}

// Chỉ sửa cục bộ (ccData + ccPendingTC) — KHÔNG gọi server, KHÔNG load lại bảng. Xem luuThayDoiChamCong().
function saveTangCaModal() {
  if (!ccModalCtx) return;
  const start = document.getElementById('tcModalStart').value;
  const end = document.getElementById('tcModalEnd').value;
  if (!start || !end) { showCustomAlert('Vui lòng nhập đủ Giờ bắt đầu và Giờ kết thúc!', 'error'); return; }
  if (start === end) { showCustomAlert('Giờ bắt đầu và Giờ kết thúc không được trùng nhau!', 'error'); return; }

  const row = (ccData.rows || []).find(r => r.userId === ccModalCtx.userId);
  if (row) row.tc[ccModalCtx.ngay] = { start, end };
  ccPendingTC[ccKey_(ccModalCtx.userId, ccModalCtx.ngay)] = { targetUserId: ccModalCtx.userId, ngay: ccModalCtx.ngay, gioBatDau: start, gioKetThuc: end };

  closeTangCaModal();
  renderChamCongTable();
  ccCapNhatNutLuu_();
}

function deleteTangCaModal() {
  if (!ccModalCtx) return;
  const row = (ccData.rows || []).find(r => r.userId === ccModalCtx.userId);
  if (row) delete row.tc[ccModalCtx.ngay];
  ccPendingTC[ccKey_(ccModalCtx.userId, ccModalCtx.ngay)] = { targetUserId: ccModalCtx.userId, ngay: ccModalCtx.ngay, gioBatDau: '', gioKetThuc: '' };

  closeTangCaModal();
  renderChamCongTable();
  ccCapNhatNutLuu_();
}

// Gộp TOÀN BỘ ccPendingCC/ccPendingTC thành 1 lượt gọi capNhatChamCongHangLoat rồi mới load lại —
// đây là lúc DUY NHẤT tab này gọi server để ghi dữ liệu (xem block comment đầu file).
function luuThayDoiChamCong() {
  const btn = document.getElementById('ccBtnLuu');
  if (btn.disabled) return;
  const ccKeys = Object.keys(ccPendingCC);
  const tcKeys = Object.keys(ccPendingTC);
  if (ccKeys.length === 0 && tcKeys.length === 0) return;

  const danhSachCC = ccKeys.map(k => ccPendingCC[k]);
  const danhSachTC = tcKeys.map(k => ccPendingTC[k]);

  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu…';
  document.getElementById('ccThangPicker').disabled = true;

  gsRun('capNhatChamCongHangLoat', myUserId, myPassword, danhSachCC, danhSachTC)
    .then(() => {
      // Chỉ xoá đúng những key đã gửi đi — tránh mất thay đổi mới phát sinh trong lúc đang lưu.
      ccKeys.forEach(k => delete ccPendingCC[k]);
      tcKeys.forEach(k => delete ccPendingTC[k]);
      showCustomAlert('Đã lưu chấm công/tăng ca.', 'success');
      if (!ccIsDirty_()) loadChamCong(ccCurrentThang, true);
      else renderChamCongTable();
    })
    .catch(handleBackendError)
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = origText;
      document.getElementById('ccThangPicker').disabled = false;
      ccCapNhatNutLuu_();
    });
}

let ccDetModalUserId_ = null; // userId của popup Chi tiết công đang mở — dùng để lưu Phép/Bù đầu tháng.

// Popup xem chi tiết công 1 nhân sự — AI CŨNG XEM ĐƯỢC (không kiểm tra canEditChamCong()); riêng ô
// "Phép đầu tháng"/"Bù đầu tháng" chỉ Admin sửa được (đưa vào đây thay vì bảng chính để bảng chính
// gọn — chỉ còn 3 cột nhân sự thực sự cần xem hàng ngày: Số công tính lương/Phép còn lại/Giờ TC dư).
function openChiTietCongModal(userId) {
  const row = (ccData.rows || []).find(r => r.userId === userId);
  if (!row) return;
  ccDetModalUserId_ = userId;

  document.getElementById('detModalTitle').textContent = row.hoTen;
  document.getElementById('detModalSub').textContent = 'Chi tiết công — Tháng ' + ccData.thang.split('-').reverse().join('/');

  const isAdmin = currentRole === 'ADMIN';
  const quotaOk = row.congCuoiTuan >= ccData.quotaThu7;
  const rowsHtml = [
    ['Công Thứ 7', ccFmt1_(row.congThu7)],
    ['Công Chủ Nhật', ccFmt1_(row.congChuNhat)],
    ['Cuối tuần (T7+CN)', `<span class="${quotaOk ? 'cc-q-ok' : 'cc-q-short'}">${quotaOk ? '✓' : '✗'} ${ccFmt1_(row.congCuoiTuan)}</span> / ${ccFmt1_(ccData.quotaThu7)} (định mức)`],
    ['Số ngày nghỉ phép (P)', `${row.soNgayP} ngày` + (row.soNgayP ? (row.phepTruDoP > 0 ? ' — <span class="cc-q-short">bị trừ đủ (tháng này không phát sinh Bù)</span>' : ' — <span class="cc-q-ok">được miễn trừ (có phát sinh Bù)</span>') : '')]
  ].map(([lbl, val]) => `<div class="cc-brk-row"><span class="cc-brk-lbl">${lbl}</span><span>${val}</span></div>`).join('');

  const phepDauThangHtml = isAdmin
    ? `<span style="display:inline-flex; gap:6px; align-items:center;">
        <input type="number" class="dd-input-sm" id="detPhepDauThangInput" step="0.5" value="${row.phepDauThang}">
        <button type="button" class="btn btn-sm" style="background:var(--success); padding:3px 9px;" onclick="saveDetPhepDauThang_()" title="Lưu Phép đầu tháng"><i class="fa-solid fa-floppy-disk"></i></button>
      </span>`
    : ccFmt1_(row.phepDauThang);
  const buDauThangHtml = isAdmin
    ? `<span style="display:inline-flex; gap:6px; align-items:center;">
        <input type="number" class="dd-input-sm" id="detBuDauThangInput" step="0.5" value="${row.buDauThang}">
        <button type="button" class="btn btn-sm" style="background:var(--success); padding:3px 9px;" onclick="saveDetBuDauThang_()" title="Lưu Bù đầu tháng"><i class="fa-solid fa-floppy-disk"></i></button>
      </span>`
    : ccFmt1_(row.buDauThang);

  document.getElementById('detModalBreakdown').innerHTML = rowsHtml + `
    <div class="cc-brk-divider"></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Phép đầu tháng</span><span>${phepDauThangHtml}</span></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Trừ phép (ngày P)</span>${ccFmtDelta_(row.congTruPhepThang)}</div>
    <div class="cc-brk-row cc-brk-total"><span>Phép cuối tháng (dự kiến)</span><span>${ccFmt1_(row.phepCuoiThang)}</span></div>
    <div class="cc-brk-divider"></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Bù đầu tháng</span><span>${buDauThangHtml}</span></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Cuối tuần vượt định mức</span><span>${ccFmt1_(row.congCuoiTuanDu)}</span></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Giờ TC dư từ tháng trước</span><span>${ccFmt1_(row.gioTCDauThang)}h</span></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Giờ TC phát sinh tháng này</span><span>${ccFmt1_(row.tongGioTC)}h</span></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">→ Công TC quy đổi (block 4h/8h)</span><span>${ccFmt1_(row.congTangCaQuyDoi)}</span></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Giờ TC dư, chuyển tháng sau (dự kiến)</span><span>${ccFmt1_(row.gioTCConLaiDuKien)}h</span></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Bù phát sinh tháng này</span>${ccFmtDelta_(row.buTangThangNay)}</div>
    <div class="cc-brk-row cc-brk-total"><span>Bù cuối tháng (dự kiến)</span><span>${ccFmt1_(row.buCuoiThang)}</span></div>
    <div class="cc-brk-divider"></div>
    <div class="cc-brk-row"><span class="cc-brk-lbl">Số công thực làm</span><span>${ccFmt1_(row.congThucLam)}</span></div>
    <div class="cc-brk-row cc-brk-total"><span>Số công tính lương</span><span>${ccFmt1_(row.congTinhLuong)}</span></div>
  `;

  const otDays = Object.keys(row.tc).sort();
  document.getElementById('detModalOtList').innerHTML = otDays.length
    ? otDays.map(iso => {
        const e = row.tc[iso], bd = ccTinhGioTangCa_(e.start, e.end);
        const label = iso.split('-').reverse().slice(0, 2).join('/');
        return `<div class="cc-detail-item"><span>${label}: ${e.start} → ${e.end}${bd.quaNgay ? ' (hôm sau)' : ''}</span><span class="cc-detail-val">${ccFmt1_(bd.quyDoi)}h</span></div>`;
      }).join('')
    : '<div class="cc-detail-empty">Không có ngày tăng ca nào.</div>';

  const pDays = Object.keys(row.cc).filter(iso => row.cc[iso] === 'P').sort();
  document.getElementById('detModalPList').innerHTML = pDays.length
    ? pDays.map(iso => `<div class="cc-detail-item"><span>${iso.split('-').reverse().slice(0, 2).join('/')}</span><span class="cc-detail-val">P</span></div>`).join('')
    : '<div class="cc-detail-empty">Không có ngày nghỉ phép nào.</div>';

  document.getElementById('chiTietCongModal').classList.add('active');
}

function closeChiTietCongModal() {
  document.getElementById('chiTietCongModal').classList.remove('active');
  ccDetModalUserId_ = null;
}

// Cập nhật CỤC BỘ (không gọi lại server) sau khi Admin sửa Phép/Bù đầu tháng — trước đây gọi
// loadChamCong(thang, true) để lấy lại dữ liệu mới, nhưng round-trip đó vẽ lại TOÀN BỘ bảng khiến
// trang có cảm giác "tự load lại" rất khó chịu khi chỉnh nhiều dòng liên tiếp. Vì phepDauThang/
// buDauThang chỉ CỘNG THẲNG vào các cột "cuối tháng" tương ứng (không ảnh hưởng công thức khác), chỉ
// cần dịch đúng phần chênh lệch (delta) là đủ, không cần tính lại từ server.
function ccCapNhatPhepDauThangLocal_(userId, newVal) {
  const row = (ccData.rows || []).find(r => r.userId === userId);
  if (!row) return;
  const delta = newVal - row.phepDauThang;
  row.phepDauThang = newVal;
  row.phepCuoiThang = Math.round((row.phepCuoiThang + delta) * 10) / 10;
  renderChamCongTable();
  if (ccDetModalUserId_ === userId) openChiTietCongModal(userId);
}

function ccCapNhatBuDauThangLocal_(userId, newVal) {
  const row = (ccData.rows || []).find(r => r.userId === userId);
  if (!row) return;
  const delta = newVal - row.buDauThang;
  row.buDauThang = newVal;
  row.buCuoiThang = Math.round((row.buCuoiThang + delta) * 10) / 10;
  renderChamCongTable();
  if (ccDetModalUserId_ === userId) openChiTietCongModal(userId);
}

// Chỉ Admin thấy được ô này (xem điều kiện render ở openChiTietCongModal) — dùng để nhập/sửa số dư
// phép đầu tháng (VD nạp số liệu cũ theo dõi thủ công trước khi có tab này). Có nút "Lưu" riêng (thay
// vì onchange tự lưu khi rời khỏi ô) để người dùng chủ động bấm khi đã nhập xong — tránh cảm giác
// "tự load lại" khi vô tình rời focus khỏi ô trong lúc đang gõ số. Lưu ngay lập tức (không gộp vào
// ccPendingCC/ccPendingTC) vì đây là chỉnh 1 giá trị baseline riêng biệt, không phải chấm công hàng
// loạt — backend adminCapNhatPhepDauThang cũng tự kiểm tra lại đúng vai trò ADMIN.
function saveDetPhepDauThang_() {
  const userId = ccDetModalUserId_;
  const inputEl = document.getElementById('detPhepDauThangInput');
  if (!userId || !inputEl) return;
  const val = parseFloat(inputEl.value);
  if (isNaN(val)) return;
  inputEl.disabled = true;
  gsRun('adminCapNhatPhepDauThang', myUserId, myPassword, userId, ccCurrentThang, val)
    .then(() => ccCapNhatPhepDauThangLocal_(userId, val))
    .catch(err => { inputEl.disabled = false; handleBackendError(err); });
}

function saveDetBuDauThang_() {
  const userId = ccDetModalUserId_;
  const inputEl = document.getElementById('detBuDauThangInput');
  if (!userId || !inputEl) return;
  const val = parseFloat(inputEl.value);
  if (isNaN(val)) return;
  inputEl.disabled = true;
  gsRun('adminCapNhatBuDauThang', myUserId, myPassword, userId, ccCurrentThang, val)
    .then(() => ccCapNhatBuDauThangLocal_(userId, val))
    .catch(err => { inputEl.disabled = false; handleBackendError(err); });
}

// Popup quản lý Ngày lễ (chỉ Admin, nút chỉ hiện với Admin — xem renderChamCongTable) — dùng để tính
// "Số ngày công chuẩn dự kiến" tham khảo ở dòng tiêu đề bảng, không ảnh hưởng công thức cá nhân.
let ccNgayLeCache_ = null;

function openNgayLeModal() {
  document.getElementById('ngayLeNewDate').value = '';
  document.getElementById('ngayLeNewTen').value = '';
  document.getElementById('ngayLeModal').classList.add('active');
  gsRun('getDanhSachNgayLe')
    .then(json => { ccNgayLeCache_ = JSON.parse(json); renderNgayLeList_(); })
    .catch(handleBackendError);
}

function closeNgayLeModal() {
  document.getElementById('ngayLeModal').classList.remove('active');
}

function renderNgayLeList_() {
  const list = ccNgayLeCache_ || [];
  document.getElementById('ngayLeList').innerHTML = list.length
    ? list.map(nl => `<div class="cc-detail-item">
        <span>${nl.ngay.split('-').reverse().join('/')} — ${escapeHtml(nl.tenLe)}</span>
        <button type="button" class="btn btn-sm btn-danger" style="padding:2px 8px;" onclick="xoaNgayLe_('${nl.ngay}')"><i class="fa-solid fa-trash"></i></button>
      </div>`).join('')
    : '<div class="cc-detail-empty">Chưa có ngày lễ nào.</div>';
}

function themNgayLe_() {
  const ngay = document.getElementById('ngayLeNewDate').value;
  const ten = document.getElementById('ngayLeNewTen').value.trim();
  if (!ngay || !ten) { showCustomAlert('Vui lòng nhập đủ ngày và tên ngày lễ.', 'error'); return; }
  gsRun('adminThemNgayLe', myUserId, myPassword, ngay, ten)
    .then(() => {
      document.getElementById('ngayLeNewDate').value = '';
      document.getElementById('ngayLeNewTen').value = '';
      return gsRun('getDanhSachNgayLe');
    })
    .then(json => { ccNgayLeCache_ = JSON.parse(json); renderNgayLeList_(); loadChamCong(ccCurrentThang, true); })
    .catch(handleBackendError);
}

function xoaNgayLe_(ngay) {
  if (!confirm('Xoá ngày lễ ' + ngay.split('-').reverse().join('/') + '?')) return;
  gsRun('adminXoaNgayLe', myUserId, myPassword, ngay)
    .then(() => gsRun('getDanhSachNgayLe'))
    .then(json => { ccNgayLeCache_ = JSON.parse(json); renderNgayLeList_(); loadChamCong(ccCurrentThang, true); })
    .catch(handleBackendError);
}
</script>
