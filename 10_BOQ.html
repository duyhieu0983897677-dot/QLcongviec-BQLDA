<script>
/* ================================================================
   FILE 10: 10_BOQ.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "BOQ" — cây hạng mục khối lượng mời thầu của Hợp đồng
   đang chọn (currentHopDongId, xem 9_HopDong.html) + quản lý Phụ lục
   điều chỉnh giá/khối lượng theo thời điểm + nhập nhanh BOQ từ file
   Excel thật (SheetJS, xem docFileExcel_ ở 9_HopDong.html).

   DANH SÁCH HÀM CHÍNH:
   - renderBOQ()            : Vẽ cây BOQ + danh sách Phụ lục cho Hợp đồng đang chọn (ĐÚNG thứ tự
                              lưu trong sheet, không tự sắp lại theo STT)
   - openBOQItemModal(id)   : Thêm/sửa 1 hạng mục BOQ
   - openThayDoiModal(mplc) : Thêm 1 dòng thay đổi (MOI/THAY_THE/DIEU_CHINH) vào Phụ lục
   - importBOQFromExcel()   : Nhập hàng loạt hạng mục từ file Excel (.xlsx/.xls/.csv)
   ================================================================ */

function renderBOQ() {
    fillHopDongSelect_('boqHopDongSelect');
    const emptyBox = document.getElementById('boqNoHopDong');
    const content = document.getElementById('boqContent');
    const hd = hopDong.find(h => h.maHopDong === currentHopDongId);
    renderHopDongSoLine_('boqHopDongLine', hd);
    if (!hd) {
        if (emptyBox) emptyBox.style.display = '';
        if (content) content.style.display = 'none';
        return;
    }
    if (emptyBox) emptyBox.style.display = 'none';
    if (content) content.style.display = '';
    const editable = canEditHopDong();
    const btnThem = document.getElementById('btnThemBOQItem');
    if (btnThem) btnThem.style.display = editable ? '' : 'none';
    const importBox = document.getElementById('boqImportBox');
    if (importBox) importBox.style.display = editable ? 'flex' : 'none';
    renderBOQTree();
    renderBOQTotalBlock_(hd);
    renderPhuLucList();
}

// Khối 5 hàng "Tổng cộng giá trị trước/sau thuế VAT" ở cuối bảng BOQ — Giá trị giảm giá là ô nhập
// tay (đồng bộ 2 chiều với hd.giamGia, xem capNhatGiamGiaBOQ_()), các hàng còn lại đều tính lại từ
// Khối lượng/Đơn giá HIỆU LỰC (sau Phụ lục) của bảng BOQ, cùng công thức với giaTriHienHanhHopDong()
// (9_HopDong.html) — "Giá trị sau giảm giá (chưa VAT)" ở đây LUÔN khớp với con số đó.
function renderBOQTotalBlock_(hd) {
    const items = boq.filter(b => b.maHopDong === hd.maHopDong && !b.isHeader);
    const tongTruocThue = Math.round(items.reduce((s, b) => s + (b.khoiLuongHieuLuc || 0) * (b.donGiaHieuLuc || 0), 0));
    const sauGiamGia = giaTriHienHanhHopDong(hd.maHopDong);
    const vatRate = Number(hd.thueVAT) || 0;
    const thueVat = Math.round(sauGiamGia * vatRate / 100);
    const tongSauThue = sauGiamGia + thueVat;

    document.getElementById('boqTongTruocThue').textContent = tienHienThi_(tongTruocThue) + 'đ';
    const giamGiaInput = document.getElementById('boqGiamGiaInput');
    // Không ghi đè giá trị đang gõ dở nếu ô đang được focus — tránh giật con trỏ khi reloadHopDongChiTiet_()
    // chạy lại renderBOQ() ngay sau khi lưu.
    if (document.activeElement !== giamGiaInput) setTienValue_(giamGiaInput, hd.giamGia || 0);
    giamGiaInput.disabled = !canEditHopDong();
    document.getElementById('boqSauGiamGia').textContent = tienHienThi_(sauGiamGia) + 'đ';
    document.getElementById('boqVatPercent').textContent = vatRate;
    document.getElementById('boqThueVat').textContent = tienHienThi_(thueVat) + 'đ';
    document.getElementById('boqTongSauThue').textContent = tienHienThi_(tongSauThue) + 'đ';
}

// Sửa Giá trị giảm giá ngay tại tab BOQ — lưu qua đúng adminSaveHopDong() (cùng đường lưu với modal
// Sửa Hợp đồng ở 9_HopDong.html), khỏi phải nhảy sang tab Hợp đồng chỉ để đổi 1 con số.
function capNhatGiamGiaBOQ_() {
    const hd = hopDong.find(h => h.maHopDong === currentHopDongId);
    if (!hd) return;
    const newVal = parseTienInput_(document.getElementById('boqGiamGiaInput').value) || 0;
    if (newVal === (hd.giamGia || 0)) return;
    gsRun('adminSaveHopDong', myUserId, myPassword, Object.assign({}, hd, { giamGia: newVal }))
        .then(() => { showCustomAlert('Đã cập nhật Giá trị giảm giá.', 'success'); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError);
}

// Cây BOQ hiển thị ĐÚNG theo thứ tự lưu trong sheet (= thứ tự tạo/nhập) — KHÔNG tự sắp xếp lại
// theo STT, vì STT chỉ là nhãn hiển thị tự do (có thể trùng/bỏ trống ở nhiều dòng), giống hệt cách
// app cũ coi vị trí trong mảng items[] là thứ tự đúng, còn STT/level chỉ để hiển thị thụt lề.
//
// Đầu mục cha bấm vào để thu gọn/mở — mặc định THU GỌN mọi đầu mục (boqExpandedHeaders_ rỗng khi
// mới vào tab, chỉ ghi nhớ đầu mục nào NGƯỜI DÙNG đã bấm mở trong phiên hiện tại).
let boqExpandedHeaders_ = new Set();

function toggleBoqHeader_(maBOQ) {
    if (boqExpandedHeaders_.has(maBOQ)) boqExpandedHeaders_.delete(maBOQ);
    else boqExpandedHeaders_.add(maBOQ);
    renderBOQTree();
}

// Với mỗi dòng, trả về mảng song song chuỗi đầu mục cha (mã BOQ, từ gần nhất ra xa nhất) — dựa vào
// vị trí trong danh sách + cấp (cap), giống hệt cách app cũ dò p0/p1/p2 khi in danh sách.
function tinhChuoiChaBOQ_(items) {
    const chains = [];
    const stack = []; // [{maBOQ, cap}] các đầu mục đang còn trong phạm vi (cap tăng dần khi push)
    items.forEach(b => {
        while (stack.length && stack[stack.length - 1].cap >= (b.cap || 0)) stack.pop();
        chains.push(stack.map(h => h.maBOQ));
        if (b.isHeader) stack.push({ maBOQ: b.maBOQ, cap: b.cap || 0 });
    });
    return chains;
}

// Dựng HTML <option>/<optgroup> cho 1 danh sách hạng mục BOQ (đã lọc theo Hợp đồng) — nhóm mỗi
// hạng mục vào <optgroup> mang tên đầu mục cha GẦN NHẤT (dùng tinhChuoiChaBOQ_), để dropdown chọn
// hạng mục hiện rõ đang thuộc mục lớn nào thay vì 1 danh sách phẳng. includeHeaders=true thì đầu
// mục cha cũng là 1 option chọn được (đặt vào optgroup của CHÍNH cha nó, tức ông/bà) — dùng cho
// modal Thêm/Sửa/Xóa BOQ (10_BOQ.html); false thì chỉ liệt kê hạng mục con — dùng cho dropdown
// chọn hạng mục để ghi nhận khối lượng (11_NghiemThu.html).
function buildBOQOptgroupHTML_(items, includeHeaders) {
    const chains = tinhChuoiChaBOQ_(items);
    const byId = {};
    items.forEach(b => { byId[b.maBOQ] = b; });

    const groupOrder = [];
    const groupOptions = {};
    items.forEach((b, idx) => {
        if (b.isHeader && !includeHeaders) return;
        const chain = chains[idx];
        const parentId = chain.length ? chain[chain.length - 1] : '';
        if (!(parentId in groupOptions)) { groupOptions[parentId] = []; groupOrder.push(parentId); }
        const label = (b.stt ? b.stt + ' - ' : '') + b.tenHangMuc;
        groupOptions[parentId].push(`<option value="${b.maBOQ}">${escapeHtml(label)}</option>`);
    });

    return groupOrder.map(key => {
        const optionsHtml = groupOptions[key].join('');
        if (!key) return optionsHtml; // không có cha (đầu mục gốc) — không bọc optgroup
        const parent = byId[key];
        const label = parent ? (parent.stt ? parent.stt + ' - ' : '') + parent.tenHangMuc : key;
        return `<optgroup label="${escapeHtml(label)}">${optionsHtml}</optgroup>`;
    }).join('');
}

// Bảng BOQ CHỈ còn 7 cột cốt lõi (STT/Tên/ĐVT/Khối lượng/Đơn giá/Thành tiền/Ghi chú) — Khối lượng/
// Đơn giá dùng giá trị HIỆU LỰC (sau Phụ lục), khớp với Giá trị hiện hành HĐ ở giaTriHienHanhHopDong().
// Tiến độ % / Đã nghiệm thu / Thời gian KH chuyển sang xem ở bảng lũy kế tab Nghiệm thu/Thanh toán.
// KHÔNG còn nút Sửa/Xóa từng dòng — dùng chung 1 nút "Thêm / Sửa hạng mục" mở openBOQItemModal(),
// chọn hạng mục cần sửa/xóa qua dropdown bên trong modal (xem #boqManageSelect).
function renderBOQTree() {
    const tbody = document.getElementById('boqBody');
    const items = boq.filter(b => b.maHopDong === currentHopDongId);
    if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center" style="color:gray; padding:15px;">Chưa có hạng mục BOQ nào.</td></tr>`;
        return;
    }
    const chains = tinhChuoiChaBOQ_(items);

    let html = '';
    items.forEach((b, idx) => {
        // Ẩn hẳn nếu có bất kỳ đầu mục cha nào (ở bất kỳ cấp nào) đang bị thu gọn.
        if (chains[idx].some(pid => !boqExpandedHeaders_.has(pid))) return;

        const indent = 16 + (b.cap || 0) * 20;
        if (b.isHeader) {
            const isOpen = boqExpandedHeaders_.has(b.maBOQ);
            html += `<tr class="boq-header-row" style="cursor:pointer;" onclick="toggleBoqHeader_('${b.maBOQ}')">
                <td colspan="7" style="padding-left:${indent}px;">
                    <i class="fa-solid ${isOpen ? 'fa-chevron-down' : 'fa-chevron-right'}" style="margin-right:8px; color:var(--accent);"></i>
                    <b>${b.stt ? b.stt + ' - ' : ''}${b.tenHangMuc}</b>
                </td>
            </tr>`;
            return;
        }
        const thanhTien = (b.khoiLuongHieuLuc || 0) * (b.donGiaHieuLuc || 0);
        html += `<tr>
            <td class="text-center">${b.stt || '--'}</td>
            <td style="padding-left:${indent}px;">${b.tenHangMuc}${b.maPhuLucTao ? ' <span class="bc-badge pl-tag">PL</span>' : ''}</td>
            <td class="text-center">${b.donVi || '--'}</td>
            <td class="text-right val-hopdong">${khoiLuongHienThi_(b.khoiLuongHieuLuc)}</td>
            <td class="text-right">${tienHienThi_(b.donGiaHieuLuc)}</td>
            <td class="text-right val-nghiemthu">${tienHienThi_(thanhTien)}</td>
            <td style="text-align:left;">${b.ghiChu || '--'}</td>
        </tr>`;
    });
    tbody.innerHTML = html || `<tr><td colspan="7" class="text-center" style="color:gray; padding:15px;">Chưa có hạng mục BOQ nào.</td></tr>`;
}

// Modal Thêm/Sửa/Xóa BOQ dùng CHUNG 1 nút — gọi openBOQItemModal() (không tham số) để mở modal ở
// trạng thái "Thêm mới", hoặc openBOQItemModal(maBOQ) để mở thẳng vào 1 hạng mục có sẵn. Dropdown
// #boqManageSelect bên trong modal (đổi giá trị gọi lại chính hàm này) cho phép đổi mục tiêu SỬA
// mà không cần đóng/mở lại modal — đây là nơi DUY NHẤT chọn hạng mục để sửa/xóa, thay cho các nút
// Sửa/Xóa từng dòng đã bỏ khỏi bảng (xem renderBOQTree()).
function openBOQItemModal(maBOQ) {
    const item = maBOQ ? boq.find(b => b.maBOQ === maBOQ) : null;
    const allItems = boq.filter(b => b.maHopDong === currentHopDongId);

    const sel = document.getElementById('boqManageSelect');
    sel.innerHTML = '<option value="">-- Thêm hạng mục mới --</option>' + buildBOQOptgroupHTML_(allItems, true);
    sel.value = item ? item.maBOQ : '';

    document.getElementById('boqModalTitle').textContent = item ? 'Sửa hạng mục BOQ' : 'Thêm hạng mục BOQ';
    document.getElementById('boqEditId').value = item ? item.maBOQ : '';
    document.getElementById('boqStt').value = item ? item.stt : '';
    document.getElementById('boqTen').value = item ? item.tenHangMuc : '';
    document.getElementById('boqIsHeader').checked = item ? item.isHeader : false;
    document.getElementById('boqCap').value = item ? item.cap : 0;
    document.getElementById('boqDonVi').value = item ? item.donVi : '';
    document.getElementById('boqKhoiLuong').value = item ? item.khoiLuongHopDong : '';
    setTienValue_(document.getElementById('boqDonGia'), item ? item.donGia : '');
    document.getElementById('boqGhiChu').value = item ? (item.ghiChu || '') : '';
    document.getElementById('boqBtnXoa').style.display = item ? '' : 'none';
    toggleBOQHeaderFields();
    document.getElementById('boqItemModal').classList.add('active');
}

function toggleBOQHeaderFields() {
    const isHeader = document.getElementById('boqIsHeader').checked;
    document.getElementById('boqNonHeaderFields').style.display = isHeader ? 'none' : '';
}

function closeBOQItemModal() { document.getElementById('boqItemModal').classList.remove('active'); }

function saveBOQItemModal() {
    const btnLuu = document.getElementById('boqBtnLuu');
    if (btnLuu.disabled) return; // chặn bấm lặp trong lúc đang chờ phản hồi server
    // Ngày bắt đầu/Ngày kết thúc KH KHÔNG còn sửa ở modal này — quản lý riêng ở tab "Tiến độ"
    // (xem renderTdtcBoqDetail_ ở 14_TienDoThiCong.html). Giữ nguyên giá trị đang có của hạng mục
    // (nếu là sửa) để lưu ở đây không vô tình xoá trắng ngày đã đặt bên tab Tiến độ.
    const maBOQ = document.getElementById('boqEditId').value;
    const existing = maBOQ ? boq.find(b => b.maBOQ === maBOQ) : null;
    const payload = {
        maBOQ,
        maHopDong: currentHopDongId,
        stt: document.getElementById('boqStt').value.trim(),
        tenHangMuc: document.getElementById('boqTen').value.trim(),
        isHeader: document.getElementById('boqIsHeader').checked,
        cap: parseInt(document.getElementById('boqCap').value, 10) || 0,
        donVi: document.getElementById('boqDonVi').value.trim(),
        khoiLuongHopDong: parseNumberSafely(document.getElementById('boqKhoiLuong').value) || 0,
        donGia: parseTienInput_(document.getElementById('boqDonGia').value) || 0,
        ngayBatDauKH: existing ? (existing.ngayBatDauKH || '') : '',
        ngayKetThucKH: existing ? (existing.ngayKetThucKH || '') : '',
        ghiChu: document.getElementById('boqGhiChu').value.trim()
    };
    if (!payload.tenHangMuc) { showCustomAlert('Vui lòng nhập Tên hạng mục!', 'error'); return; }

    btnLuu.disabled = true;
    gsRun('adminSaveBOQItem', myUserId, myPassword, payload)
        .then(() => { showCustomAlert('Đã lưu hạng mục BOQ.', 'success'); closeBOQItemModal(); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError)
        .finally(() => { btnLuu.disabled = false; });
}

function deleteBOQItem(maBOQ) {
    const item = boq.find(b => b.maBOQ === maBOQ);
    if (!item) return;
    if (!confirm(`Xác nhận XÓA hạng mục "${item.tenHangMuc}"?`)) return;
    gsRun('adminXoaBOQItem', myUserId, myPassword, maBOQ)
        .then(() => { showCustomAlert('Đã xóa hạng mục BOQ.', 'success'); closeBOQItemModal(); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError);
}

// --- Phụ lục Hợp đồng ---
// Phụ lục KHÔNG bao giờ xóa hẳn — chỉ Sửa thông tin hoặc Vô hiệu hóa/Khôi phục (giữ lại tra cứu),
// đúng rule app cũ (toggleAddendumActive). Phụ lục đã Vô hiệu hóa vẫn hiện, mờ đi + có nhãn.
function renderPhuLucList() {
    const box = document.getElementById('phuLucList');
    if (!box) return;
    const btnThem = document.getElementById('btnThemPhuLuc');
    if (btnThem) btnThem.style.display = canEditHopDong() ? '' : 'none';
    const list = phuLuc.filter(p => p.maHopDong === currentHopDongId);
    if (list.length === 0) {
        box.innerHTML = `<div class="thongbao-empty">Chưa có Phụ lục nào.</div>`;
        return;
    }
    const editable = canEditHopDong();
    box.innerHTML = list.map(pl => {
        const changes = phuLucThayDoi.filter(c => c.maPhuLuc === pl.maPhuLuc);
        const rows = changes.map(c => {
            const item = boq.find(b => b.maBOQ === c.maBOQ);
            const ten = item ? item.tenHangMuc : c.maBOQ;
            let mota = 'Thêm hạng mục mới';
            if (c.loaiThayDoi === 'THAY_THE') mota = `Thay khối lượng → ${khoiLuongHienThi_(c.khoiLuongMoi)}`;
            else if (c.loaiThayDoi === 'DIEU_CHINH') mota = `Điều chỉnh ${c.khoiLuongDieuChinh > 0 ? '+' : ''}${khoiLuongHienThi_(c.khoiLuongDieuChinh)}`;
            return `<li>${ten}: ${mota}</li>`;
        }).join('');
        const vohieu = pl.active === false;
        return `<div class="pl-item" style="${vohieu ? 'opacity:0.6;' : ''}">
            <div class="pl-item-head">
                <b>${pl.soHieu}</b> <span class="pl-item-date">${formatVN(pl.ngayPhuLuc)}</span>
                ${vohieu ? '<span class="bc-badge overdue">Đã vô hiệu hóa</span>' : ''}
                ${editable ? `<span class="action-cell" style="float:right;">
                    ${!vohieu ? `<button class="btn btn-sm" style="background:var(--primary);" onclick="openThayDoiModal('${pl.maPhuLuc}')"><i class="fa-solid fa-plus"></i> Thay đổi</button>` : ''}
                    <button class="btn btn-sm" style="background:var(--accent);" onclick="openPhuLucModal('${pl.maPhuLuc}')" aria-label="Sửa Phụ lục" title="Sửa Phụ lục"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-sm ${vohieu ? '' : 'btn-danger'}" style="${vohieu ? 'background:var(--success);' : ''}" onclick="toggleTrangThaiPhuLuc('${pl.maPhuLuc}')">${vohieu ? '<i class="fa-solid fa-rotate-left"></i> Khôi phục' : '<i class="fa-solid fa-ban"></i> Vô hiệu hóa'}</button>
                </span>` : ''}
            </div>
            ${pl.ghiChu ? `<div class="pl-item-note">${pl.ghiChu}</div>` : ''}
            ${rows ? `<ul class="pl-change-list">${rows}</ul>` : '<div class="pl-item-note">Chưa có thay đổi nào.</div>'}
        </div>`;
    }).join('');
}

function openPhuLucModal(maPhuLuc) {
    const pl = maPhuLuc ? phuLuc.find(p => p.maPhuLuc === maPhuLuc) : null;
    document.getElementById('phuLucModalTitle').textContent = pl ? 'Sửa Phụ lục' : 'Thêm Phụ lục';
    document.getElementById('plEditId').value = pl ? pl.maPhuLuc : '';
    document.getElementById('plSoHieu').value = pl ? pl.soHieu : '';
    document.getElementById('plNgay').value = pl ? formatVN(pl.ngayPhuLuc) : formatVN(getTodayDate());
    document.getElementById('plGhiChu').value = pl ? pl.ghiChu : '';
    document.getElementById('phuLucModal').classList.add('active');
    setTimeout(() => {
        try {
            if (typeof flatpickr !== 'undefined') {
                const el = document.getElementById('plNgay');
                if (!el._flatpickr) flatpickr(el, { dateFormat: 'd/m/Y', locale: (flatpickr.l10ns && flatpickr.l10ns.vi) ? 'vi' : undefined, allowInput: true });
            }
        } catch (e) { console.warn(e); }
    }, 100);
}
function closePhuLucModal() { document.getElementById('phuLucModal').classList.remove('active'); }

function savePhuLucModal() {
    const maPhuLuc = document.getElementById('plEditId').value;
    const soHieu = document.getElementById('plSoHieu').value.trim();
    const ngay = convertDMYtoISO(document.getElementById('plNgay').value.trim());
    const ghiChu = document.getElementById('plGhiChu').value.trim();
    if (!soHieu) { showCustomAlert('Vui lòng nhập Số hiệu Phụ lục!', 'error'); return; }

    const call = maPhuLuc
        ? gsRun('adminSuaPhuLuc', myUserId, myPassword, maPhuLuc, soHieu, ngay, ghiChu)
        : gsRun('adminTaoPhuLuc', myUserId, myPassword, currentHopDongId, soHieu, ngay, ghiChu);
    call.then(() => { showCustomAlert('Đã lưu Phụ lục.', 'success'); closePhuLucModal(); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError);
}

function toggleTrangThaiPhuLuc(maPhuLuc) {
    const pl = phuLuc.find(p => p.maPhuLuc === maPhuLuc);
    if (!pl) return;
    const dangVoHieu = pl.active === false;
    const hanhDong = dangVoHieu ? 'khôi phục' : 'vô hiệu hóa';
    if (!confirm(`Xác nhận ${hanhDong} Phụ lục "${pl.soHieu}"? Toàn bộ thay đổi khối lượng/đơn giá của Phụ lục này sẽ ${dangVoHieu ? 'được áp dụng lại' : 'tạm ngừng áp dụng'}, dữ liệu Phụ lục vẫn được giữ lại để tra cứu.`)) return;

    gsRun('adminToggleTrangThaiPhuLuc', myUserId, myPassword, maPhuLuc)
        .then(() => { showCustomAlert(`Đã ${hanhDong} Phụ lục.`, 'success'); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError);
}

let thayDoiPhuLucId_ = '';
function openThayDoiModal(maPhuLuc) {
    thayDoiPhuLucId_ = maPhuLuc;
    const sel = document.getElementById('tdBOQ');
    sel.innerHTML = '<option value="">-- Chọn hạng mục --</option>' +
        boq.filter(b => b.maHopDong === currentHopDongId && !b.isHeader)
           .map(b => `<option value="${b.maBOQ}">${b.stt ? b.stt + ' - ' : ''}${b.tenHangMuc}</option>`).join('');
    document.getElementById('tdLoai').value = 'DIEU_CHINH';
    document.getElementById('tdKhoiLuong').value = '';
    document.getElementById('tdDonGiaMoi').value = '';
    document.getElementById('tdTenMoi').value = '';
    document.getElementById('tdDonViMoi').value = '';
    toggleThayDoiFields();
    document.getElementById('thayDoiModal').classList.add('active');
}
function closeThayDoiModal() { document.getElementById('thayDoiModal').classList.remove('active'); }

function toggleThayDoiFields() {
    const loai = document.getElementById('tdLoai').value;
    document.getElementById('tdBOQGroup').style.display = loai === 'MOI' ? 'none' : '';
    document.getElementById('tdMoiGroup').style.display = loai === 'MOI' ? '' : 'none';
    document.getElementById('tdKhoiLuongLabel').textContent =
        loai === 'THAY_THE' ? 'Khối lượng mới (thay hẳn)' : (loai === 'DIEU_CHINH' ? 'Chênh lệch (+/-)' : 'Khối lượng ban đầu');
}

function saveThayDoiModal() {
    const btnLuu = document.getElementById('tdBtnLuu');
    if (btnLuu.disabled) return; // chặn bấm lặp trong lúc đang chờ phản hồi server
    const loai = document.getElementById('tdLoai').value;
    const klRaw = parseNumberSafely(document.getElementById('tdKhoiLuong').value);
    const donGiaMoiRaw = document.getElementById('tdDonGiaMoi').value.trim();

    const payload = { loaiThayDoi: loai, donGiaMoi: donGiaMoiRaw ? parseNumberSafely(donGiaMoiRaw) : null };
    if (loai === 'MOI') {
        const ten = document.getElementById('tdTenMoi').value.trim();
        if (!ten) { showCustomAlert('Vui lòng nhập Tên hạng mục mới!', 'error'); return; }
        payload.boqMoi = {
            tenHangMuc: ten, donVi: document.getElementById('tdDonViMoi').value.trim(),
            khoiLuongHopDong: isNaN(klRaw) ? 0 : klRaw, donGia: donGiaMoiRaw ? parseNumberSafely(donGiaMoiRaw) : 0
        };
    } else {
        payload.maBOQ = document.getElementById('tdBOQ').value;
        if (!payload.maBOQ) { showCustomAlert('Vui lòng chọn Hạng mục!', 'error'); return; }
        if (isNaN(klRaw)) { showCustomAlert('Vui lòng nhập khối lượng!', 'error'); return; }
        if (loai === 'THAY_THE') payload.khoiLuongMoi = klRaw; else payload.khoiLuongDieuChinh = klRaw;
    }

    btnLuu.disabled = true;
    gsRun('adminThemThayDoiPhuLuc', myUserId, myPassword, thayDoiPhuLucId_, payload)
        .then(() => { showCustomAlert('Đã thêm thay đổi vào Phụ lục.', 'success'); closeThayDoiModal(); reloadHopDongChiTiet_(currentHopDongId); })
        .catch(handleBackendError)
        .finally(() => { btnLuu.disabled = false; });
}

// --- Nhập nhanh BOQ từ file Excel thật (.xlsx/.xls/.csv) ---
// Cột: STT | Tên hạng mục | ĐVT | Khối lượng | Đơn giá | Thành tiền (bỏ qua) | Ngày BĐ KH | Ngày KT
// KH (2 cột ngày cuối không bắt buộc). Dòng có STT là số La Mã/chữ cái, HOẶC không có cả Khối
// lượng lẫn Đơn giá, được tự nhận là Đầu mục — port nguyên logic đọc file BOQ của app cũ (importExcel).
function importBOQFromExcel() {
    if (!currentHopDongId) { showCustomAlert('Chưa chọn Hợp đồng!', 'error'); return; }
    const fileInput = document.getElementById('boqExcelFile');
    const file = fileInput.files[0];
    if (!file) { showCustomAlert('Vui lòng chọn file Excel!', 'error'); return; }
    const btn = document.getElementById('boqImportBtn');
    if (btn.disabled) return; // chặn bấm lặp trong lúc đang chờ phản hồi server

    docFileExcel_(file).then(rows => {
        const payloads = [];
        rows.forEach((row, idx) => {
            if (idx === 0) return; // bỏ dòng tiêu đề
            const stt = sttTuExcel_(row[0]);
            const ten = String(row[1] || '').trim();
            if (!ten) return;
            const lower = ten.toLowerCase();
            if (lower.includes('tổng cộng') || lower.includes('thuế vat') || lower.includes('giảm giá')) return;

            const qty = parseNumberSafely(row[3]);
            const price = parseNumberSafely(row[4]);
            const level = layCapTuSTT_(stt);
            const isHeader = level === 0 || level === 1 || (isNaN(qty) && isNaN(price));

            payloads.push({
                maHopDong: currentHopDongId, stt, tenHangMuc: ten, isHeader,
                cap: level === -1 ? (isHeader ? 0 : 2) : level,
                donVi: isHeader ? '' : String(row[2] || '').trim(),
                khoiLuongHopDong: (isHeader || isNaN(qty)) ? 0 : qty,
                donGia: (isHeader || isNaN(price)) ? 0 : price,
                ngayBatDauKH: ngayExcelToISO_(row[6]), ngayKetThucKH: ngayExcelToISO_(row[7])
            });
        });
        if (payloads.length === 0) { showCustomAlert('Không có dòng hợp lệ để nhập!', 'error'); return; }

        const origText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = 'Đang nhập…';
        // Gộp toàn bộ các dòng thành 1 lượt gọi duy nhất (adminSaveBOQItemHangLoat) thay vì gọi lặp
        // adminSaveBOQItem() từng dòng — file Excel nhiều dòng trước đây là N round-trip riêng lên
        // Apps Script, rất chậm khi nhập nhiều hạng mục cùng lúc.
        gsRun('adminSaveBOQItemHangLoat', myUserId, myPassword, payloads)
            .then(resultsJson => {
                const ok = JSON.parse(resultsJson).filter(r => r.ok).length;
                showCustomAlert(`Đã nhập ${ok} dòng vào BOQ.`, ok > 0 ? 'success' : 'error');
                fileInput.value = '';
                if (ok > 0) document.getElementById('boqExcelModal').classList.remove('active');
                reloadHopDongChiTiet_(currentHopDongId);
            })
            .catch(handleBackendError)
            .finally(() => { btn.disabled = false; btn.innerHTML = origText; });
    }).catch(err => showCustomAlert('Lỗi đọc file Excel: ' + err.message, 'error'));
}
</script>
