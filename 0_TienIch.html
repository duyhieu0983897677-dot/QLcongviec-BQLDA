<script>
/* ================================================================
   FILE 0: 0_TienIch.html
   ------------------------------------------------------------------
   PHẠM VI: Nền tảng khởi động ứng dụng + các hàm tiện ích dùng chung
   (chuyển tab, tải dữ liệu, định dạng ngày/số, thông báo popup, gọi
   backend dạng Promise).

   DANH SÁCH HÀM CHÍNH:
   - switchTab()      : Chuyển tab đang xem
   - (cuối file)      : Gọi getData() ngay khi script này chạy (không đợi window.onload) để tải
                        dữ liệu (Hạng mục/Gói thầu/Công việc/User) từ Google Sheet khi mở trang
   - reloadData()      : Tải lại dữ liệu sau khi ghi Nhật ký / sửa Hạng mục / Gói thầu
   - gsRun()           : Bọc google.script.run thành Promise, dùng để chain nhiều lệnh backend
   - showCustomAlert() : Hiện thông báo xanh/đỏ
   - round0(), formatVN(), convertDMYtoISO()... : Hàm tiện ích dùng khắp nơi
   ================================================================ */

let hangMuc = [];    // Cây mã/tên Hạng mục tham chiếu (capDo 1/2/3) — chỉ để lọc, không nhận %
let goiThau = [];    // Danh sách Gói thầu, mỗi Gói thầu gộp nhiều Hạng mục
let congViec = [];   // Công việc do Admin/Giám sát tự tạo — ĐÂY là đơn vị nhận Nhật ký tiến độ,
                      // đã có sẵn luyKe/trangThaiMau (inprogress/done/late_done/overdue) tính từ
                      // NhatKyTienDo, xem chi tiết logic ở getData() trong Code.js
let users = [];      // Danh sách Giám sát / Admin
let collapsedGroups = new Set();

const TRANGTHAI_LABEL = {
    pending: 'Chờ thực hiện',
    inprogress: 'Đang thực hiện',
    done: 'Hoàn thành',
    late_done: 'Trễ tiến độ nhưng hoàn thành',
    overdue: 'Trễ tiến độ không hoàn thành'
};
const PHAN_LOAI_LABEL = { ho_so: 'I. Phần hồ sơ', thi_cong: 'II. Phần triển khai thi công' };

function switchTab(tabId) {
    const contents = document.querySelectorAll('.tab-content');
    contents.forEach(content => content.classList.remove('active'));

    const targetTab = document.getElementById(tabId);
    if (targetTab) targetTab.classList.add('active');

    const buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(btn => {
        if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${tabId}'`)) {
            btn.classList.add('active');
            const parentGroup = btn.closest('.nav-group');
            if (parentGroup) parentGroup.classList.add('open');
        } else {
            btn.classList.remove('active');
        }
    });

    if (tabId === 'dashboard') safeRender_('renderDashboard', 'Tổng quan');
    if (tabId === 'danhsach') safeRender_('renderDanhSach', 'Danh sách');
    if (tabId === 'diemdanh') safeRender_('renderDiemDanh', 'Điểm danh & Phép');
    if (tabId === 'nguoidung') safeRender_('renderNguoiDung', 'Quản lý Giám sát');
    window.scrollTo(0, 0);
}

function toggleNavGroup(headerBtn) {
    const group = headerBtn.closest('.nav-group');
    if (group) group.classList.toggle('open');
}

// Bọc google.script.run thành Promise để chain nhiều lệnh (vd: upload ảnh xong rồi mới gửi log).
function gsRun(fnName, ...args) {
    return new Promise((resolve, reject) => {
        if (typeof google === 'undefined') { reject(new Error('Không có kết nối Google Apps Script (đang xem thử ngoài trình duyệt).')); return; }
        google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(err => reject(err instanceof Error ? err : new Error((err && err.message) || String(err))))
            [fnName](...args);
    });
}

function applyLoadedData(response) {
    const parsed = JSON.parse(response);
    hangMuc = parsed.hangMuc || [];
    goiThau = parsed.goiThau || [];
    congViec = parsed.congViec || [];
    users = parsed.users || [];
    updateUI();
}

// Màn hình nhỏ (điện thoại, <768px): mở trang chủ dạng ô lớn thay vì thẳng vào Tổng quan.
if (window.innerWidth < 768 && document.getElementById('home')) {
    switchTab('home');
}

// KHÔNG đợi window.onload (chỉ bắn sau khi mọi ảnh/font/CDN script tải xong) — script này nằm
// cuối <body> nên DOM cần dùng đã sẵn sàng, gọi getData() ngay để round-trip lên Apps Script chạy
// SONG SONG với phần tải font/icon còn lại, thay vì phải đợi xong hết rồi mới bắt đầu.
if (typeof google !== 'undefined') {
    google.script.run.withSuccessHandler(applyLoadedData).getData();
} else {
    // Chế độ xem thử (không có backend Google Apps Script) — không load gì cả
    updateUI();
}

// Gọi lại sau khi ghi Nhật ký tiến độ / sửa Hạng mục / Gói thầu — server luôn là nguồn sự thật
// (lũy kế % được server tính lại từ NhatKyTienDo), không tự suy đoán ở client.
function reloadData() {
    return gsRun('getData').then(applyLoadedData).then(loadThongBao);
}

// Nhận TÊN CHUỖI của hàm (không nhận thẳng tham chiếu hàm) và tra qua window[...] —
// vì nếu truyền thẳng `renderDashboard` mà hàm đó chưa tồn tại, việc "tra" tên xảy ra
// NGAY TẠI chỗ gọi (trước khi vào được safeRender_), khiến try/catch bên trong vô dụng.
// Nếu hàm chưa sẵn sàng, tự thử lại vài lần (phòng trường hợp môi trường tải script
// chậm/không đồng bộ) trước khi báo lỗi hẳn cho người dùng.
function safeRender_(fnName, label, attempt) {
    attempt = attempt || 0;
    const fn = window[fnName];
    if (typeof fn !== 'function') {
        if (attempt < 10) { setTimeout(() => safeRender_(fnName, label, attempt + 1), 150); return; }
        console.error('Không tìm thấy hàm ' + fnName + ' sau nhiều lần thử.');
        showCustomAlert('Không tải được giao diện "' + label + '" (thiếu hàm ' + fnName + '). Vui lòng tải lại trang (F5). Nếu vẫn lỗi, báo Quản trị.', 'error');
        return;
    }
    try { fn(); } catch (e) {
        console.error('Lỗi khi vẽ lại ' + label + ':', e);
        showCustomAlert('Đã lưu dữ liệu, nhưng vẽ lại giao diện "' + label + '" bị lỗi: ' + e.message + '. Vui lòng tải lại trang (F5).', 'error');
    }
}

function updateUI() {
    if (document.getElementById('dashboard') && document.getElementById('dashboard').classList.contains('active')) safeRender_('renderDashboard', 'Tổng quan');
    if (document.getElementById('danhsach') && document.getElementById('danhsach').classList.contains('active')) safeRender_('renderDanhSach', 'Danh sách');
    if (document.getElementById('diemdanh') && document.getElementById('diemdanh').classList.contains('active')) safeRender_('renderDiemDanh', 'Điểm danh & Phép');
    if (document.getElementById('nguoidung') && document.getElementById('nguoidung').classList.contains('active')) safeRender_('renderNguoiDung', 'Quản lý Giám sát');
}

// --- HÀM THÔNG BÁO XANH ĐỎ ---
// Thành công: tự tắt sau ~1.6s (vẫn bấm OK tắt sớm được).
// Lỗi: giữ nguyên, bắt buộc bấm OK mới tắt (cần đọc kỹ nội dung lỗi).
let alertAutoCloseTimer_ = null;

function showCustomAlert(msg, type = 'error') {
    const content = document.getElementById('alertModalContent');
    const icon = document.getElementById('alertIcon');
    const title = document.getElementById('alertTitle');
    const btn = document.getElementById('alertBtn');

    if (alertAutoCloseTimer_) { clearTimeout(alertAutoCloseTimer_); alertAutoCloseTimer_ = null; }

    if (type === 'success') {
        content.className = 'modal-content construction-modal modal-success';
        icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        icon.style.color = 'var(--success)';
        title.innerText = 'THÀNH CÔNG';
        title.style.color = 'var(--success)';
        btn.className = 'btn';
        btn.style.backgroundColor = 'var(--success)';
        alertAutoCloseTimer_ = setTimeout(closeAlertModal, 1600);
    } else {
        content.className = 'modal-content construction-modal modal-error';
        icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        icon.style.color = 'var(--danger)';
        title.innerText = 'CẢNH BÁO';
        title.style.color = 'var(--danger)';
        btn.className = 'btn btn-danger';
        btn.style.backgroundColor = 'var(--danger)';
    }

    btn.innerText = 'OK';
    document.getElementById('alertMessage').innerText = msg;
    document.getElementById('alertModal').classList.add('active');
}

function closeAlertModal() {
    if (alertAutoCloseTimer_) { clearTimeout(alertAutoCloseTimer_); alertAutoCloseTimer_ = null; }
    document.getElementById('alertModal').classList.remove('active');
}

// --- CÁC HÀM FORMAT TIỆN ÍCH ---
const round0 = (num) => Math.round(num);
const getTodayDate = () => new Date().toISOString().split('T')[0];
const formatVN = (dateStr) => {
    if (!dateStr) return '--';
    const p = dateStr.split('-');
    return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : dateStr;
};

function convertDMYtoISO(str) {
    if (!str) return null;
    const parts = String(str).trim().split('/');
    if (parts.length !== 3) return null;
    const dd = parts[0].padStart(2, '0'), mm = parts[1].padStart(2, '0'), yyyy = parts[2];
    const iso = `${yyyy}-${mm}-${dd}`;
    return isNaN(new Date(iso).getTime()) ? null : iso;
}

function parseNumberSafely(val) {
    if (val === undefined || val === null || val === "") return NaN;
    if (typeof val === 'number') return val;
    let str = String(val).trim();
    if (str.includes('.') && str.includes(',')) {
        str = str.replace(/\./g, '').replace(',', '.');
    } else if (str.includes(',')) {
        str = str.replace(',', '.');
    }
    return parseFloat(str);
}

// --- HÀM TIỆN ÍCH CÂY HẠNG MỤC (dùng chung nhiều nơi) ---
function findHangMuc(maHangMuc) {
    return hangMuc.find(h => h.maHangMuc === maHangMuc);
}

function getGoiThauName(maGoiThau) {
    if (!maGoiThau) return '';
    const g = goiThau.find(x => x.maGoiThau === maGoiThau);
    return g ? g.tenGoiThau : '';
}

function nameOfUser(id) {
    const u = users.find(x => x.id === id);
    return u ? u.name : (id || '--');
}

function chucDanhOfUser(id) {
    const u = users.find(x => x.id === id);
    return u ? (u.chucDanh || '') : '';
}

// Bảng màu cố định cho badge Chức danh — cùng 1 chức danh luôn ra cùng 1 màu (hash chuỗi đơn giản).
// Phần tử cuối dùng riêng cho trường hợp chưa gán Chức danh.
const CHUCDANH_COLORS_ = [
    { bg: '#E4F2E9', fg: '#2E7D4F' },
    { bg: '#FBF1DA', fg: '#B8860B' },
    { bg: '#FCE6DA', fg: '#C4491F' },
    { bg: '#E6ECFB', fg: '#3452B4' },
    { bg: '#F3E6FB', fg: '#7C3AED' },
    { bg: '#FBE6E6', fg: '#C23B3B' },
    { bg: '#E6F7FB', fg: '#0E7C9C' },
    { bg: '#F0EEE7', fg: '#5B6560' }
];

function mauChucDanh(chucDanh) {
    const s = String(chucDanh || '').trim();
    if (!s) return CHUCDANH_COLORS_[CHUCDANH_COLORS_.length - 1];
    let hash = 0;
    for (let i = 0; i < s.length; i++) hash = (hash * 31 + s.charCodeAt(i)) >>> 0;
    return CHUCDANH_COLORS_[hash % (CHUCDANH_COLORS_.length - 1)];
}
</script>
