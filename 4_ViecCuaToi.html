<script>
/* ================================================================
   FILE 4: 4_ViecCuaToi.html
   ------------------------------------------------------------------
   PHẠM VI: Modal "Báo cáo" (Nhật ký tiến độ) — mở từ nút "Báo cáo" ở
   góc phải bảng Danh sách Công việc (tab "Thi công / Tiến độ"), KHÔNG
   còn là 1 tab riêng nữa. Form: chọn 1 Công việc (do chính mình tạo,
   hoặc mọi Công việc nếu là Admin), nhập % hoàn thành trong ngày, ghi
   vào NhatKyTienDo qua themNhatKyTienDo (backend tự validate tổng % <=
   100 và khoá LockService chống ghi đè). Việc tạo Công việc mới nằm ở
   nút "+ Thêm công việc" cùng chỗ (mở modal Công việc, 2_CongViec.html).

   DANH SÁCH HÀM CHÍNH:
   - openBaoCaoModal()       : Mở modal, dựng lại form mỗi lần mở
   - closeBaoCaoModal()      : Đóng modal
   - myReportableCongViec()  : Công việc mà user hiện tại được phép log %
   ================================================================ */

let ntdState = { congViec: null };

function openBaoCaoModal() {
    if (currentRole === 'VIEW') { showCustomAlert('Vui lòng đăng nhập để thao tác!', 'error'); return; }
    document.getElementById('baoCaoModal').classList.add('active');
    renderViecCuaToi();
}

function closeBaoCaoModal() {
    document.getElementById('baoCaoModal').classList.remove('active');
}

function myReportableCongViec() {
    return currentRole === 'ADMIN'
        ? congViec
        : congViec.filter(cv => cv.nguoiTaoId === mySupervisorId);
}

// Nhóm theo "Tên gói thầu · Phần" — đúng cấu trúc cố định I.Phần hồ sơ / II.Phần triển khai thi công.
function groupCongViecByGoiThauPhan(list) {
    const groups = {};
    list.forEach(cv => {
        const g = goiThau.find(x => x.maGoiThau === cv.maGoiThau);
        const label = `${g ? g.tenGoiThau : cv.maGoiThau} · ${PHAN_LOAI_LABEL[cv.phanLoai] || ''}`;
        (groups[label] = groups[label] || []).push(cv);
    });
    return groups;
}

function renderViecCuaToi() {
    document.getElementById('ntdUserLabel').textContent = myUserName || myUserId || '--';

    ntdState = { congViec: null };
    document.getElementById('ntdNgay').value = formatVN(getTodayDate());
    fillNtdCongViecOptions();
    document.getElementById('ntdPct').value = '';
    document.getElementById('ntdGhiChu').value = '';
    selectNtdCongViec('');

    document.getElementById('ntdCongViec').onchange = e => selectNtdCongViec(e.target.value);
    document.getElementById('ntdPct').oninput = updateNtdProgress;
    document.getElementById('ntdSubmit').onclick = submitNtd;

    setTimeout(() => {
        try {
            if (typeof flatpickr !== 'undefined') {
                const el = document.getElementById('ntdNgay');
                if (!el._flatpickr) flatpickr(el, { dateFormat: 'd/m/Y', locale: (flatpickr.l10ns && flatpickr.l10ns.vi) ? 'vi' : undefined, defaultDate: new Date(), onChange: updateNtdProgress });
            }
        } catch (e) { console.warn(e); }
    }, 100);
}

function fillNtdCongViecOptions() {
    const sel = document.getElementById('ntdCongViec');
    const groups = groupCongViecByGoiThauPhan(myReportableCongViec());
    const groupNames = Object.keys(groups);
    if (groupNames.length === 0) {
        sel.innerHTML = '<option value="">— Chưa có công việc, bấm "Thêm công việc" —</option>';
        return;
    }
    let html = '<option value="">— Chọn công việc —</option>';
    groupNames.sort().forEach(groupName => {
        html += `<optgroup label="${groupName}">`;
        groups[groupName].forEach(cv => {
            html += `<option value="${cv.maCongViec}">${(cv.maHangMucList || []).join(',')} — ${cv.tenCongViec}</option>`;
        });
        html += '</optgroup>';
    });
    sel.innerHTML = html;
}

function selectNtdCongViec(maCongViec) {
    ntdState.congViec = maCongViec ? congViec.find(c => c.maCongViec === maCongViec) : null;
    const meta = document.getElementById('ntdCongViecMeta');
    if (ntdState.congViec) {
        const hmLabel = (ntdState.congViec.maHangMucList || []).map(id => {
            const hm = findHangMuc(id);
            return hm ? `${hm.maHangMuc} — ${hm.tenHangMuc}` : id;
        }).join('; ');
        meta.innerHTML = `<span>Hạng mục: <b>${hmLabel || '--'}</b></span>`;
        gsRun('getNhatKyGanNhat', maCongViec, 5)
            .then(json => renderNtdRecent(JSON.parse(json)))
            .catch(() => renderNtdRecent([]));
    } else {
        meta.innerHTML = '';
        renderNtdRecent([]);
    }
    updateNtdProgress();
}

function renderNtdRecent(logs) {
    const box = document.getElementById('ntdRecent');
    if (!logs || !logs.length) {
        box.innerHTML = '<div style="color:var(--ink-soft);padding:6px 0;">Chưa có dữ liệu</div>';
        return;
    }
    box.innerHTML = logs.map(l => `
        <div class="ntd-recent-item">
            <span class="ndays">${formatVN(l.ngayBaoCao)} · ${l.nguoiNhapTen}</span>
            <span class="npct">+${l.phanTramNgay}%</span>
        </div>`).join('');
}

function updateNtdProgress() {
    const current = ntdState.congViec ? (ntdState.congViec.luyKe || 0) : 0;
    const addRaw = parseFloat(document.getElementById('ntdPct').value);
    const add = isNaN(addRaw) ? 0 : addRaw;
    const projected = current + add;

    document.getElementById('ntdFillCurrent').style.width = Math.min(current, 100) + '%';
    document.getElementById('ntdCurrentLabel').textContent = `Đã đạt: ${current}%`;
    document.getElementById('ntdProjectedLabel').textContent = `Sau khi nhập: ${Math.min(projected, 999).toFixed(1).replace(/\.0$/, '')}%`;

    const fillAdd = document.getElementById('ntdFillAdd');
    const feedback = document.getElementById('ntdFeedback');
    const submitBtn = document.getElementById('ntdSubmit');
    const hint = document.getElementById('ntdHint');

    if (!ntdState.congViec) {
        fillAdd.style.width = '0%';
        feedback.className = 'ntd-feedback';
        submitBtn.disabled = true;
        hint.textContent = 'Chọn công việc để bắt đầu';
        return;
    }

    if (projected > 100) {
        fillAdd.style.left = Math.min(current, 100) + '%';
        fillAdd.style.width = Math.max(0, 100 - current) + '%';
        fillAdd.style.background = 'var(--danger)';
        feedback.className = 'ntd-feedback show warn';
        const conLai = Math.max(0, Math.round((100 - current) * 10) / 10);
        feedback.textContent = `Vượt quá 100%. Công việc đã đạt ${current}%, chỉ còn tối đa ${conLai}% để nhập.`;
        submitBtn.disabled = true;
        hint.textContent = 'Điều chỉnh % trước khi gửi';
    } else {
        fillAdd.style.left = current + '%';
        fillAdd.style.width = add + '%';
        fillAdd.style.background = 'var(--primary)';
        if (add > 0) {
            feedback.className = 'ntd-feedback show ok';
            feedback.textContent = `Hợp lệ — sẽ ghi thêm ${add}% cho ngày ${document.getElementById('ntdNgay').value}.`;
        } else {
            feedback.className = 'ntd-feedback';
        }
        submitBtn.disabled = !(add > 0);
        hint.textContent = add > 0 ? 'Sẵn sàng gửi' : 'Nhập % hoàn thành trong ngày';
    }
}

function submitNtd() {
    if (!ntdState.congViec) return;
    const maCongViec = ntdState.congViec.maCongViec;
    const ngay = convertDMYtoISO(document.getElementById('ntdNgay').value.trim());
    const phanTram = parseFloat(document.getElementById('ntdPct').value);
    const ghiChu = document.getElementById('ntdGhiChu').value.trim();
    const btn = document.getElementById('ntdSubmit');
    btn.disabled = true;
    document.getElementById('ntdHint').textContent = 'Đang gửi...';

    gsRun('themNhatKyTienDo', myUserId, myPassword, maCongViec, ngay, phanTram, ghiChu, [])
        .then(() => {
            showCustomAlert('Đã gửi báo cáo tiến độ.', 'success');
            reloadData(); // chạy nền, không chờ mới báo thành công
        })
        .catch(err => {
            handleBackendError(err);
            btn.disabled = false;
            document.getElementById('ntdHint').textContent = 'Sẵn sàng gửi';
        });
}
</script>
