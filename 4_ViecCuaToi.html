<script>
/* ================================================================
   FILE 4: 4_ViecCuaToi.html
   ------------------------------------------------------------------
   PHẠM VI: Tab "Công việc cá nhân" — danh sách Công việc (chuyển từ
   tab "Gói thầu/Hạng mục" cũ sang đây) + 2 modal:
   - "Thêm công việc": bảng nhiều dòng, mỗi dòng 1 Công việc (Gói thầu-
     Hạng mục-Tên-Ngày BĐ-Ngày KT), thêm được 1 hoặc nhiều dòng cùng
     lúc, lưu hàng loạt (lặp gọi adminSaveCongViec từng dòng).
   - "Báo cáo": bảng ngang liệt kê MỌI Công việc báo cáo được (lọc theo
     Gói thầu), mỗi dòng nhập % hoàn thành hôm nay + ghi chú, gửi 1
     lần cho toàn bộ qua themNhatKyTienDoHangLoat (đã có sẵn ở
     Code.js, chỉ chưa có giao diện dùng tới trước đây).

   DANH SÁCH HÀM CHÍNH:
   - renderCongViecCaNhan()          : Vẽ bảng Công việc theo bộ lọc hiện tại
   - openThemCongViecHangLoatModal() : Mở modal thêm 1-nhiều Công việc
   - luuCongViecHangLoat()           : Lưu tất cả dòng hợp lệ
   - openBaoCaoModal()               : Mở modal báo cáo dạng bảng ngang
   - submitBaoCaoHangLoat()          : Gửi báo cáo hàng loạt
   ================================================================ */

// ---------- DANH SÁCH CÔNG VIỆC (chuyển từ tab Gói thầu/Hạng mục cũ) ----------

function toggleTaskGroup(key) {
    if (collapsedGroups.has(key)) collapsedGroups.delete(key);
    else collapsedGroups.add(key);
    renderCongViecCaNhan();
}

function canEditCongViec(cv) {
    return currentRole === 'ADMIN' || cv.nguoiTaoId === mySupervisorId;
}

function renderCongViecRow(cv) {
    const status = cv.trangThaiMau;
    const meta = (cv.maHangMucList || []).map(id => {
        const hm = findHangMuc(id);
        return hm ? `${hm.maHangMuc} — ${hm.tenHangMuc}` : id;
    }).join('; ');
    // Công việc đã bị xóa: chỉ hiện ở đây (đã lọc khỏi Tổng quan từ backend), gạch ngang + mờ cả
    // dòng, không còn nút Sửa/Xóa vì đã xóa rồi.
    const isDeleted = cv.active === false;
    const editable = !isDeleted && canEditCongViec(cv);
    const chucDanh = chucDanhOfUser(cv.nguoiTaoId);
    const mau = mauChucDanh(chucDanh);
    return `<tr class="task-row${isDeleted ? ' deleted' : ''}">
        <td class="task-name-cell" style="padding-left:48px;">
            <div class="t-name-row">
                <span class="t-name" title="${escapeHtml(cv.tenCongViec)}">${cv.tenCongViec}</span>
                ${commentBadgeHtml(cv)}
            </div>
            <span class="t-target" title="${escapeHtml(meta)}">${meta}</span>
        </td>
        <td class="text-center">${nameOfUser(cv.nguoiTaoId)}</td>
        <td class="text-center">${chucDanh ? `<span class="bc-badge" style="background:${mau.bg}; color:${mau.fg};">${chucDanh}</span>` : '--'}</td>
        <td class="text-center">${formatVN(cv.ngayBatDauKH)}</td>
        <td class="text-center">${formatVN(cv.ngayKetThucKH)}</td>
        <td>
            <div class="gantt-bar-wrap">
                <div class="gantt-track"><div class="gantt-fill status-${status}" style="width:${Math.min(100, cv.luyKe || 0)}%;"></div></div>
                <span class="gantt-pct">${cv.luyKe || 0}%</span>
            </div>
        </td>
        <td class="text-center"><span class="bc-badge ${status}">${TRANGTHAI_LABEL[status] || '--'}</span></td>
        <td class="text-center">
            ${isDeleted ? `<span class="deleted-label">Đã xóa</span>` : (editable ? `<div class="action-cell">
                <button class="btn btn-sm" style="background:var(--primary);" onclick="openCongViecModal('${cv.maCongViec}')"><i class="fa-solid fa-pen"></i></button>
                <button class="btn btn-sm btn-danger" onclick="deleteCongViec('${cv.maCongViec}')"><i class="fa-solid fa-trash"></i></button>
            </div>` : '')}
        </td>
    </tr>`;
}

function renderCongViecCaNhan() {
    const gtSelect = document.getElementById('filterGoiThau');
    if (gtSelect.options.length <= 1) {
        let html = '<option value="">-- Tất cả Gói thầu --</option>';
        goiThau.forEach(g => html += `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`);
        gtSelect.innerHTML = html;
    }
    const gsSelect = document.getElementById('filterGS');
    if (gsSelect.options.length <= 1) {
        let html = '<option value="">-- Tất cả người phụ trách --</option>';
        const ids = [...new Set(congViec.map(c => c.nguoiTaoId).filter(Boolean))];
        ids.sort((a, b) => nameOfUser(a).localeCompare(nameOfUser(b)));
        ids.forEach(id => html += `<option value="${id}">${nameOfUser(id)}</option>`);
        gsSelect.innerHTML = html;
    }

    const fGT = gtSelect.value;
    const fPhan = document.getElementById('filterPhanLoai').value;
    const fGS = gsSelect.value;
    const fStatus = document.getElementById('filterTrangThaiMau').value;
    const fSearch = document.getElementById('filterSearch').value.trim().toLowerCase();

    function matches(cv) {
        if (fGT && cv.maGoiThau !== fGT) return false;
        if (fPhan && cv.phanLoai !== fPhan) return false;
        if (fGS && cv.nguoiTaoId !== fGS) return false;
        if (fStatus && cv.trangThaiMau !== fStatus) return false;
        if (fSearch) {
            const hmNames = (cv.maHangMucList || []).map(id => { const hm = findHangMuc(id); return hm ? hm.tenHangMuc : ''; }).join(' ');
            const hay = `${cv.tenCongViec} ${(cv.maHangMucList || []).join(' ')} ${hmNames}`.toLowerCase();
            if (!hay.includes(fSearch)) return false;
        }
        return true;
    }

    const filtered = congViec.filter(matches);

    let html = '';
    goiThau.forEach(g => {
        const items = filtered.filter(c => c.maGoiThau === g.maGoiThau);
        if (items.length === 0) return;

        const gtKey = 'gt:' + g.maGoiThau;
        const gtOpen = !collapsedGroups.has(gtKey);
        html += `<tr class="task-group-row" onclick="toggleTaskGroup('${gtKey}')">
            <td colspan="8"><i class="fa-solid ${gtOpen ? 'fa-chevron-down' : 'fa-chevron-right'}" style="margin-right:8px; color:var(--accent);"></i>${g.tenGoiThau}</td>
        </tr>`;
        if (!gtOpen) return;

        ['ho_so', 'thi_cong'].forEach(phan => {
            const subItems = items.filter(c => c.phanLoai === phan);
            if (subItems.length === 0) return;
            const subKey = gtKey + ':' + phan;
            const subOpen = !collapsedGroups.has(subKey);
            html += `<tr class="task-group-row" onclick="toggleTaskGroup('${subKey}')" style="background:#F2F0E9;">
                <td colspan="8" style="padding-left:28px;"><i class="fa-solid ${subOpen ? 'fa-chevron-down' : 'fa-chevron-right'}" style="margin-right:8px; color:var(--accent);"></i>${PHAN_LOAI_LABEL[phan]}</td>
            </tr>`;
            if (!subOpen) return;
            subItems.forEach(cv => { html += renderCongViecRow(cv); });
        });
    });

    document.getElementById('danhSachBody').innerHTML = html || '<tr><td colspan="8" class="text-center" style="color:gray; padding:20px;">Không có công việc nào khớp bộ lọc.</td></tr>';
}

// ---------- THÊM CÔNG VIỆC HÀNG LOẠT (1 hoặc nhiều dòng cùng lúc) ----------

let cvhlRowSeq_ = 0;

function fillCvhlGoiThauSelect_(selectEl) {
    selectEl.innerHTML = '<option value="">-- Chọn Gói thầu --</option>' +
        goiThau.map(g => `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`).join('');
}

function onCvhlGoiThauChange(rowId) {
    const tr = document.getElementById('cvhlRow' + rowId);
    if (!tr) return;
    const maGoiThau = tr.querySelector('.cvhl-goithau').value;
    const hmSel = tr.querySelector('.cvhl-hangmuc');
    if (!maGoiThau) { hmSel.innerHTML = '<option value="">-- Chọn Gói thầu trước --</option>'; return; }
    const g = goiThau.find(x => x.maGoiThau === maGoiThau);
    const list = g ? hangMuc.filter(h => g.maHangMucList.includes(h.maHangMuc)) : [];
    hmSel.innerHTML = list.length
        ? '<option value="">-- Chọn Hạng mục --</option>' + list.map(h => `<option value="${h.maHangMuc}">${h.maHangMuc} — ${h.tenHangMuc}</option>`).join('')
        : '<option value="">-- Gói thầu chưa gộp Hạng mục --</option>';
}

function initCvhlDatePickers_(tr) {
    setTimeout(() => {
        try {
            if (typeof flatpickr === 'undefined') return;
            const opts = { dateFormat: 'd/m/Y', locale: (flatpickr.l10ns && flatpickr.l10ns.vi) ? 'vi' : undefined, allowInput: true };
            tr.querySelectorAll('.cvhl-batdau, .cvhl-ketthuc').forEach(el => { if (!el._flatpickr) flatpickr(el, opts); });
        } catch (e) { console.warn(e); }
    }, 50);
}

function themDongCongViec() {
    const rowId = ++cvhlRowSeq_;
    const tbody = document.getElementById('cvhlBody');
    const tr = document.createElement('tr');
    tr.id = 'cvhlRow' + rowId;
    tr.innerHTML = `
        <td><select class="form-control cvhl-goithau" onchange="onCvhlGoiThauChange(${rowId})"></select></td>
        <td><select class="form-control cvhl-hangmuc"><option value="">-- Chọn Gói thầu trước --</option></select></td>
        <td><input type="text" class="form-control cvhl-ten" placeholder="Tên công việc"></td>
        <td><input type="text" class="form-control cvhl-batdau" placeholder="dd/mm/yyyy"></td>
        <td><input type="text" class="form-control cvhl-ketthuc" placeholder="dd/mm/yyyy"></td>
        <td class="text-center"><button type="button" class="btn btn-sm btn-danger" onclick="xoaDongCongViec(${rowId})" title="Xóa dòng"><i class="fa-solid fa-xmark"></i></button></td>
    `;
    tbody.appendChild(tr);
    fillCvhlGoiThauSelect_(tr.querySelector('.cvhl-goithau'));
    initCvhlDatePickers_(tr);
}

function xoaDongCongViec(rowId) {
    const tr = document.getElementById('cvhlRow' + rowId);
    if (tr) tr.remove();
}

function openThemCongViecHangLoatModal() {
    if (currentRole === 'VIEW') { showCustomAlert('Vui lòng đăng nhập để thao tác!', 'error'); return; }
    document.getElementById('cvhlBody').innerHTML = '';
    cvhlRowSeq_ = 0;
    themDongCongViec();

    if (currentRole === 'ADMIN') {
        const sel = document.getElementById('cvhlGiaoCho');
        sel.innerHTML = '<option value="">-- Tự đảm nhận --</option>' +
            users.filter(u => u.role !== 'ADMIN').map(u => `<option value="${u.id}">${u.name}</option>`).join('');
        sel.value = '';
    }

    document.getElementById('themCongViecHangLoatModal').classList.add('active');
}

function closeThemCongViecHangLoatModal() {
    document.getElementById('themCongViecHangLoatModal').classList.remove('active');
}

function luuCongViecHangLoat() {
    const rows = Array.from(document.querySelectorAll('#cvhlBody tr'));
    if (rows.length === 0) { showCustomAlert('Chưa có dòng nào để lưu!', 'error'); return; }

    const nguoiDuocGiaoId = currentRole === 'ADMIN' ? (document.getElementById('cvhlGiaoCho').value || '') : '';
    const payloads = [];
    for (const tr of rows) {
        const maGoiThau = tr.querySelector('.cvhl-goithau').value;
        const maHangMuc = tr.querySelector('.cvhl-hangmuc').value;
        const tenCongViec = tr.querySelector('.cvhl-ten').value.trim();
        if (!maGoiThau && !maHangMuc && !tenCongViec) continue; // dòng bỏ trống hoàn toàn thì bỏ qua, không báo lỗi
        if (!maGoiThau || !maHangMuc || !tenCongViec) {
            showCustomAlert('Mỗi dòng cần nhập đủ Gói thầu, Hạng mục và Tên công việc!', 'error');
            return;
        }
        payloads.push({
            tenCongViec, maGoiThau, maHangMucList: [maHangMuc], nguoiDuocGiaoId,
            ngayBatDauKH: convertDMYtoISO(tr.querySelector('.cvhl-batdau').value.trim()) || '',
            ngayKetThucKH: convertDMYtoISO(tr.querySelector('.cvhl-ketthuc').value.trim()) || ''
        });
    }
    if (payloads.length === 0) { showCustomAlert('Chưa nhập dòng công việc nào hợp lệ!', 'error'); return; }

    let ok = 0, fail = 0;
    let chain = Promise.resolve();
    payloads.forEach(p => {
        chain = chain.then(() => gsRun('adminSaveCongViec', myUserId, myPassword, p).then(() => ok++).catch(() => fail++));
    });
    chain.then(() => {
        showCustomAlert(`Đã thêm ${ok} công việc${fail ? `, ${fail} dòng lỗi` : ''}.`, fail ? 'error' : 'success');
        closeThemCongViecHangLoatModal();
        reloadData();
    });
}

// ---------- BÁO CÁO TIẾN ĐỘ HÀNG LOẠT (bảng ngang, nhiều Công việc 1 lần) ----------

function myReportableCongViec() {
    // congViec toàn cục nay gồm cả Công việc đã bị xóa (active=false, chỉ để hiện gạch ngang ở
    // tab "Công việc cá nhân") — loại hẳn khỏi đây, không cho báo cáo % vào việc đã xóa.
    const active = congViec.filter(cv => cv.active !== false);
    return currentRole === 'ADMIN'
        ? active
        : active.filter(cv => cv.nguoiTaoId === mySupervisorId);
}

function openBaoCaoModal() {
    if (currentRole === 'VIEW') { showCustomAlert('Vui lòng đăng nhập để thao tác!', 'error'); return; }
    document.getElementById('ntdUserLabel').textContent = myUserName || myUserId || '--';
    document.getElementById('ntdNgay').value = formatVN(getTodayDate());

    const sel = document.getElementById('ntdGoiThauFilter');
    sel.innerHTML = '<option value="">-- Tất cả Gói thầu --</option>' +
        goiThau.map(g => `<option value="${g.maGoiThau}">${g.tenGoiThau}</option>`).join('');
    sel.value = '';

    renderBaoCaoTable();
    document.getElementById('baoCaoModal').classList.add('active');

    setTimeout(() => {
        try {
            if (typeof flatpickr !== 'undefined') {
                const el = document.getElementById('ntdNgay');
                if (!el._flatpickr) flatpickr(el, { dateFormat: 'd/m/Y', locale: (flatpickr.l10ns && flatpickr.l10ns.vi) ? 'vi' : undefined, defaultDate: new Date() });
            }
        } catch (e) { console.warn(e); }
    }, 100);
}

function closeBaoCaoModal() {
    document.getElementById('baoCaoModal').classList.remove('active');
}

function renderBaoCaoTable() {
    const maGoiThau = document.getElementById('ntdGoiThauFilter').value;
    let list = myReportableCongViec();
    if (maGoiThau) list = list.filter(cv => cv.maGoiThau === maGoiThau);

    const tbody = document.getElementById('ntdTableBody');
    if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center" style="color:gray; padding:15px;">Không có công việc nào để báo cáo.</td></tr>`;
        return;
    }
    tbody.innerHTML = list.map(cv => {
        const hmLabel = (cv.maHangMucList || []).join(', ');
        return `<tr>
            <td style="text-align:left;">${cv.tenCongViec}</td>
            <td class="text-center">${hmLabel || '--'}</td>
            <td class="text-center">${cv.luyKe || 0}%</td>
            <td><input type="number" step="0.5" min="0" class="form-control ntd-row-pct" data-cv="${cv.maCongViec}" data-current="${cv.luyKe || 0}" placeholder="0"></td>
            <td><input type="text" class="form-control ntd-row-note" data-cv="${cv.maCongViec}" placeholder="Ghi chú (nếu có)"></td>
        </tr>`;
    }).join('');
}

function submitBaoCaoHangLoat() {
    const ngay = convertDMYtoISO(document.getElementById('ntdNgay').value.trim());
    if (!ngay) { showCustomAlert('Vui lòng chọn Ngày báo cáo hợp lệ!', 'error'); return; }

    const payloadArray = [];
    const vuotQua = [];
    document.querySelectorAll('.ntd-row-pct').forEach(input => {
        const addRaw = parseFloat(input.value);
        if (isNaN(addRaw) || addRaw <= 0) return;
        const maCongViec = input.getAttribute('data-cv');
        const current = parseFloat(input.getAttribute('data-current')) || 0;
        if (current + addRaw > 100.001) {
            const cv = congViec.find(c => c.maCongViec === maCongViec);
            vuotQua.push(cv ? cv.tenCongViec : maCongViec);
            return;
        }
        const noteEl = document.querySelector(`.ntd-row-note[data-cv="${maCongViec}"]`);
        payloadArray.push({ maCongViec, ngayBaoCao: ngay, phanTram: addRaw, ghiChu: noteEl ? noteEl.value.trim() : '', fileDinhKem: [] });
    });

    if (vuotQua.length > 0) {
        showCustomAlert(`Các công việc sau sẽ vượt quá 100% nên KHÔNG được gửi: ${vuotQua.join(', ')}. Vui lòng chỉnh lại % rồi gửi lại.`, 'error');
        return;
    }
    if (payloadArray.length === 0) { showCustomAlert('Chưa nhập % cho công việc nào!', 'error'); return; }

    gsRun('themNhatKyTienDoHangLoat', myUserId, myPassword, payloadArray)
        .then(results => {
            const ok = results.filter(r => r.ok).length;
            const fail = results.filter(r => !r.ok);
            let msg = `Đã gửi báo cáo cho ${ok} công việc.`;
            if (fail.length) msg += ` ${fail.length} lỗi: ` + fail.map(f => f.error).slice(0, 3).join('; ');
            showCustomAlert(msg, fail.length ? 'error' : 'success');
            closeBaoCaoModal();
            reloadData();
        })
        .catch(handleBackendError);
}
</script>
